<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="-apple-system, 'Pretendard', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="card4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="50" text-anchor="middle" font-size="26" font-weight="700" fill="#f1f5f9">Matt Pocock 4가지 실패 모드 매핑</text>
  <text x="480" y="76" text-anchor="middle" font-size="13" fill="#94a3b8">AI 코딩 에이전트의 4가지 흔한 실패 → 우리 자산의 대응</text>

  <!-- Row 1: Alignment -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="400" height="170" rx="14" fill="url(#card1)"/>
    <text x="80" y="145" font-size="14" font-weight="600" fill="#fff" opacity="0.85">#1 — ALIGNMENT</text>
    <text x="80" y="180" font-size="20" font-weight="700" fill="#fff">에이전트가 원하는 걸 잘못 이해</text>
    <text x="80" y="208" font-size="13" fill="#fff" opacity="0.9">"무엇을 만들어야 하지?" 단계 misalignment.</text>
    <text x="80" y="226" font-size="13" fill="#fff" opacity="0.9">사람·에이전트 사이 communication gap.</text>
    <text x="80" y="258" font-size="13" font-style="italic" fill="#fff" opacity="0.95">Pragmatic Programmer (Hunt &amp; Thomas)</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="500" y="110" width="400" height="170" rx="14" fill="#1e293b" stroke="#fb7185" stroke-width="2"/>
    <text x="520" y="145" font-size="14" font-weight="600" fill="#fb7185">대응 자산</text>
    <text x="520" y="178" font-size="16" font-weight="600" fill="#f1f5f9">/product-review</text>
    <text x="700" y="178" font-size="12" fill="#94a3b8">— 6Q 검증 + grilling</text>
    <text x="520" y="208" font-size="16" font-weight="600" fill="#f1f5f9">/grill-with-docs</text>
    <text x="700" y="208" font-size="12" fill="#94a3b8">— 도메인 대조 인터뷰</text>
    <text x="520" y="238" font-size="16" font-weight="600" fill="#f1f5f9">/to-prd</text>
    <text x="700" y="238" font-size="12" fill="#94a3b8">— PRD/WORK-SPEC 합성</text>
    <text x="520" y="266" font-size="11" fill="#64748b">CONTEXT.md/ADR 인라인 갱신</text>
  </g>

  <!-- Row 2: Verbosity -->
  <g filter="url(#shadow)">
    <rect x="60" y="290" width="400" height="100" rx="14" fill="url(#card2)"/>
    <text x="80" y="320" font-size="14" font-weight="600" fill="#fff" opacity="0.85">#2 — VERBOSITY</text>
    <text x="80" y="350" font-size="20" font-weight="700" fill="#fff">도메인 용어 모르고 장황</text>
    <text x="80" y="376" font-size="12" font-style="italic" fill="#fff" opacity="0.9">Domain-Driven Design (Eric Evans)</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="500" y="290" width="400" height="100" rx="14" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="520" y="320" font-size="14" font-weight="600" fill="#fbbf24">대응 자산</text>
    <text x="520" y="348" font-size="15" font-weight="600" fill="#f1f5f9">.claude/CONTEXT.md</text>
    <text x="720" y="348" font-size="12" fill="#94a3b8">— ubiquitous language</text>
    <text x="520" y="372" font-size="15" font-weight="600" fill="#f1f5f9">/zoom-out</text>
    <text x="640" y="372" font-size="12" fill="#94a3b8">/caveman</text>
    <text x="730" y="372" font-size="12" fill="#94a3b8">— 압축 모드</text>
  </g>

  <!-- Row 3: Doesn't Work -->
  <g filter="url(#shadow)">
    <rect x="60" y="400" width="400" height="60" rx="14" fill="url(#card3)"/>
    <text x="80" y="425" font-size="13" font-weight="600" fill="#fff" opacity="0.85">#3 — DOESN'T WORK</text>
    <text x="80" y="450" font-size="18" font-weight="700" fill="#fff">코드가 실제로 동작 안 함 (피드백 루프 부족)</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="500" y="400" width="400" height="60" rx="14" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
    <text x="520" y="425" font-size="13" font-weight="600" fill="#34d399">대응 자산</text>
    <text x="520" y="447" font-size="13" fill="#f1f5f9">test-coverage-check · debugger (5-phase) · feature-check · ai-slop-detect</text>
  </g>

  <!-- Row 4: Ball of Mud -->
  <g filter="url(#shadow)">
    <rect x="60" y="470" width="400" height="60" rx="14" fill="url(#card4)"/>
    <text x="80" y="495" font-size="13" font-weight="600" fill="#fff" opacity="0.85">#4 — BALL OF MUD</text>
    <text x="80" y="520" font-size="18" font-weight="700" fill="#fff">코드베이스가 진흙 공 (설계 부재)</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="500" y="470" width="400" height="60" rx="14" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
    <text x="520" y="495" font-size="13" font-weight="600" fill="#60a5fa">대응 자산</text>
    <text x="520" y="517" font-size="13" fill="#f1f5f9">/improve-codebase-architecture · /zoom-out · code-refactor agent</text>
  </g>

  <!-- Arrow connectors -->
  <g stroke="#475569" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M 460 195 L 500 195" marker-end="url(#arrowhead)"/>
    <path d="M 460 340 L 500 340" marker-end="url(#arrowhead)"/>
    <path d="M 460 430 L 500 430" marker-end="url(#arrowhead)"/>
    <path d="M 460 500 L 500 500" marker-end="url(#arrowhead)"/>
  </g>
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
