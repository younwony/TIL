<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="480" height="320" fill="#FAFBFC" rx="12"/>

  <!-- 타이틀 -->
  <text x="200" y="30" text-anchor="middle" fill="#2C3E50" font-family="Arial, sans-serif" font-size="16" font-weight="bold">QA Result</text>
  <text x="200" y="48" text-anchor="middle" fill="#7F8C8D" font-family="Arial, sans-serif" font-size="10">Total: 9 scenarios</text>

  <!-- 파이 차트 (중심: 200, 175, 반지름: 100) -->
  <!-- PASS: 6/9 = 240도, 시작 0도 -->
  <path d="M 200 75 A 100 100 0 1 1 113.4 243.3 L 200 175 Z" fill="#2ECC71" filter="url(#shadow)"/>
  <!-- FIX→PASS: 1/9 = 40도 -->
  <path d="M 113.4 243.3 A 100 100 0 0 1 134.2 262.6 L 200 175 Z" fill="#F39C12" filter="url(#shadow)"/>
  <!-- FAIL: 1/9 = 40도 -->
  <path d="M 134.2 262.6 A 100 100 0 0 1 172.1 273.2 L 200 175 Z" fill="#E74C3C" filter="url(#shadow)"/>
  <!-- BLOCKED: 1/9 = 40도 -->
  <path d="M 172.1 273.2 A 100 100 0 0 1 200 75 L 200 175 Z" fill="#9B59B6" filter="url(#shadow)"/>

  <!-- 퍼센트 레이블 -->
  <text x="245" y="140" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">67%</text>
  <text x="130" y="242" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="bold">11%</text>
  <text x="152" y="270" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="bold">11%</text>
  <text x="192" y="260" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="bold">11%</text>

  <!-- 범례 -->
  <rect x="340" y="90" width="16" height="16" rx="3" fill="#2ECC71"/>
  <text x="362" y="103" fill="#2C3E50" font-family="Arial, sans-serif" font-size="12">PASS (6)</text>

  <rect x="340" y="118" width="16" height="16" rx="3" fill="#F39C12"/>
  <text x="362" y="131" fill="#2C3E50" font-family="Arial, sans-serif" font-size="12">FIX→PASS (1)</text>

  <rect x="340" y="146" width="16" height="16" rx="3" fill="#E74C3C"/>
  <text x="362" y="159" fill="#2C3E50" font-family="Arial, sans-serif" font-size="12">FAIL (1)</text>

  <rect x="340" y="174" width="16" height="16" rx="3" fill="#9B59B6"/>
  <text x="362" y="187" fill="#2C3E50" font-family="Arial, sans-serif" font-size="12">BLOCKED (1)</text>

  <!-- 요약 카드 -->
  <rect x="330" y="220" width="130" height="80" rx="8" fill="white" stroke="#ECF0F1" stroke-width="1" filter="url(#shadow)"/>
  <text x="395" y="242" text-anchor="middle" fill="#7F8C8D" font-family="Arial, sans-serif" font-size="9">수정된 파일</text>
  <text x="395" y="262" text-anchor="middle" fill="#2C3E50" font-family="Arial, sans-serif" font-size="20" font-weight="bold">2</text>
  <text x="395" y="290" text-anchor="middle" fill="#27AE60" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Pass Rate: 78%</text>
</svg>
