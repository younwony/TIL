<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB"/>
      <stop offset="100%" style="stop-color:#2980B9"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71"/>
      <stop offset="100%" style="stop-color:#27AE60"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#8E44AD"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22"/>
      <stop offset="100%" style="stop-color:#D35400"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Vibe Coding vs Agentic Coding</text>

  <!-- Left Section: Vibe Coding -->
  <rect x="30" y="60" width="400" height="320" rx="15" fill="#16213e" stroke="#3498DB" stroke-width="2"/>
  <text x="230" y="95" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3498DB" text-anchor="middle">Vibe Coding (2023-2025)</text>

  <!-- Developer -->
  <rect x="60" y="130" width="120" height="50" rx="8" fill="url(#blueGrad)"/>
  <text x="120" y="160" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Developer</text>

  <!-- Bidirectional Arrow -->
  <line x1="190" y1="155" x2="260" y2="155" stroke="#ffffff" stroke-width="2"/>
  <polygon points="255,150 265,155 255,160" fill="#ffffff"/>
  <polygon points="195,150 185,155 195,160" fill="#ffffff"/>
  <text x="225" y="145" font-family="Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle">1:1 협업</text>

  <!-- AI -->
  <rect x="270" y="130" width="120" height="50" rx="8" fill="url(#greenGrad)"/>
  <text x="330" y="160" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">AI Assistant</text>

  <!-- Interaction Pattern -->
  <rect x="60" y="200" width="340" height="80" rx="8" fill="#0f3460" stroke="#3498DB" stroke-width="1"/>
  <text x="230" y="225" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">짧은 프롬프트-응답 사이클</text>
  <text x="230" y="245" font-family="Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle">"이 함수 만들어줘" → "여기 있어요" → "수정해줘"</text>
  <text x="230" y="265" font-family="Arial, sans-serif" font-size="10" fill="#888888" text-anchor="middle">함수/클래스 단위 작업</text>

  <!-- Characteristics -->
  <text x="230" y="310" font-family="Arial, sans-serif" font-size="10" fill="#3498DB" text-anchor="middle">• 개발자가 코드 작성</text>
  <text x="230" y="330" font-family="Arial, sans-serif" font-size="10" fill="#3498DB" text-anchor="middle">• AI는 제안/보조 역할</text>
  <text x="230" y="350" font-family="Arial, sans-serif" font-size="10" fill="#3498DB" text-anchor="middle">• 단일 파일/세션 컨텍스트</text>

  <!-- Right Section: Agentic Coding -->
  <rect x="470" y="60" width="400" height="320" rx="15" fill="#16213e" stroke="#9B59B6" stroke-width="2"/>
  <text x="670" y="95" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9B59B6" text-anchor="middle">Agentic Coding (2026~)</text>

  <!-- Conductor -->
  <rect x="500" y="120" width="100" height="45" rx="8" fill="url(#purpleGrad)"/>
  <text x="550" y="140" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Developer</text>
  <text x="550" y="155" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">(Conductor)</text>

  <!-- Arrows to Agents -->
  <line x1="610" y1="135" x2="660" y2="120" stroke="#9B59B6" stroke-width="1.5"/>
  <line x1="610" y1="145" x2="660" y2="145" stroke="#9B59B6" stroke-width="1.5"/>
  <line x1="610" y1="155" x2="660" y2="170" stroke="#9B59B6" stroke-width="1.5"/>

  <!-- Agent A -->
  <rect x="670" y="105" width="80" height="30" rx="5" fill="url(#orangeGrad)"/>
  <text x="710" y="124" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Agent A</text>

  <!-- Agent B -->
  <rect x="670" y="140" width="80" height="30" rx="5" fill="url(#orangeGrad)"/>
  <text x="710" y="159" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Agent B</text>

  <!-- Agent C -->
  <rect x="670" y="175" width="80" height="30" rx="5" fill="url(#orangeGrad)"/>
  <text x="710" y="194" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">Agent C</text>

  <!-- More dots -->
  <text x="795" y="155" font-family="Arial, sans-serif" font-size="12" fill="#888888">...</text>

  <!-- Long Running Arrow -->
  <rect x="500" y="220" width="340" height="30" rx="5" fill="#0f3460" stroke="#9B59B6" stroke-width="1"/>
  <text x="670" y="240" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">장시간 자율 실행 (몇 시간 ~ 며칠)</text>

  <!-- Characteristics -->
  <text x="670" y="280" font-family="Arial, sans-serif" font-size="10" fill="#9B59B6" text-anchor="middle">• 개발자는 조율자/감독자</text>
  <text x="670" y="300" font-family="Arial, sans-serif" font-size="10" fill="#9B59B6" text-anchor="middle">• 에이전트가 자율적으로 코드 작성</text>
  <text x="670" y="320" font-family="Arial, sans-serif" font-size="10" fill="#9B59B6" text-anchor="middle">• 전체 프로젝트 + 장기 메모리</text>
  <text x="670" y="340" font-family="Arial, sans-serif" font-size="10" fill="#9B59B6" text-anchor="middle">• Self-Correction & Recovery</text>

  <!-- Evolution Arrow -->
  <text x="450" y="390" font-family="Arial, sans-serif" font-size="12" fill="#888888" text-anchor="middle">── Evolution ──▶</text>
</svg>
