<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520">
  <defs>
    <linearGradient id="naiveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22"/>
      <stop offset="100%" style="stop-color:#D35400"/>
    </linearGradient>
    <linearGradient id="graphGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB"/>
      <stop offset="100%" style="stop-color:#2980B9"/>
    </linearGradient>
    <linearGradient id="nodeGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71"/>
      <stop offset="100%" style="stop-color:#27AE60"/>
    </linearGradient>
    <linearGradient id="nodePurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#8E44AD"/>
    </linearGradient>
    <linearGradient id="nodeRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C"/>
      <stop offset="100%" style="stop-color:#C0392B"/>
    </linearGradient>
    <linearGradient id="nodeTeal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1ABC9C"/>
      <stop offset="100%" style="stop-color:#16A085"/>
    </linearGradient>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7F8C8D"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980B9"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D35400"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" fill="#2C3E50" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Naive RAG vs GraphRAG</text>
  <text x="410" y="50" text-anchor="middle" fill="#7F8C8D" font-family="Arial, sans-serif" font-size="12">검색 방식과 컨텍스트 구성의 차이</text>

  <!-- Divider -->
  <line x1="410" y1="65" x2="410" y2="510" stroke="#BDC3C7" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="410" y="75" text-anchor="middle" fill="#BDC3C7" font-family="Arial, sans-serif" font-size="10">VS</text>

  <!-- ===== LEFT: Naive RAG ===== -->
  <rect x="30" y="80" width="350" height="35" rx="5" fill="url(#naiveGrad)"/>
  <text x="205" y="103" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Naive RAG</text>

  <!-- Document chunks -->
  <text x="45" y="140" fill="#2C3E50" font-family="Arial, sans-serif" font-size="11" font-weight="bold">1. 문서 청킹</text>
  <rect x="45" y="150" width="60" height="30" rx="3" fill="#F5B041" opacity="0.7"/>
  <text x="75" y="170" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="9">Chunk 1</text>
  <rect x="115" y="150" width="60" height="30" rx="3" fill="#F5B041" opacity="0.7"/>
  <text x="145" y="170" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="9">Chunk 2</text>
  <rect x="185" y="150" width="60" height="30" rx="3" fill="#F5B041" opacity="0.7"/>
  <text x="215" y="170" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="9">Chunk 3</text>
  <rect x="255" y="150" width="60" height="30" rx="3" fill="#F5B041" opacity="0.7"/>
  <text x="285" y="170" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="9">Chunk N</text>
  <text x="330" y="170" fill="#7F8C8D" font-family="Arial, sans-serif" font-size="9">...</text>

  <!-- Vector embedding -->
  <text x="45" y="210" fill="#2C3E50" font-family="Arial, sans-serif" font-size="11" font-weight="bold">2. 벡터 임베딩</text>
  <line x1="120" y1="180" x2="120" y2="215" stroke="#D35400" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <rect x="45" y="220" width="280" height="25" rx="3" fill="#ECF0F1"/>
  <text x="185" y="237" text-anchor="middle" fill="#7F8C8D" font-family="Arial, sans-serif" font-size="10">[0.12, -0.34, 0.56, ...] 벡터 공간</text>

  <!-- Similarity search -->
  <text x="45" y="275" fill="#2C3E50" font-family="Arial, sans-serif" font-size="11" font-weight="bold">3. 유사도 검색 (Top-K)</text>
  <line x1="185" y1="245" x2="185" y2="280" stroke="#D35400" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <rect x="45" y="285" width="60" height="25" rx="3" fill="url(#naiveGrad)"/>
  <text x="75" y="302" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="9">Top 1</text>
  <rect x="115" y="285" width="60" height="25" rx="3" fill="url(#naiveGrad)" opacity="0.7"/>
  <text x="145" y="302" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="9">Top 2</text>
  <rect x="185" y="285" width="60" height="25" rx="3" fill="url(#naiveGrad)" opacity="0.5"/>
  <text x="215" y="302" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="9">Top 3</text>

  <!-- LLM -->
  <line x1="150" y1="310" x2="150" y2="340" stroke="#D35400" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <rect x="80" y="345" width="150" height="30" rx="5" fill="url(#nodeRed)"/>
  <text x="155" y="365" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="bold">LLM 응답 생성</text>

  <!-- Limitation -->
  <rect x="45" y="395" width="320" height="55" rx="5" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="55" y="413" fill="#C0392B" font-family="Arial, sans-serif" font-size="10" font-weight="bold">한계</text>
  <text x="55" y="428" fill="#7F8C8D" font-family="Arial, sans-serif" font-size="9">- 청크 간 관계 정보 손실</text>
  <text x="55" y="441" fill="#7F8C8D" font-family="Arial, sans-serif" font-size="9">- 글로벌 질문 (요약, 테마 분석) 대응 불가</text>

  <!-- ===== RIGHT: GraphRAG ===== -->
  <rect x="440" y="80" width="350" height="35" rx="5" fill="url(#graphGrad)"/>
  <text x="615" y="103" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">GraphRAG</text>

  <!-- Knowledge Graph -->
  <text x="455" y="140" fill="#2C3E50" font-family="Arial, sans-serif" font-size="11" font-weight="bold">1. Knowledge Graph 구축</text>

  <!-- Graph nodes and edges -->
  <circle cx="510" cy="175" r="14" fill="url(#graphGrad)"/>
  <text x="510" y="179" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" font-weight="bold">E1</text>
  <circle cx="580" cy="155" r="14" fill="url(#nodePurple)"/>
  <text x="580" y="159" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" font-weight="bold">E2</text>
  <circle cx="650" cy="175" r="14" fill="url(#nodeGreen)"/>
  <text x="650" y="179" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" font-weight="bold">E3</text>
  <circle cx="720" cy="155" r="14" fill="url(#nodeTeal)"/>
  <text x="720" y="159" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" font-weight="bold">E4</text>
  <circle cx="545" cy="195" r="10" fill="url(#naiveGrad)" opacity="0.6"/>
  <text x="545" y="199" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="7">R</text>
  <circle cx="680" cy="195" r="10" fill="url(#naiveGrad)" opacity="0.6"/>
  <text x="680" y="199" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="7">R</text>

  <!-- Edges -->
  <line x1="524" y1="170" x2="566" y2="160" stroke="#7F8C8D" stroke-width="1.5"/>
  <line x1="594" y1="160" x2="636" y2="170" stroke="#7F8C8D" stroke-width="1.5"/>
  <line x1="664" y1="170" x2="706" y2="160" stroke="#7F8C8D" stroke-width="1.5"/>
  <line x1="520" y1="185" x2="540" y2="192" stroke="#BDC3C7" stroke-width="1"/>
  <line x1="660" y1="185" x2="676" y2="192" stroke="#BDC3C7" stroke-width="1"/>

  <!-- Community Detection -->
  <text x="455" y="230" fill="#2C3E50" font-family="Arial, sans-serif" font-size="11" font-weight="bold">2. Community Detection</text>
  <line x1="615" y1="205" x2="615" y2="235" stroke="#2980B9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Communities -->
  <rect x="455" y="243" width="130" height="40" rx="8" fill="none" stroke="#3498DB" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="520" y="260" text-anchor="middle" fill="#2980B9" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Community A</text>
  <text x="520" y="275" text-anchor="middle" fill="#7F8C8D" font-family="Arial, sans-serif" font-size="8">E1, E2 클러스터</text>

  <rect x="600" y="243" width="130" height="40" rx="8" fill="none" stroke="#9B59B6" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="665" y="260" text-anchor="middle" fill="#8E44AD" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Community B</text>
  <text x="665" y="275" text-anchor="middle" fill="#7F8C8D" font-family="Arial, sans-serif" font-size="8">E3, E4 클러스터</text>

  <!-- Query types -->
  <text x="455" y="305" fill="#2C3E50" font-family="Arial, sans-serif" font-size="11" font-weight="bold">3. 쿼리 처리</text>
  <line x1="615" y1="283" x2="615" y2="310" stroke="#2980B9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <rect x="455" y="315" width="130" height="40" rx="5" fill="url(#nodePurple)"/>
  <text x="520" y="333" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Global Search</text>
  <text x="520" y="348" text-anchor="middle" fill="#E8DAEF" font-family="Arial, sans-serif" font-size="8">커뮤니티 요약 활용</text>

  <rect x="600" y="315" width="130" height="40" rx="5" fill="url(#nodeTeal)"/>
  <text x="665" y="333" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Local Search</text>
  <text x="665" y="348" text-anchor="middle" fill="#D1F2EB" font-family="Arial, sans-serif" font-size="8">엔티티 이웃 탐색</text>

  <!-- LLM -->
  <line x1="590" y1="355" x2="590" y2="375" stroke="#2980B9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="500" y="380" width="180" height="30" rx="5" fill="url(#nodeGreen)"/>
  <text x="590" y="400" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="bold">구조화된 LLM 응답</text>

  <!-- Advantage -->
  <rect x="440" y="425" width="350" height="55" rx="5" fill="#EBF5FB" stroke="#3498DB" stroke-width="1"/>
  <text x="450" y="443" fill="#2471A3" font-family="Arial, sans-serif" font-size="10" font-weight="bold">장점</text>
  <text x="450" y="458" fill="#7F8C8D" font-family="Arial, sans-serif" font-size="9">- 엔티티 간 관계 기반 풍부한 컨텍스트</text>
  <text x="450" y="471" fill="#7F8C8D" font-family="Arial, sans-serif" font-size="9">- 글로벌 질문 (요약, 테마, 비교) 탁월</text>

  <!-- Bottom comparison bar -->
  <rect x="30" y="465" width="335" height="40" rx="5" fill="#FDEBD0"/>
  <text x="197" y="482" text-anchor="middle" fill="#D35400" font-family="Arial, sans-serif" font-size="10" font-weight="bold">빠른 인덱싱 | 낮은 비용 | 단순 질문 적합</text>
  <text x="197" y="497" text-anchor="middle" fill="#E67E22" font-family="Arial, sans-serif" font-size="9">키워드/유사도 기반 검색</text>

  <rect x="440" y="490" width="350" height="25" rx="5" fill="#D4E6F1"/>
  <text x="615" y="507" text-anchor="middle" fill="#2471A3" font-family="Arial, sans-serif" font-size="10" font-weight="bold">높은 품질 | 관계 이해 | 복합 질문 적합</text>
</svg>
