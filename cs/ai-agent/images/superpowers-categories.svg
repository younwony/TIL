<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" width="800" height="650">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
    </style>

    <!-- 파랑 (Collaboration) -->
    <linearGradient id="nodeBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB"/>
      <stop offset="100%" style="stop-color:#2980B9"/>
    </linearGradient>
    <!-- 초록 (Testing) -->
    <linearGradient id="nodeGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71"/>
      <stop offset="100%" style="stop-color:#27AE60"/>
    </linearGradient>
    <!-- 빨강 (Debugging) -->
    <linearGradient id="nodeRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C"/>
      <stop offset="100%" style="stop-color:#C0392B"/>
    </linearGradient>
    <!-- 회색 (Meta) -->
    <linearGradient id="nodeGray" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#95A5A6"/>
      <stop offset="100%" style="stop-color:#7F8C8D"/>
    </linearGradient>
    <!-- 중앙 보라 -->
    <linearGradient id="nodePurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#8E44AD"/>
    </linearGradient>

    <!-- 그룹 배경 그라디언트 -->
    <linearGradient id="bgGray" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F2F3F4"/>
      <stop offset="100%" style="stop-color:#E8EAEB"/>
    </linearGradient>
    <linearGradient id="bgGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EAFAF1"/>
      <stop offset="100%" style="stop-color:#D5F5E3"/>
    </linearGradient>
    <linearGradient id="bgRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDEDEC"/>
      <stop offset="100%" style="stop-color:#FADBD8"/>
    </linearGradient>
    <linearGradient id="bgBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EBF5FB"/>
      <stop offset="100%" style="stop-color:#D6EAF8"/>
    </linearGradient>

    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
    <filter id="shadowStrong" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#00000025"/>
    </filter>
  </defs>

  <!-- 전체 배경 -->
  <rect x="0" y="0" width="800" height="650" rx="14" ry="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>

  <!-- 타이틀 영역 -->
  <rect x="0" y="0" width="800" height="52" rx="14" ry="14" fill="url(#nodePurple)"/>
  <rect x="0" y="38" width="800" height="14" fill="url(#nodePurple)"/>
  <text x="400" y="33" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">Superpowers v5.0.4 — 스킬 카테고리 구조</text>

  <!-- ===================== 중앙 허브 ===================== -->
  <rect x="290" y="72" width="220" height="56" rx="12" ry="12" fill="url(#nodePurple)" filter="url(#shadowStrong)"/>
  <text x="400" y="97" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">Superpowers v5.0.4</text>
  <text x="400" y="118" text-anchor="middle" font-size="11" fill="#E8DAEF">14개 스킬 · 4개 카테고리</text>

  <!-- ===================== 연결선 (노드보다 먼저) ===================== -->
  <!-- 중앙 → Meta (왼쪽 위) -->
  <line x1="310" y1="100" x2="152" y2="152" stroke="#95A5A6" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- 중앙 → Testing (오른쪽 위) -->
  <line x1="490" y1="100" x2="648" y2="152" stroke="#27AE60" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- 중앙 → Debugging (왼쪽 아래) -->
  <line x1="330" y1="128" x2="152" y2="350" stroke="#E74C3C" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- 중앙 → Collaboration (오른쪽 아래) -->
  <line x1="470" y1="128" x2="648" y2="350" stroke="#2980B9" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- ===================== META 그룹 (왼쪽 위) ===================== -->
  <rect x="20" y="148" width="265" height="148" rx="12" ry="12" fill="url(#bgGray)" stroke="#95A5A6" stroke-width="2" filter="url(#shadow)"/>

  <!-- Meta 카테고리 헤더 -->
  <rect x="20" y="148" width="265" height="38" rx="12" ry="12" fill="url(#nodeGray)"/>
  <rect x="20" y="168" width="265" height="18" fill="url(#nodeGray)"/>
  <text x="152" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Meta</text>
  <text x="152" y="187" text-anchor="middle" font-size="10" fill="#ECF0F1">2 Skills</text>

  <!-- using-superpowers -->
  <rect x="34" y="200" width="237" height="34" rx="7" ry="7" fill="#FFFFFF" stroke="#BDC3C7" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="52" y="222" font-size="11" font-weight="600" fill="#2C3E50">using-superpowers</text>
  <rect x="192" y="208" width="68" height="18" rx="9" ry="9" fill="#7F8C8D"/>
  <text x="226" y="221" text-anchor="middle" font-size="9" fill="#FFFFFF">auto-trigger</text>

  <!-- writing-skills -->
  <rect x="34" y="244" width="237" height="34" rx="7" ry="7" fill="#FFFFFF" stroke="#BDC3C7" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="52" y="266" font-size="11" font-weight="600" fill="#2C3E50">writing-skills</text>

  <!-- ===================== TESTING 그룹 (오른쪽 위) ===================== -->
  <rect x="515" y="148" width="265" height="148" rx="12" ry="12" fill="url(#bgGreen)" stroke="#27AE60" stroke-width="2" filter="url(#shadow)"/>

  <!-- Testing 카테고리 헤더 -->
  <rect x="515" y="148" width="265" height="38" rx="12" ry="12" fill="url(#nodeGreen)"/>
  <rect x="515" y="168" width="265" height="18" fill="url(#nodeGreen)"/>
  <text x="648" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Testing</text>
  <text x="648" y="187" text-anchor="middle" font-size="10" fill="#D5F5E3">1 Skill</text>

  <!-- test-driven-development (Iron Law) -->
  <rect x="529" y="200" width="237" height="56" rx="7" ry="7" fill="#FFFFFF" stroke="#E74C3C" stroke-width="2" filter="url(#shadow)"/>
  <text x="647" y="221" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">test-driven-development</text>
  <rect x="542" y="229" width="210" height="18" rx="9" ry="9" fill="#FADBD8"/>
  <text x="647" y="242" text-anchor="middle" font-size="9" font-weight="600" fill="#C0392B">Iron Law: NO CODE WITHOUT</text>
  <text x="647" y="252" text-anchor="middle" font-size="9" font-weight="600" fill="#C0392B">FAILING TEST</text>

  <!-- ===================== DEBUGGING 그룹 (왼쪽 아래) ===================== -->
  <rect x="20" y="318" width="265" height="202" rx="12" ry="12" fill="url(#bgRed)" stroke="#E74C3C" stroke-width="2" filter="url(#shadow)"/>

  <!-- Debugging 카테고리 헤더 -->
  <rect x="20" y="318" width="265" height="38" rx="12" ry="12" fill="url(#nodeRed)"/>
  <rect x="20" y="338" width="265" height="18" fill="url(#nodeRed)"/>
  <text x="152" y="342" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Debugging</text>
  <text x="152" y="357" text-anchor="middle" font-size="10" fill="#FADBD8">2 Skills</text>

  <!-- systematic-debugging (Iron Law) -->
  <rect x="34" y="370" width="237" height="56" rx="7" ry="7" fill="#FFFFFF" stroke="#E74C3C" stroke-width="2" filter="url(#shadow)"/>
  <text x="152" y="391" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">systematic-debugging</text>
  <rect x="47" y="400" width="210" height="18" rx="9" ry="9" fill="#FADBD8"/>
  <text x="152" y="411" text-anchor="middle" font-size="9" font-weight="600" fill="#C0392B">Iron Law: NO FIXES WITHOUT</text>
  <text x="152" y="421" text-anchor="middle" font-size="9" font-weight="600" fill="#C0392B">ROOT CAUSE</text>

  <!-- verification-before-completion (Iron Law) -->
  <rect x="34" y="438" width="237" height="56" rx="7" ry="7" fill="#FFFFFF" stroke="#E74C3C" stroke-width="2" filter="url(#shadow)"/>
  <text x="152" y="459" text-anchor="middle" font-size="11" font-weight="700" fill="#2C3E50">verification-before-completion</text>
  <rect x="47" y="468" width="210" height="18" rx="9" ry="9" fill="#FADBD8"/>
  <text x="152" y="479" text-anchor="middle" font-size="9" font-weight="600" fill="#C0392B">Iron Law: NO CLAIMS WITHOUT</text>
  <text x="152" y="489" text-anchor="middle" font-size="9" font-weight="600" fill="#C0392B">EVIDENCE</text>

  <!-- ===================== COLLABORATION 그룹 (오른쪽 아래) ===================== -->
  <rect x="515" y="318" width="265" height="298" rx="12" ry="12" fill="url(#bgBlue)" stroke="#2980B9" stroke-width="2" filter="url(#shadow)"/>

  <!-- Collaboration 카테고리 헤더 -->
  <rect x="515" y="318" width="265" height="38" rx="12" ry="12" fill="url(#nodeBlue)"/>
  <rect x="515" y="338" width="265" height="18" fill="url(#nodeBlue)"/>
  <text x="648" y="342" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Collaboration</text>
  <text x="648" y="357" text-anchor="middle" font-size="10" fill="#D6EAF8">9 Skills</text>

  <!-- brainstorming -->
  <rect x="529" y="368" width="237" height="28" rx="6" ry="6" fill="#FFFFFF" stroke="#AED6F1" stroke-width="1.2"/>
  <text x="547" y="387" font-size="11" fill="#2C3E50">brainstorming</text>

  <!-- writing-plans -->
  <rect x="529" y="402" width="237" height="28" rx="6" ry="6" fill="#FFFFFF" stroke="#AED6F1" stroke-width="1.2"/>
  <text x="547" y="421" font-size="11" fill="#2C3E50">writing-plans</text>

  <!-- executing-plans -->
  <rect x="529" y="436" width="237" height="28" rx="6" ry="6" fill="#FFFFFF" stroke="#AED6F1" stroke-width="1.2"/>
  <text x="547" y="455" font-size="11" fill="#2C3E50">executing-plans</text>

  <!-- subagent-driven-development -->
  <rect x="529" y="470" width="237" height="28" rx="6" ry="6" fill="#FFFFFF" stroke="#AED6F1" stroke-width="1.2"/>
  <text x="547" y="489" font-size="11" fill="#2C3E50">subagent-driven-development</text>

  <!-- dispatching-parallel-agents -->
  <rect x="529" y="504" width="237" height="28" rx="6" ry="6" fill="#FFFFFF" stroke="#AED6F1" stroke-width="1.2"/>
  <text x="547" y="523" font-size="11" fill="#2C3E50">dispatching-parallel-agents</text>

  <!-- using-git-worktrees -->
  <rect x="529" y="538" width="237" height="28" rx="6" ry="6" fill="#FFFFFF" stroke="#AED6F1" stroke-width="1.2"/>
  <text x="547" y="557" font-size="11" fill="#2C3E50">using-git-worktrees</text>

  <!-- finishing-a-development-branch -->
  <rect x="529" y="572" width="237" height="28" rx="6" ry="6" fill="#FFFFFF" stroke="#AED6F1" stroke-width="1.2"/>
  <text x="547" y="591" font-size="11" fill="#2C3E50">finishing-a-development-branch</text>

  <!-- requesting-code-review -->
  <rect x="529" y="606" width="114" height="28" rx="6" ry="6" fill="#FFFFFF" stroke="#AED6F1" stroke-width="1.2"/>
  <text x="547" y="625" font-size="11" fill="#2C3E50">requesting-code-review</text>

  <!-- receiving-code-review -->
  <rect x="651" y="606" width="115" height="28" rx="6" ry="6" fill="#FFFFFF" stroke="#AED6F1" stroke-width="1.2"/>
  <text x="669" y="625" font-size="11" fill="#2C3E50">receiving-code-review</text>

  <!-- ===================== 하단 범례 ===================== -->
  <rect x="20" y="540" width="480" height="80" rx="10" ry="10" fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1.2"/>
  <text x="35" y="562" font-size="11" font-weight="700" fill="#2C3E50">범례</text>

  <!-- 회색 -->
  <rect x="35" y="572" width="14" height="14" rx="3" ry="3" fill="url(#nodeGray)"/>
  <text x="55" y="584" font-size="10" fill="#2C3E50">Meta</text>

  <!-- 초록 -->
  <rect x="105" y="572" width="14" height="14" rx="3" ry="3" fill="url(#nodeGreen)"/>
  <text x="125" y="584" font-size="10" fill="#2C3E50">Testing</text>

  <!-- 빨강 -->
  <rect x="185" y="572" width="14" height="14" rx="3" ry="3" fill="url(#nodeRed)"/>
  <text x="205" y="584" font-size="10" fill="#2C3E50">Debugging</text>

  <!-- 파랑 -->
  <rect x="285" y="572" width="14" height="14" rx="3" ry="3" fill="url(#nodeBlue)"/>
  <text x="305" y="584" font-size="10" fill="#2C3E50">Collaboration</text>

  <!-- Iron Law 표시 -->
  <rect x="35" y="597" width="14" height="14" rx="3" ry="3" fill="#FFFFFF" stroke="#E74C3C" stroke-width="2"/>
  <text x="55" y="609" font-size="10" fill="#2C3E50">Iron Law 스킬 (빨간 테두리)</text>

  <!-- auto-trigger -->
  <rect x="245" y="597" width="58" height="14" rx="7" ry="7" fill="#7F8C8D"/>
  <text x="274" y="609" text-anchor="middle" font-size="9" fill="#FFFFFF">auto-trigger</text>
  <text x="310" y="609" font-size="10" fill="#2C3E50"> 자동 트리거 스킬</text>
</svg>
