<svg viewBox="0 0 600 580" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <!-- 파랑 (시작/기본) -->
    <linearGradient id="nodeBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB"/>
      <stop offset="100%" style="stop-color:#2980B9"/>
    </linearGradient>
    <!-- 초록 (성공/true) -->
    <linearGradient id="nodeGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71"/>
      <stop offset="100%" style="stop-color:#27AE60"/>
    </linearGradient>
    <!-- 빨강 (false/종료) -->
    <linearGradient id="nodeRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C"/>
      <stop offset="100%" style="stop-color:#C0392B"/>
    </linearGradient>
    <!-- 주황 (판별 단계) -->
    <linearGradient id="nodeOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22"/>
      <stop offset="100%" style="stop-color:#D35400"/>
    </linearGradient>
    <!-- 보라 (결과/액션) -->
    <linearGradient id="nodePurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#8E44AD"/>
    </linearGradient>
    <!-- 다이아몬드 -->
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F39C12"/>
      <stop offset="100%" style="stop-color:#E67E22"/>
    </linearGradient>
    <!-- 파란 다이아몬드 -->
    <linearGradient id="diamondBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5DADE2"/>
      <stop offset="100%" style="stop-color:#2E86C1"/>
    </linearGradient>
    <!-- 드롭섀도우 -->
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#00000033"/>
    </filter>
    <!-- 화살표 마커 -->
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7F8C8D"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27AE60"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C0392B"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980B9"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8E44AD"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="600" height="580" fill="#F8F9FA" rx="12"/>

  <!-- 제목 -->
  <text x="300" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C3E50">has_ui 판별 로직</text>
  <line x1="120" y1="42" x2="480" y2="42" stroke="#BDC3C7" stroke-width="1"/>

  <!-- ===== 시작: 프로젝트 유형 판별 ===== -->
  <g filter="url(#shadow)">
    <rect x="175" y="58" width="250" height="46" rx="10" fill="url(#nodeBlue)"/>
  </g>
  <text x="300" y="77" text-anchor="middle" font-size="13" font-weight="bold" fill="white">프로젝트 유형 판별</text>
  <text x="300" y="94" text-anchor="middle" font-size="10" fill="#D6EAF8">변경 파일 및 디렉토리 분석</text>

  <!-- 시작 → 다이아몬드1 -->
  <line x1="300" y1="104" x2="300" y2="148" stroke="#7F8C8D" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== 다이아몬드 1: 프론트엔드? ===== -->
  <polygon points="300,150 368,185 300,220 232,185" fill="url(#diamondBlue)" filter="url(#shadow)"/>
  <text x="300" y="181" text-anchor="middle" font-size="12" font-weight="bold" fill="white">프론트엔드</text>
  <text x="300" y="197" text-anchor="middle" font-size="10" fill="#EAF4FB">프로젝트?</text>

  <!-- 다이아몬드1 Yes → has_ui: true (오른쪽) -->
  <line x1="368" y1="185" x2="440" y2="185" stroke="#27AE60" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="398" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#27AE60">Yes</text>

  <!-- has_ui: true 박스 (오른쪽 1) -->
  <g filter="url(#shadow)">
    <rect x="440" y="163" width="115" height="44" rx="8" fill="url(#nodeGreen)"/>
  </g>
  <text x="498" y="181" text-anchor="middle" font-size="12" font-weight="bold" fill="white">has_ui: true</text>
  <text x="498" y="197" text-anchor="middle" font-size="9" fill="#D5F5E3">QA Phase 실행</text>

  <!-- 다이아몬드1 No → 다이아몬드2 (아래쪽) -->
  <line x1="300" y1="220" x2="300" y2="268" stroke="#7F8C8D" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="312" y="248" font-size="11" font-weight="bold" fill="#7F8C8D">No</text>

  <!-- ===== 다이아몬드 2: 파일 확장자 체크 ===== -->
  <polygon points="300,270 368,310 300,350 232,310" fill="url(#diamondGrad)" filter="url(#shadow)"/>
  <text x="300" y="303" text-anchor="middle" font-size="11" font-weight="bold" fill="white">변경 파일에</text>
  <text x="300" y="318" text-anchor="middle" font-size="10" fill="#FEF9E7">UI 확장자 포함?</text>

  <!-- 확장자 힌트 박스 (왼쪽) -->
  <rect x="20" y="275" width="190" height="75" rx="7" fill="#FEF9E7" stroke="#F39C12" stroke-width="1.5"/>
  <text x="115" y="293" text-anchor="middle" font-size="10" font-weight="bold" fill="#D35400">감지 대상 확장자</text>
  <text x="30" y="309" font-size="10" fill="#7F8C8D">*.jsp  *.html  *.css</text>
  <text x="30" y="325" font-size="10" fill="#7F8C8D">*.js   *.ts   *.tsx</text>
  <text x="30" y="341" font-size="10" fill="#7F8C8D">*.vue  *.svelte</text>

  <!-- 확장자 힌트 박스 → 다이아몬드2 연결선 -->
  <line x1="210" y1="312" x2="230" y2="312" stroke="#F39C12" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 다이아몬드2 Yes → has_ui: true (오른쪽) -->
  <line x1="368" y1="310" x2="440" y2="310" stroke="#27AE60" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="398" y="303" text-anchor="middle" font-size="11" font-weight="bold" fill="#27AE60">Yes</text>

  <!-- has_ui: true 박스 (오른쪽 2) -->
  <g filter="url(#shadow)">
    <rect x="440" y="288" width="115" height="44" rx="8" fill="url(#nodeGreen)"/>
  </g>
  <text x="498" y="306" text-anchor="middle" font-size="12" font-weight="bold" fill="white">has_ui: true</text>
  <text x="498" y="322" text-anchor="middle" font-size="9" fill="#D5F5E3">QA Phase 실행</text>

  <!-- 두 has_ui true 박스를 하나의 결과로 합치는 선 -->
  <line x1="498" y1="207" x2="498" y2="288" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 다이아몬드2 No → has_ui: false (아래) -->
  <line x1="300" y1="350" x2="300" y2="398" stroke="#C0392B" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="312" y="378" font-size="11" font-weight="bold" fill="#C0392B">No</text>

  <!-- ===== has_ui: false 박스 ===== -->
  <g filter="url(#shadow)">
    <rect x="175" y="398" width="250" height="46" rx="10" fill="url(#nodeRed)"/>
  </g>
  <text x="300" y="417" text-anchor="middle" font-size="13" font-weight="bold" fill="white">has_ui: false</text>
  <text x="300" y="433" text-anchor="middle" font-size="10" fill="#FADBD8">QA Phase 생략</text>

  <!-- has_ui: false → 결과 파이프라인 (아래) -->
  <line x1="300" y1="444" x2="300" y2="470" stroke="#7F8C8D" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== 결과 파이프라인 (수평 배치) ===== -->
  <!-- 파이프라인 컨테이너 -->
  <rect x="40" y="470" width="520" height="60" rx="10" fill="#EBF5FB" stroke="#2980B9" stroke-width="1.5"/>

  <!-- 테스트 커버리지 -->
  <g filter="url(#shadow)">
    <rect x="58" y="482" width="115" height="36" rx="7" fill="url(#nodeGreen)"/>
  </g>
  <text x="116" y="497" text-anchor="middle" font-size="10" font-weight="bold" fill="white">테스트 커버리지</text>
  <text x="116" y="511" text-anchor="middle" font-size="9" fill="#D5F5E3">/test-coverage-check</text>

  <!-- 화살표 -->
  <line x1="173" y1="500" x2="198" y2="500" stroke="#7F8C8D" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 코드 리뷰 -->
  <g filter="url(#shadow)">
    <rect x="198" y="482" width="100" height="36" rx="7" fill="url(#nodeGreen)"/>
  </g>
  <text x="248" y="497" text-anchor="middle" font-size="10" font-weight="bold" fill="white">코드 리뷰</text>
  <text x="248" y="511" text-anchor="middle" font-size="9" fill="#D5F5E3">/self-review</text>

  <!-- 화살표 -->
  <line x1="298" y1="500" x2="323" y2="500" stroke="#7F8C8D" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- PR 직행 -->
  <g filter="url(#shadow)">
    <rect x="323" y="482" width="90" height="36" rx="7" fill="url(#nodePurple)"/>
  </g>
  <text x="368" y="497" text-anchor="middle" font-size="10" font-weight="bold" fill="white">PR 직행</text>
  <text x="368" y="511" text-anchor="middle" font-size="9" fill="#E8DAEF">/pr</text>

  <!-- 화살표 -->
  <line x1="413" y1="500" x2="438" y2="500" stroke="#7F8C8D" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Confluence -->
  <g filter="url(#shadow)">
    <rect x="438" y="482" width="100" height="36" rx="7" fill="url(#nodePurple)"/>
  </g>
  <text x="488" y="497" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Confluence</text>
  <text x="488" y="511" text-anchor="middle" font-size="9" fill="#E8DAEF">/work-log</text>

  <!-- 파이프라인 레이블 -->
  <text x="300" y="550" text-anchor="middle" font-size="10" fill="#7F8C8D">has_ui: false 시 위 순서로 실행 (QA Phase 없이 자동 진행)</text>

  <!-- ===== 하단 구분 텍스트 ===== -->
  <text x="300" y="572" text-anchor="middle" font-size="9" fill="#BDC3C7">has_ui Detection · Track 워크플로우 연동</text>
</svg>
