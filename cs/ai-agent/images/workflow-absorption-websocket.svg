<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 420" width="750" height="420" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#2C3E50" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E74C3C"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#27AE60"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3498DB"/>
      <stop offset="100%" stop-color="#2980B9"/>
    </linearGradient>
    <!-- 화살표 마커 -->
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#E74C3C"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#27AE60"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#7F8C8D"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="750" height="420" rx="12" fill="#ECF0F1"/>

  <!-- 타이틀 -->
  <text x="375" y="32" text-anchor="middle" fill="#2C3E50" font-size="18" font-weight="bold">HTTP vs WebSocket 에이전트 통신 비교</text>

  <!-- 구분선 -->
  <line x1="375" y1="48" x2="375" y2="385" stroke="#BDC3C7" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="375" y="404" text-anchor="middle" fill="#95A5A6" font-size="11">VS</text>

  <!-- ========== 좌측: 기존 HTTP 방식 ========== -->
  <g transform="translate(20, 48)">
    <!-- 제목 바 -->
    <rect width="335" height="32" rx="6" fill="url(#redGrad)"/>
    <text x="167" y="21" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">기존 HTTP 방식</text>

    <!-- 클라이언트 / 서버 레이블 -->
    <text x="70" y="58" text-anchor="middle" fill="#2C3E50" font-size="11" font-weight="600">클라이언트 (CLI)</text>
    <text x="260" y="58" text-anchor="middle" fill="#2C3E50" font-size="11" font-weight="600">서버 (API)</text>

    <!-- 클라이언트 라이프라인 -->
    <line x1="70" y1="65" x2="70" y2="290" stroke="#7F8C8D" stroke-width="1.5" stroke-dasharray="4,3"/>
    <!-- 서버 라이프라인 -->
    <line x1="260" y1="65" x2="260" y2="290" stroke="#7F8C8D" stroke-width="1.5" stroke-dasharray="4,3"/>

    <!-- 도구 호출 1 -->
    <g transform="translate(0, 70)">
      <rect x="60" y="0" width="20" height="55" rx="3" fill="rgba(231,76,60,0.15)" stroke="#E74C3C" stroke-width="1"/>
      <rect x="250" y="0" width="20" height="55" rx="3" fill="rgba(231,76,60,0.15)" stroke="#E74C3C" stroke-width="1"/>
      <!-- 연결 생성 -->
      <line x1="80" y1="8" x2="250" y2="8" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#arrowRed)"/>
      <text x="165" y="5" text-anchor="middle" fill="#C0392B" font-size="9">연결 생성 + 전체 맥락 전송</text>
      <!-- 응답 -->
      <line x1="250" y1="28" x2="80" y2="28" stroke="#7F8C8D" stroke-width="1.5" marker-end="url(#arrowGray)"/>
      <text x="165" y="25" text-anchor="middle" fill="#7F8C8D" font-size="9">응답</text>
      <!-- 연결 종료 -->
      <text x="165" y="50" text-anchor="middle" fill="#E74C3C" font-size="9" font-style="italic">연결 종료 ✕</text>
      <!-- 호출 번호 -->
      <text x="18" y="30" fill="#C0392B" font-size="10" font-weight="bold">#1</text>
    </g>

    <!-- 도구 호출 2 (화살표 더 굵게 - 맥락 커짐) -->
    <g transform="translate(0, 140)">
      <rect x="60" y="0" width="20" height="55" rx="3" fill="rgba(231,76,60,0.2)" stroke="#E74C3C" stroke-width="1"/>
      <rect x="250" y="0" width="20" height="55" rx="3" fill="rgba(231,76,60,0.2)" stroke="#E74C3C" stroke-width="1"/>
      <line x1="80" y1="8" x2="250" y2="8" stroke="#E74C3C" stroke-width="2.5" marker-end="url(#arrowRed)"/>
      <text x="165" y="5" text-anchor="middle" fill="#C0392B" font-size="9">연결 생성 + 전체 맥락 재전송</text>
      <line x1="250" y1="28" x2="80" y2="28" stroke="#7F8C8D" stroke-width="1.5" marker-end="url(#arrowGray)"/>
      <text x="165" y="25" text-anchor="middle" fill="#7F8C8D" font-size="9">응답</text>
      <text x="165" y="50" text-anchor="middle" fill="#E74C3C" font-size="9" font-style="italic">연결 종료 ✕</text>
      <text x="18" y="30" fill="#C0392B" font-size="10" font-weight="bold">#2</text>
    </g>

    <!-- 도구 호출 3 (화살표 더 굵게) -->
    <g transform="translate(0, 210)">
      <rect x="60" y="0" width="20" height="55" rx="3" fill="rgba(231,76,60,0.25)" stroke="#E74C3C" stroke-width="1"/>
      <rect x="250" y="0" width="20" height="55" rx="3" fill="rgba(231,76,60,0.25)" stroke="#E74C3C" stroke-width="1"/>
      <line x1="80" y1="8" x2="250" y2="8" stroke="#E74C3C" stroke-width="4" marker-end="url(#arrowRed)"/>
      <text x="165" y="5" text-anchor="middle" fill="#C0392B" font-size="9">연결 생성 + 전체 맥락 재전송 (점점 커짐!)</text>
      <line x1="250" y1="28" x2="80" y2="28" stroke="#7F8C8D" stroke-width="1.5" marker-end="url(#arrowGray)"/>
      <text x="165" y="25" text-anchor="middle" fill="#7F8C8D" font-size="9">응답</text>
      <text x="165" y="50" text-anchor="middle" fill="#E74C3C" font-size="9" font-style="italic">연결 종료 ✕</text>
      <text x="18" y="30" fill="#C0392B" font-size="10" font-weight="bold">#3</text>
    </g>

    <!-- 반복 오버헤드 강조 -->
    <rect x="28" y="294" width="285" height="38" rx="8" fill="rgba(231,76,60,0.1)" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="170" y="310" text-anchor="middle" fill="#C0392B" font-size="11" font-weight="bold">도구 호출 20회 → 전체 맥락 20번 재전송</text>
    <text x="170" y="326" text-anchor="middle" fill="#C0392B" font-size="10">반복되는 연결 오버헤드</text>
  </g>

  <!-- ========== 우측: WebSocket 방식 ========== -->
  <g transform="translate(395, 48)">
    <!-- 제목 바 -->
    <rect width="335" height="32" rx="6" fill="url(#greenGrad)"/>
    <text x="167" y="21" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">WebSocket 방식</text>

    <!-- 클라이언트 / 서버 레이블 -->
    <text x="70" y="58" text-anchor="middle" fill="#2C3E50" font-size="11" font-weight="600">클라이언트 (CLI)</text>
    <text x="260" y="58" text-anchor="middle" fill="#2C3E50" font-size="11" font-weight="600">서버 (API)</text>

    <!-- 클라이언트 라이프라인 -->
    <line x1="70" y1="65" x2="70" y2="290" stroke="#7F8C8D" stroke-width="1.5" stroke-dasharray="4,3"/>
    <!-- 서버 라이프라인 -->
    <line x1="260" y1="65" x2="260" y2="290" stroke="#7F8C8D" stroke-width="1.5" stroke-dasharray="4,3"/>

    <!-- 최초 연결 1회 -->
    <g transform="translate(0, 70)">
      <line x1="80" y1="8" x2="250" y2="8" stroke="#27AE60" stroke-width="2" marker-end="url(#arrowGreen)"/>
      <text x="165" y="4" text-anchor="middle" fill="#27AE60" font-size="10" font-weight="bold">연결 1회 (WebSocket Handshake)</text>
    </g>

    <!-- 지속 연결 바 (서버 인메모리 상태) -->
    <rect x="250" y="86" width="24" height="185" rx="4" fill="rgba(46,204,113,0.2)" stroke="#27AE60" stroke-width="1.5"/>
    <text x="262" y="185" text-anchor="middle" fill="#27AE60" font-size="9" font-weight="bold" transform="rotate(-90, 262, 185)">서버 인메모리 상태 유지</text>

    <!-- 클라이언트 활성 바 -->
    <rect x="60" y="86" width="20" height="185" rx="4" fill="rgba(46,204,113,0.1)" stroke="#27AE60" stroke-width="1"/>

    <!-- 도구 호출 1 -->
    <g transform="translate(0, 96)">
      <line x1="80" y1="0" x2="250" y2="0" stroke="#27AE60" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
      <text x="165" y="-4" text-anchor="middle" fill="#2C3E50" font-size="9">새 입력만 전송</text>
      <line x1="250" y1="16" x2="80" y2="16" stroke="#7F8C8D" stroke-width="1" marker-end="url(#arrowGray)"/>
      <text x="15" y="10" fill="#27AE60" font-size="10" font-weight="bold">#1</text>
    </g>

    <!-- 도구 호출 2 -->
    <g transform="translate(0, 140)">
      <line x1="80" y1="0" x2="250" y2="0" stroke="#27AE60" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
      <text x="165" y="-4" text-anchor="middle" fill="#2C3E50" font-size="9">새 입력만 전송</text>
      <line x1="250" y1="16" x2="80" y2="16" stroke="#7F8C8D" stroke-width="1" marker-end="url(#arrowGray)"/>
      <text x="15" y="10" fill="#27AE60" font-size="10" font-weight="bold">#2</text>
    </g>

    <!-- 도구 호출 3 -->
    <g transform="translate(0, 184)">
      <line x1="80" y1="0" x2="250" y2="0" stroke="#27AE60" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
      <text x="165" y="-4" text-anchor="middle" fill="#2C3E50" font-size="9">새 입력만 전송</text>
      <line x1="250" y1="16" x2="80" y2="16" stroke="#7F8C8D" stroke-width="1" marker-end="url(#arrowGray)"/>
      <text x="15" y="10" fill="#27AE60" font-size="10" font-weight="bold">#3</text>
    </g>

    <!-- 생략 표시 -->
    <text x="165" y="228" text-anchor="middle" fill="#95A5A6" font-size="14">...</text>

    <!-- 도구 호출 N -->
    <g transform="translate(0, 240)">
      <line x1="80" y1="0" x2="250" y2="0" stroke="#27AE60" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
      <text x="165" y="-4" text-anchor="middle" fill="#2C3E50" font-size="9">새 입력만 전송</text>
      <line x1="250" y1="16" x2="80" y2="16" stroke="#7F8C8D" stroke-width="1" marker-end="url(#arrowGray)"/>
      <text x="15" y="10" fill="#27AE60" font-size="10" font-weight="bold">#N</text>
    </g>

    <!-- 효율적 강조 -->
    <rect x="28" y="294" width="285" height="38" rx="8" fill="rgba(46,204,113,0.12)" stroke="#27AE60" stroke-width="1.5"/>
    <text x="170" y="310" text-anchor="middle" fill="#27AE60" font-size="11" font-weight="bold">최대 1시간 유지, 20~40% 빨라짐</text>
    <text x="170" y="326" text-anchor="middle" fill="#27AE60" font-size="10">연결 1회 + 증분 전송 = 효율적</text>
  </g>

  <!-- 하단 범례 -->
  <g transform="translate(200, 400)">
    <rect x="0" y="-8" width="12" height="12" rx="2" fill="#E74C3C" opacity="0.7"/>
    <text x="16" y="2" fill="#2C3E50" font-size="10">비효율 (매번 재전송)</text>
    <rect x="160" y="-8" width="12" height="12" rx="2" fill="#2ECC71" opacity="0.7"/>
    <text x="176" y="2" fill="#2C3E50" font-size="10">효율 (증분 전송)</text>
  </g>
</svg>