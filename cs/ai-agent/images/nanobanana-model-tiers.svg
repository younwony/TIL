<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480">
  <defs>
    <!-- 파랑 (flash) -->
    <linearGradient id="nodeBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB"/>
      <stop offset="100%" style="stop-color:#2980B9"/>
    </linearGradient>
    <!-- 초록 (nb2 권장) -->
    <linearGradient id="nodeGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71"/>
      <stop offset="100%" style="stop-color:#27AE60"/>
    </linearGradient>
    <!-- 보라 (pro) -->
    <linearGradient id="nodePurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#8E44AD"/>
    </linearGradient>
    <!-- 빨강 (X 표시용) -->
    <linearGradient id="nodeRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C"/>
      <stop offset="100%" style="stop-color:#C0392B"/>
    </linearGradient>
    <!-- 헤더 배경 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50"/>
      <stop offset="100%" style="stop-color:#1A252F"/>
    </linearGradient>
    <!-- 카드 그림자 -->
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000025"/>
    </filter>
    <!-- 추천 뱃지 그림자 -->
    <filter id="badgeShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#27AE6060"/>
    </filter>
    <!-- 체크 마커 -->
    <marker id="none" markerWidth="1" markerHeight="1" refX="0" refY="0"/>
  </defs>

  <!-- 전체 배경 -->
  <rect width="820" height="480" fill="#F8FAFC" rx="14"/>

  <!-- 상단 타이틀 영역 -->
  <rect x="0" y="0" width="820" height="70" fill="url(#headerGrad)" rx="14"/>
  <rect x="0" y="50" width="820" height="20" fill="url(#headerGrad)"/>
  <text x="410" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">Nano Banana 모델 티어 비교</text>
  <text x="410" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#BDC3C7">flash  /  nb2  /  pro — Gemini 기반 이미지 생성 모델 선택 가이드</text>

  <!-- ===== 행 레이블 (왼쪽 세로 열) ===== -->
  <!-- 배경 -->
  <rect x="20" y="90" width="155" height="360" fill="#ECF0F1" rx="10" filter="url(#cardShadow)"/>
  <!-- 행 레이블 헤더 -->
  <rect x="20" y="90" width="155" height="44" fill="#95A5A6" rx="10"/>
  <rect x="20" y="114" width="155" height="20" fill="#95A5A6"/>
  <text x="97" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">비교 항목</text>

  <!-- 행 구분선 및 레이블 -->
  <line x1="20" y1="134" x2="175" y2="134" stroke="#BDC3C7" stroke-width="1"/>
  <text x="97" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2C3E50">내부 모델명</text>

  <line x1="20" y1="180" x2="175" y2="180" stroke="#BDC3C7" stroke-width="1"/>
  <text x="97" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2C3E50">최대 해상도</text>

  <line x1="20" y1="224" x2="175" y2="224" stroke="#BDC3C7" stroke-width="1"/>
  <text x="97" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2C3E50">생성 속도</text>

  <line x1="20" y1="268" x2="175" y2="268" stroke="#BDC3C7" stroke-width="1"/>
  <text x="97" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2C3E50">Grounding 지원</text>

  <line x1="20" y1="312" x2="175" y2="312" stroke="#BDC3C7" stroke-width="1"/>
  <text x="97" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2C3E50">권장 용도</text>

  <line x1="20" y1="400" x2="175" y2="400" stroke="#BDC3C7" stroke-width="1"/>
  <text x="97" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2C3E50">과금 비용</text>

  <!-- ===== FLASH 카드 ===== -->
  <rect x="190" y="90" width="190" height="360" fill="#EBF5FB" rx="10" filter="url(#cardShadow)"/>
  <!-- 헤더 -->
  <rect x="190" y="90" width="190" height="44" fill="url(#nodeBlue)" rx="10"/>
  <rect x="190" y="114" width="190" height="20" fill="url(#nodeBlue)"/>
  <text x="285" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">flash</text>
  <text x="285" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#D6EAF8">빠른 프로토타이핑</text>

  <!-- 내부 모델명 -->
  <line x1="190" y1="134" x2="380" y2="134" stroke="#AED6F1" stroke-width="1"/>
  <text x="285" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Gemini 2.5</text>
  <text x="285" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Flash Image</text>

  <!-- 해상도 -->
  <line x1="190" y1="180" x2="380" y2="180" stroke="#AED6F1" stroke-width="1"/>
  <text x="285" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3498DB">1024 px</text>

  <!-- 속도 -->
  <line x1="190" y1="224" x2="380" y2="224" stroke="#AED6F1" stroke-width="1"/>
  <!-- 속도 바 (빠름 - 3칸) -->
  <rect x="235" y="238" width="24" height="12" rx="3" fill="#3498DB"/>
  <rect x="263" y="238" width="24" height="12" rx="3" fill="#3498DB"/>
  <rect x="291" y="238" width="24" height="12" rx="3" fill="#3498DB"/>
  <text x="285" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">빠름</text>

  <!-- Grounding -->
  <line x1="190" y1="268" x2="380" y2="268" stroke="#AED6F1" stroke-width="1"/>
  <!-- X 뱃지 -->
  <circle cx="285" cy="292" r="13" fill="url(#nodeRed)" opacity="0.9"/>
  <text x="285" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">X</text>

  <!-- 권장 용도 -->
  <line x1="190" y1="312" x2="380" y2="312" stroke="#AED6F1" stroke-width="1"/>
  <text x="285" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">아이디어 검증</text>
  <text x="285" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">빠른 프로토타입</text>
  <text x="285" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">저화질 미리보기</text>

  <!-- 비용 -->
  <line x1="190" y1="400" x2="380" y2="400" stroke="#AED6F1" stroke-width="1"/>
  <text x="285" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3498DB">$</text>

  <!-- ===== NB2 카드 (권장) ===== -->
  <!-- 추천 뱃지 (카드 위) -->
  <rect x="393" y="72" width="184" height="22" rx="11" fill="url(#nodeGreen)" filter="url(#badgeShadow)"/>
  <text x="485" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">★ 기본 권장</text>

  <rect x="400" y="90" width="170" height="360" fill="#EAFAF1" rx="10" filter="url(#cardShadow)"/>
  <!-- 강조 테두리 -->
  <rect x="398" y="88" width="174" height="364" rx="11" fill="none" stroke="#2ECC71" stroke-width="2.5"/>
  <!-- 헤더 -->
  <rect x="400" y="90" width="170" height="44" fill="url(#nodeGreen)" rx="10"/>
  <rect x="400" y="114" width="170" height="20" fill="url(#nodeGreen)"/>
  <text x="485" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">nb2</text>
  <text x="485" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#D5F5E3">균형잡힌 선택</text>

  <!-- 내부 모델명 -->
  <line x1="400" y1="134" x2="570" y2="134" stroke="#A9DFBF" stroke-width="1"/>
  <text x="485" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Gemini 3.1</text>
  <text x="485" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Flash Image</text>

  <!-- 해상도 -->
  <line x1="400" y1="180" x2="570" y2="180" stroke="#A9DFBF" stroke-width="1"/>
  <text x="485" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#27AE60">4K</text>

  <!-- 속도 -->
  <line x1="400" y1="224" x2="570" y2="224" stroke="#A9DFBF" stroke-width="1"/>
  <rect x="435" y="238" width="22" height="12" rx="3" fill="#2ECC71"/>
  <rect x="461" y="238" width="22" height="12" rx="3" fill="#2ECC71"/>
  <rect x="487" y="238" width="22" height="12" rx="3" fill="#2ECC71"/>
  <text x="485" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">빠름</text>

  <!-- Grounding -->
  <line x1="400" y1="268" x2="570" y2="268" stroke="#A9DFBF" stroke-width="1"/>
  <circle cx="485" cy="292" r="13" fill="url(#nodeGreen)" opacity="0.9"/>
  <text x="485" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">O</text>

  <!-- 권장 용도 -->
  <line x1="400" y1="312" x2="570" y2="312" stroke="#A9DFBF" stroke-width="1"/>
  <text x="485" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">일반 이미지 생성</text>
  <text x="485" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">고해상도 출력</text>
  <text x="485" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#27AE60">대부분의 작업</text>

  <!-- 비용 -->
  <line x1="400" y1="400" x2="570" y2="400" stroke="#A9DFBF" stroke-width="1"/>
  <text x="485" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#27AE60">$$</text>

  <!-- ===== PRO 카드 ===== -->
  <rect x="590" y="90" width="210" height="360" fill="#F5EEF8" rx="10" filter="url(#cardShadow)"/>
  <!-- 헤더 -->
  <rect x="590" y="90" width="210" height="44" fill="url(#nodePurple)" rx="10"/>
  <rect x="590" y="114" width="210" height="20" fill="url(#nodePurple)"/>
  <text x="695" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">pro</text>
  <text x="695" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E8DAEF">최고 품질 출력</text>

  <!-- 내부 모델명 -->
  <line x1="590" y1="134" x2="800" y2="134" stroke="#D2B4DE" stroke-width="1"/>
  <text x="695" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Gemini 3</text>
  <text x="695" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Pro Image</text>

  <!-- 해상도 -->
  <line x1="590" y1="180" x2="800" y2="180" stroke="#D2B4DE" stroke-width="1"/>
  <text x="695" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8E44AD">4K</text>

  <!-- 속도 -->
  <line x1="590" y1="224" x2="800" y2="224" stroke="#D2B4DE" stroke-width="1"/>
  <rect x="645" y="238" width="22" height="12" rx="3" fill="#9B59B6"/>
  <rect x="671" y="238" width="22" height="12" rx="3" fill="#9B59B6"/>
  <rect x="697" y="238" width="22" height="12" rx="3" fill="#D2B4DE"/>
  <text x="695" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">보통</text>

  <!-- Grounding -->
  <line x1="590" y1="268" x2="800" y2="268" stroke="#D2B4DE" stroke-width="1"/>
  <circle cx="695" cy="292" r="13" fill="url(#nodeGreen)" opacity="0.9"/>
  <text x="695" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">O</text>

  <!-- 권장 용도 -->
  <line x1="590" y1="312" x2="800" y2="312" stroke="#D2B4DE" stroke-width="1"/>
  <text x="695" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">상업용 이미지</text>
  <text x="695" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">최고 품질 필요 시</text>
  <text x="695" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8E44AD">세밀한 표현 요구</text>

  <!-- 비용 -->
  <line x1="590" y1="400" x2="800" y2="400" stroke="#D2B4DE" stroke-width="1"/>
  <text x="695" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#8E44AD">$$$</text>

  <!-- ===== 하단 범례 ===== -->
  <!-- 속도 범례 -->
  <text x="30" y="468" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">속도 범례:</text>
  <rect x="85" y="458" width="11" height="7" rx="2" fill="#3498DB"/>
  <rect x="98" y="458" width="11" height="7" rx="2" fill="#3498DB"/>
  <rect x="111" y="458" width="11" height="7" rx="2" fill="#3498DB"/>
  <text x="125" y="468" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">빠름</text>
  <rect x="155" y="458" width="11" height="7" rx="2" fill="#9B59B6"/>
  <rect x="168" y="458" width="11" height="7" rx="2" fill="#9B59B6"/>
  <rect x="181" y="458" width="11" height="7" rx="2" fill="#D2B4DE"/>
  <text x="195" y="468" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">보통</text>

  <!-- Grounding 범례 -->
  <text x="290" y="468" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">Grounding: 검색 기반 실제 정보 반영 기능</text>

  <!-- 비용 범례 -->
  <text x="580" y="468" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">비용: $ (저) — $$ (중) — $$$ (고)</text>
</svg>
