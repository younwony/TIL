<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" font-family="Arial, sans-serif">
  <defs>
    <!-- 중앙 노드: 파랑 -->
    <linearGradient id="nodeBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB"/>
      <stop offset="100%" style="stop-color:#2980B9"/>
    </linearGradient>
    <!-- 보안: 빨강 -->
    <linearGradient id="nodeRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C"/>
      <stop offset="100%" style="stop-color:#C0392B"/>
    </linearGradient>
    <!-- 관찰가능성: 초록 -->
    <linearGradient id="nodeGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71"/>
      <stop offset="100%" style="stop-color:#27AE60"/>
    </linearGradient>
    <!-- 비용 제어: 주황 -->
    <linearGradient id="nodeOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22"/>
      <stop offset="100%" style="stop-color:#D35400"/>
    </linearGradient>
    <!-- 거버넌스: 보라 -->
    <linearGradient id="nodePurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#8E44AD"/>
    </linearGradient>
    <!-- 리프 노드 배경: 각 섹션별 연한 색 -->
    <linearGradient id="leafRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FADBD8"/>
      <stop offset="100%" style="stop-color:#F1948A"/>
    </linearGradient>
    <linearGradient id="leafGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D5F5E3"/>
      <stop offset="100%" style="stop-color:#A9DFBF"/>
    </linearGradient>
    <linearGradient id="leafOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FAE5D3"/>
      <stop offset="100%" style="stop-color:#F0B27A"/>
    </linearGradient>
    <linearGradient id="leafPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8DAEF"/>
      <stop offset="100%" style="stop-color:#C39BD3"/>
    </linearGradient>
    <!-- 그림자 -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="860" height="560" fill="#F8F9FA" rx="12"/>

  <!-- 제목 영역 -->
  <rect x="0" y="0" width="860" height="48" fill="url(#nodeBlue)" rx="12"/>
  <rect x="0" y="36" width="860" height="12" fill="url(#nodeBlue)"/>
  <text x="430" y="30" text-anchor="middle" fill="white" font-size="16" font-weight="bold">MCP Gateway 핵심 기능 맵</text>

  <!-- ===== 연결선 (노드보다 먼저) ===== -->

  <!-- 중앙 → 보안 (우상단) -->
  <line x1="395" y1="252" x2="260" y2="160" stroke="#E74C3C" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.7"/>
  <!-- 중앙 → 관찰가능성 (우하단) -->
  <line x1="465" y1="268" x2="610" y2="160" stroke="#27AE60" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.7"/>
  <!-- 중앙 → 비용 제어 (좌하단) -->
  <line x1="465" y1="295" x2="610" y2="400" stroke="#E67E22" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.7"/>
  <!-- 중앙 → 거버넌스 (좌상단) -->
  <line x1="395" y1="278" x2="250" y2="400" stroke="#8E44AD" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.7"/>

  <!-- 보안 → 리프들 -->
  <line x1="200" y1="148" x2="100" y2="100" stroke="#E74C3C" stroke-width="1.5" opacity="0.5"/>
  <line x1="220" y1="148" x2="160" y2="88" stroke="#E74C3C" stroke-width="1.5" opacity="0.5"/>
  <line x1="270" y1="142" x2="330" y2="88" stroke="#E74C3C" stroke-width="1.5" opacity="0.5"/>
  <line x1="300" y1="152" x2="390" y2="108" stroke="#E74C3C" stroke-width="1.5" opacity="0.5"/>

  <!-- 관찰가능성 → 리프들 -->
  <line x1="640" y1="148" x2="560" y2="88" stroke="#27AE60" stroke-width="1.5" opacity="0.5"/>
  <line x1="670" y1="148" x2="700" y2="88" stroke="#27AE60" stroke-width="1.5" opacity="0.5"/>
  <line x1="700" y1="158" x2="780" y2="108" stroke="#27AE60" stroke-width="1.5" opacity="0.5"/>
  <line x1="660" y1="165" x2="660" y2="212" stroke="#27AE60" stroke-width="1.5" opacity="0.5"/>

  <!-- 비용 제어 → 리프들 -->
  <line x1="640" y1="415" x2="570" y2="468" stroke="#E67E22" stroke-width="1.5" opacity="0.5"/>
  <line x1="670" y1="415" x2="720" y2="470" stroke="#E67E22" stroke-width="1.5" opacity="0.5"/>
  <line x1="700" y1="405" x2="790" y2="380" stroke="#E67E22" stroke-width="1.5" opacity="0.5"/>
  <line x1="645" y1="390" x2="640" y2="348" stroke="#E67E22" stroke-width="1.5" opacity="0.5"/>

  <!-- 거버넌스 → 리프들 -->
  <line x1="220" y1="415" x2="150" y2="470" stroke="#8E44AD" stroke-width="1.5" opacity="0.5"/>
  <line x1="250" y1="415" x2="250" y2="470" stroke="#8E44AD" stroke-width="1.5" opacity="0.5"/>
  <line x1="290" y1="405" x2="380" y2="360" stroke="#8E44AD" stroke-width="1.5" opacity="0.5"/>
  <line x1="215" y1="395" x2="110" y2="360" stroke="#8E44AD" stroke-width="1.5" opacity="0.5"/>

  <!-- ===== 중앙 노드 ===== -->
  <circle cx="430" cy="278" r="68" fill="url(#nodeBlue)" filter="url(#shadow)"/>
  <circle cx="430" cy="278" r="64" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
  <text x="430" y="270" text-anchor="middle" fill="white" font-size="15" font-weight="bold">MCP</text>
  <text x="430" y="288" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Gateway</text>

  <!-- ===== 보안 섹션 (우상단) ===== -->
  <!-- 보안 메인 노드 -->
  <rect x="158" y="118" width="164" height="44" rx="22" fill="url(#nodeRed)" filter="url(#shadow)"/>
  <text x="240" y="136" text-anchor="middle" fill="white" font-size="13" font-weight="bold">🔒 보안</text>
  <text x="240" y="153" text-anchor="middle" fill="white" font-size="10">Security</text>

  <!-- 보안 리프: 자격증명 관리 -->
  <rect x="28" y="72" width="130" height="32" rx="8" fill="url(#leafRed)" stroke="#E74C3C" stroke-width="1"/>
  <text x="93" y="92" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="bold">자격증명 관리</text>

  <!-- 보안 리프: mTLS -->
  <rect x="92" y="60" width="106" height="32" rx="8" fill="url(#leafRed)" stroke="#E74C3C" stroke-width="1"/>
  <text x="145" y="80" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="bold">mTLS 상호인증</text>

  <!-- 보안 리프: OAuth 토큰 -->
  <rect x="280" y="60" width="130" height="32" rx="8" fill="url(#leafRed)" stroke="#E74C3C" stroke-width="1"/>
  <text x="345" y="80" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="bold">OAuth 토큰 중앙화</text>

  <!-- 보안 리프: 비밀 볼트 -->
  <rect x="336" y="88" width="116" height="32" rx="8" fill="url(#leafRed)" stroke="#E74C3C" stroke-width="1"/>
  <text x="394" y="108" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="bold">비밀 볼트 연동</text>

  <!-- ===== 관찰가능성 섹션 (우상단 오른쪽) ===== -->
  <!-- 관찰가능성 메인 노드 -->
  <rect x="544" y="118" width="192" height="44" rx="22" fill="url(#nodeGreen)" filter="url(#shadow)"/>
  <text x="640" y="136" text-anchor="middle" fill="white" font-size="13" font-weight="bold">👁 관찰가능성</text>
  <text x="640" y="153" text-anchor="middle" fill="white" font-size="10">Observability</text>

  <!-- 관찰가능성 리프: OpenTelemetry -->
  <rect x="478" y="60" width="148" height="32" rx="8" fill="url(#leafGreen)" stroke="#27AE60" stroke-width="1"/>
  <text x="552" y="80" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="bold">OpenTelemetry 통합</text>

  <!-- 관찰가능성 리프: 도구 호출 추적 -->
  <rect x="650" y="60" width="130" height="32" rx="8" fill="url(#leafGreen)" stroke="#27AE60" stroke-width="1"/>
  <text x="715" y="80" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="bold">도구 호출 추적</text>

  <!-- 관찰가능성 리프: 에러율/지연시간 -->
  <rect x="718" y="90" width="130" height="32" rx="8" fill="url(#leafGreen)" stroke="#27AE60" stroke-width="1"/>
  <text x="783" y="110" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="bold">에러율/지연시간 모니터링</text>

  <!-- 관찰가능성 리프: 감사 로그 -->
  <rect x="596" y="208" width="100" height="32" rx="8" fill="url(#leafGreen)" stroke="#27AE60" stroke-width="1"/>
  <text x="646" y="228" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="bold">감사 로그</text>

  <!-- ===== 비용 제어 섹션 (우하단) ===== -->
  <!-- 비용 제어 메인 노드 -->
  <rect x="546" y="378" width="184" height="44" rx="22" fill="url(#nodeOrange)" filter="url(#shadow)"/>
  <text x="638" y="396" text-anchor="middle" fill="white" font-size="13" font-weight="bold">💰 비용 제어</text>
  <text x="638" y="413" text-anchor="middle" fill="white" font-size="10">Cost Control</text>

  <!-- 비용 제어 리프: Rate Limiting -->
  <rect x="498" y="460" width="112" height="32" rx="8" fill="url(#leafOrange)" stroke="#E67E22" stroke-width="1"/>
  <text x="554" y="480" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="bold">Rate Limiting</text>

  <!-- 비용 제어 리프: 쿼터 관리 -->
  <rect x="672" y="460" width="100" height="32" rx="8" fill="url(#leafOrange)" stroke="#E67E22" stroke-width="1"/>
  <text x="722" y="480" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="bold">쿼터 관리</text>

  <!-- 비용 제어 리프: 사용량 추적 -->
  <rect x="728" y="362" width="112" height="32" rx="8" fill="url(#leafOrange)" stroke="#E67E22" stroke-width="1"/>
  <text x="784" y="382" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="bold">사용량 추적</text>

  <!-- 비용 제어 리프: 팀/프로젝트별 할당 -->
  <rect x="568" y="320" width="140" height="32" rx="8" fill="url(#leafOrange)" stroke="#E67E22" stroke-width="1"/>
  <text x="638" y="340" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="bold">팀/프로젝트별 할당</text>

  <!-- ===== 거버넌스 섹션 (좌하단) ===== -->
  <!-- 거버넌스 메인 노드 -->
  <rect x="144" y="378" width="192" height="44" rx="22" fill="url(#nodePurple)" filter="url(#shadow)"/>
  <text x="240" y="396" text-anchor="middle" fill="white" font-size="13" font-weight="bold">🏛 거버넌스</text>
  <text x="240" y="413" text-anchor="middle" fill="white" font-size="10">Governance</text>

  <!-- 거버넌스 리프: RBAC -->
  <rect x="98" y="462" width="100" height="32" rx="8" fill="url(#leafPurple)" stroke="#8E44AD" stroke-width="1"/>
  <text x="148" y="482" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="bold">RBAC</text>

  <!-- 거버넌스 리프: 정책 엔진 -->
  <rect x="208" y="462" width="100" height="32" rx="8" fill="url(#leafPurple)" stroke="#8E44AD" stroke-width="1"/>
  <text x="258" y="482" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="bold">정책 엔진</text>

  <!-- 거버넌스 리프: 도구 접근 제어 -->
  <rect x="316" y="338" width="128" height="32" rx="8" fill="url(#leafPurple)" stroke="#8E44AD" stroke-width="1"/>
  <text x="380" y="358" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="bold">도구 접근 제어</text>

  <!-- 거버넌스 리프: 컴플라이언스 감사 -->
  <rect x="46" y="338" width="136" height="32" rx="8" fill="url(#leafPurple)" stroke="#8E44AD" stroke-width="1"/>
  <text x="114" y="358" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="bold">컴플라이언스 감사</text>

  <!-- ===== 범례 ===== -->
  <rect x="20" y="516" width="820" height="30" rx="6" fill="#ECF0F1"/>
  <circle cx="50" cy="531" r="7" fill="url(#nodeRed)"/>
  <text x="62" y="535" fill="#2C3E50" font-size="10">보안</text>
  <circle cx="108" cy="531" r="7" fill="url(#nodeGreen)"/>
  <text x="120" y="535" fill="#2C3E50" font-size="10">관찰가능성</text>
  <circle cx="194" cy="531" r="7" fill="url(#nodeOrange)"/>
  <text x="206" y="535" fill="#2C3E50" font-size="10">비용 제어</text>
  <circle cx="264" cy="531" r="7" fill="url(#nodePurple)"/>
  <text x="276" y="535" fill="#2C3E50" font-size="10">거버넌스</text>
  <text x="620" y="535" fill="#7F8C8D" font-size="10">MCP Gateway 핵심 기능 4영역 · cs/ai-agent</text>
</svg>
