<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 780">
  <defs>
    <linearGradient id="nodeBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB"/>
      <stop offset="100%" style="stop-color:#2980B9"/>
    </linearGradient>
    <linearGradient id="nodeGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71"/>
      <stop offset="100%" style="stop-color:#27AE60"/>
    </linearGradient>
    <linearGradient id="nodeRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C"/>
      <stop offset="100%" style="stop-color:#C0392B"/>
    </linearGradient>
    <linearGradient id="nodeOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22"/>
      <stop offset="100%" style="stop-color:#D35400"/>
    </linearGradient>
    <linearGradient id="nodePurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#8E44AD"/>
    </linearGradient>
    <linearGradient id="nodeTeal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1ABC9C"/>
      <stop offset="100%" style="stop-color:#16A085"/>
    </linearGradient>
    <linearGradient id="nodeDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34495E"/>
      <stop offset="100%" style="stop-color:#2C3E50"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="780" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="38" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#ffffff" text-anchor="middle">Auto Memory 생명주기 (Memory Lifecycle)</text>
  <text x="450" y="58" font-family="Arial, sans-serif" font-size="11" fill="#7F8C8D" text-anchor="middle">저장 · 로드 · 업데이트 · 삭제 전체 흐름</text>

  <!-- ════════════════════════════════════════ -->
  <!-- LANE: 세션 시작 (상단) -->
  <!-- ════════════════════════════════════════ -->

  <!-- 세션 시작 노드 (타원) -->
  <ellipse cx="450" cy="105" rx="80" ry="28" fill="url(#nodeBlue)" filter="url(#shadow)"/>
  <text x="450" y="101" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">세션 시작</text>
  <text x="450" y="116" font-family="Arial, sans-serif" font-size="9" fill="#ECF0F1" text-anchor="middle">New Session</text>

  <!-- 화살표: 세션시작 → MEMORY.md 로드 -->
  <line x1="450" y1="133" x2="450" y2="160" stroke="#7F8C8D" stroke-width="2"/>
  <polygon points="444,157 450,167 456,157" fill="#7F8C8D"/>

  <!-- MEMORY.md 로드 노드 -->
  <rect x="340" y="168" width="220" height="52" rx="8" fill="url(#nodeTeal)" filter="url(#shadow)"/>
  <text x="450" y="191" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">MEMORY.md 로드</text>
  <text x="450" y="207" font-family="Arial, sans-serif" font-size="9" fill="#ECF0F1" text-anchor="middle">인덱스 읽기 (최대 200줄 제한)</text>

  <!-- 화살표: MEMORY.md 로드 → 대화 진행 -->
  <line x1="450" y1="220" x2="450" y2="248" stroke="#7F8C8D" stroke-width="2"/>
  <polygon points="444,245 450,255 456,245" fill="#7F8C8D"/>

  <!-- 대화 진행 노드 -->
  <rect x="360" y="256" width="180" height="44" rx="8" fill="url(#nodeDark)" filter="url(#shadow)" stroke="#3498DB" stroke-width="1.5"/>
  <text x="450" y="276" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3498DB" text-anchor="middle">대화 진행 중</text>
  <text x="450" y="292" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D" text-anchor="middle">피드백 / 학습 발생 감지</text>

  <!-- ════════════════════════════════════════ -->
  <!-- 분기: 트리거 유형 판단 (다이아몬드) -->
  <!-- ════════════════════════════════════════ -->

  <!-- 화살표: 대화진행 → 분기 -->
  <line x1="450" y1="300" x2="450" y2="328" stroke="#7F8C8D" stroke-width="2"/>
  <polygon points="444,325 450,335 456,325" fill="#7F8C8D"/>

  <!-- 분기 다이아몬드 -->
  <polygon points="450,335 530,375 450,415 370,375" fill="#16213e" stroke="#E67E22" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="371" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E67E22" text-anchor="middle">트리거</text>
  <text x="450" y="385" font-family="Arial, sans-serif" font-size="9" fill="#E67E22" text-anchor="middle">유형?</text>

  <!-- ── 왼쪽 분기: "기억해줘" ── -->
  <!-- 분기 → 기억해줘 -->
  <line x1="370" y1="375" x2="175" y2="375" stroke="#2ECC71" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="178,369 168,375 178,381" fill="#2ECC71"/>
  <text x="270" y="365" font-family="Arial, sans-serif" font-size="9" fill="#2ECC71" text-anchor="middle">"기억해줘"</text>

  <!-- 기억해줘 노드 -->
  <rect x="55" y="355" width="118" height="40" rx="8" fill="url(#nodeGreen)" filter="url(#shadow)"/>
  <text x="114" y="373" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">즉시 저장</text>
  <text x="114" y="387" font-family="Arial, sans-serif" font-size="9" fill="#ECF0F1" text-anchor="middle">명시적 요청</text>

  <!-- ── 오른쪽 분기: "잊어줘" ── -->
  <!-- 분기 → 잊어줘 -->
  <line x1="530" y1="375" x2="726" y2="375" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="723,369 733,375 723,381" fill="#E74C3C"/>
  <text x="630" y="365" font-family="Arial, sans-serif" font-size="9" fill="#E74C3C" text-anchor="middle">"잊어줘"</text>

  <!-- 잊어줘 노드 -->
  <rect x="727" y="355" width="118" height="40" rx="8" fill="url(#nodeRed)" filter="url(#shadow)"/>
  <text x="786" y="373" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">삭제 처리</text>
  <text x="786" y="387" font-family="Arial, sans-serif" font-size="9" fill="#ECF0F1" text-anchor="middle">명시적 요청</text>

  <!-- 잊어줘 → 파일 삭제 -->
  <line x1="786" y1="395" x2="786" y2="428" stroke="#E74C3C" stroke-width="1.5"/>
  <polygon points="780,425 786,435 792,425" fill="#E74C3C"/>

  <!-- 파일 삭제 + 인덱스 정리 노드 -->
  <rect x="716" y="436" width="140" height="48" rx="8" fill="#16213e" stroke="#E74C3C" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="786" y="456" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E74C3C" text-anchor="middle">파일 삭제</text>
  <text x="786" y="470" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D" text-anchor="middle">+ MEMORY.md 인덱스 정리</text>

  <!-- ── 아래쪽 분기: 자동 감지 ── -->
  <!-- 분기 → 자동감지 (하단) -->
  <line x1="450" y1="415" x2="450" y2="443" stroke="#9B59B6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="444,440 450,450 456,440" fill="#9B59B6"/>
  <text x="490" y="435" font-family="Arial, sans-serif" font-size="9" fill="#9B59B6" text-anchor="middle">자동 감지</text>

  <!-- ════════════════════════════════════════ -->
  <!-- 저장 플로우 (중앙 하단) -->
  <!-- ════════════════════════════════════════ -->

  <!-- Step 1: 개별 메모리 파일 생성 -->
  <rect x="320" y="450" width="260" height="52" rx="8" fill="url(#nodePurple)" filter="url(#shadow)"/>
  <text x="450" y="471" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Step 1: 개별 메모리 파일 생성</text>
  <text x="450" y="487" font-family="Arial, sans-serif" font-size="9" fill="#ECF0F1" text-anchor="middle">YAML frontmatter 포함 .md 파일 저장</text>
  <text x="450" y="499" font-family="Arial, sans-serif" font-size="8" fill="#D7BDE2" text-anchor="middle">ex) feedback_prefer_svg.md</text>

  <!-- 화살표: Step1 → Step2 -->
  <line x1="450" y1="502" x2="450" y2="530" stroke="#7F8C8D" stroke-width="2"/>
  <polygon points="444,527 450,537 456,527" fill="#7F8C8D"/>

  <!-- Step 2: MEMORY.md 인덱스에 포인터 추가 -->
  <rect x="320" y="538" width="260" height="52" rx="8" fill="url(#nodeOrange)" filter="url(#shadow)"/>
  <text x="450" y="559" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Step 2: MEMORY.md 인덱스 업데이트</text>
  <text x="450" y="575" font-family="Arial, sans-serif" font-size="9" fill="#ECF0F1" text-anchor="middle">파일명 + 한 줄 요약 포인터 추가</text>
  <text x="450" y="587" font-family="Arial, sans-serif" font-size="8" fill="#FDEBD0" text-anchor="middle">MEMORY.md ← 인덱스 역할</text>

  <!-- ════════════════════════════════════════ -->
  <!-- 메모리 활용 플로우 (좌측 하단) -->
  <!-- ════════════════════════════════════════ -->

  <!-- 기억해줘 → Step1 연결 (좌측에서 내려옴) -->
  <line x1="114" y1="395" x2="114" y2="503" stroke="#2ECC71" stroke-width="1.5"/>
  <line x1="114" y1="503" x2="319" y2="503" stroke="#2ECC71" stroke-width="1.5"/>
  <polygon points="316,497 326,503 316,509" fill="#2ECC71"/>

  <!-- ════════════════════════════════════════ -->
  <!-- 메모리 활용 영역 (우측 중간) -->
  <!-- ════════════════════════════════════════ -->

  <!-- 활용 섹션 배경 -->
  <rect x="30" y="450" width="270" height="220" rx="10" fill="#16213e" stroke="#1ABC9C" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="165" y="470" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1ABC9C" text-anchor="middle">메모리 활용 흐름</text>

  <!-- 활용 Step A: 인덱스 검색 -->
  <rect x="44" y="480" width="242" height="36" rx="6" fill="#1f3a5f" stroke="#3498DB" stroke-width="1"/>
  <text x="165" y="496" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3498DB" text-anchor="middle">A. 인덱스에서 관련 파일 탐색</text>
  <text x="165" y="509" font-family="Arial, sans-serif" font-size="8" fill="#7F8C8D" text-anchor="middle">MEMORY.md 스캔 (200줄 이내)</text>

  <!-- 화살표 A → B -->
  <line x1="165" y1="516" x2="165" y2="532" stroke="#7F8C8D" stroke-width="1.5"/>
  <polygon points="160,529 165,538 170,529" fill="#7F8C8D"/>

  <!-- 활용 Step B: 개별 파일 Read -->
  <rect x="44" y="540" width="242" height="36" rx="6" fill="#1f3a5f" stroke="#9B59B6" stroke-width="1"/>
  <text x="165" y="556" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#9B59B6" text-anchor="middle">B. 개별 메모리 파일 Read</text>
  <text x="165" y="569" font-family="Arial, sans-serif" font-size="8" fill="#7F8C8D" text-anchor="middle">상세 내용 로드</text>

  <!-- 화살표 B → C -->
  <line x1="165" y1="576" x2="165" y2="592" stroke="#7F8C8D" stroke-width="1.5"/>
  <polygon points="160,589 165,598 170,589" fill="#7F8C8D"/>

  <!-- 활용 Step C: 검증 -->
  <rect x="44" y="600" width="242" height="36" rx="6" fill="#1f3a5f" stroke="#E67E22" stroke-width="1"/>
  <text x="165" y="616" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#E67E22" text-anchor="middle">C. 검증 (파일 / 함수 존재 확인)</text>
  <text x="165" y="629" font-family="Arial, sans-serif" font-size="8" fill="#7F8C8D" text-anchor="middle">유효하지 않으면 메모리 폐기</text>

  <!-- 화살표 C → D -->
  <line x1="165" y1="636" x2="165" y2="652" stroke="#7F8C8D" stroke-width="1.5"/>
  <polygon points="160,649 165,658 170,649" fill="#7F8C8D"/>

  <!-- 활용 Step D: 적용 -->
  <rect x="44" y="660" width="242" height="36" rx="6" fill="url(#nodeTeal)" filter="url(#shadow)"/>
  <text x="165" y="676" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">D. 컨텍스트 적용</text>
  <text x="165" y="689" font-family="Arial, sans-serif" font-size="8" fill="#ECF0F1" text-anchor="middle">현재 세션에 메모리 반영</text>

  <!-- ════════════════════════════════════════ -->
  <!-- Auto Dream (하단 중앙) -->
  <!-- ════════════════════════════════════════ -->

  <!-- Step2 → Auto Dream 화살표 -->
  <line x1="450" y1="590" x2="450" y2="635" stroke="#7F8C8D" stroke-width="2"/>
  <polygon points="444,632 450,642 456,632" fill="#7F8C8D"/>

  <!-- Auto Dream 노드 -->
  <rect x="330" y="643" width="240" height="52" rx="8" fill="#16213e" stroke="#9B59B6" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="664" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9B59B6" text-anchor="middle">Auto Dream</text>
  <text x="450" y="680" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D" text-anchor="middle">오래된 메모리 통합 · 정리 · 압축</text>
  <text x="450" y="692" font-family="Arial, sans-serif" font-size="8" fill="#D7BDE2" text-anchor="middle">저장 공간 최적화 + 중복 제거</text>

  <!-- Auto Dream → MEMORY.md 피드백 루프 (오른쪽 곡선) -->
  <path d="M 570 669 Q 650 669 650 480 Q 650 220 560 220" stroke="#9B59B6" stroke-width="1.5" stroke-dasharray="6,3" fill="none"/>
  <polygon points="563,214 553,220 563,226" fill="#9B59B6"/>
  <text x="660" y="470" font-family="Arial, sans-serif" font-size="9" fill="#9B59B6" text-anchor="middle" transform="rotate(-90,660,470)">인덱스 갱신</text>

  <!-- ════════════════════════════════════════ -->
  <!-- 파일삭제 → 종료 연결 -->
  <!-- ════════════════════════════════════════ -->
  <line x1="786" y1="484" x2="786" y2="643" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="786" y1="643" x2="571" y2="643" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="574,637 564,643 574,649" fill="#E74C3C"/>
  <text x="680" y="633" font-family="Arial, sans-serif" font-size="8" fill="#E74C3C" text-anchor="middle">삭제 후 인덱스 정리 완료</text>

  <!-- ════════════════════════════════════════ -->
  <!-- 범례 (Legend) -->
  <!-- ════════════════════════════════════════ -->
  <rect x="30" y="720" width="840" height="48" rx="8" fill="#16213e" stroke="#34495E" stroke-width="1"/>
  <text x="55" y="737" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#7F8C8D">범례</text>

  <!-- 범례 항목들 -->
  <rect x="100" y="727" width="14" height="14" rx="3" fill="url(#nodeBlue)"/>
  <text x="118" y="738" font-family="Arial, sans-serif" font-size="9" fill="#ECF0F1">세션 흐름</text>

  <rect x="200" y="727" width="14" height="14" rx="3" fill="url(#nodeGreen)"/>
  <text x="218" y="738" font-family="Arial, sans-serif" font-size="9" fill="#ECF0F1">"기억해줘" 경로</text>

  <rect x="320" y="727" width="14" height="14" rx="3" fill="url(#nodeRed)"/>
  <text x="338" y="738" font-family="Arial, sans-serif" font-size="9" fill="#ECF0F1">"잊어줘" 경로</text>

  <rect x="430" y="727" width="14" height="14" rx="3" fill="url(#nodePurple)"/>
  <text x="448" y="738" font-family="Arial, sans-serif" font-size="9" fill="#ECF0F1">저장 단계</text>

  <rect x="525" y="727" width="14" height="14" rx="3" fill="url(#nodeTeal)"/>
  <text x="543" y="738" font-family="Arial, sans-serif" font-size="9" fill="#ECF0F1">활용 단계</text>

  <rect x="615" y="727" width="14" height="14" rx="3" fill="#16213e" stroke="#9B59B6" stroke-width="1.5"/>
  <text x="633" y="738" font-family="Arial, sans-serif" font-size="9" fill="#ECF0F1">Auto Dream</text>

  <line x1="730" y1="734" x2="750" y2="734" stroke="#7F8C8D" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="755" y="738" font-family="Arial, sans-serif" font-size="9" fill="#ECF0F1">비동기/선택 흐름</text>

  <!-- 범례 두번째 줄 -->
  <polygon points="100,750 114,756 100,762" fill="#E67E22"/>
  <text x="118" y="761" font-family="Arial, sans-serif" font-size="9" fill="#ECF0F1">분기 (다이아몬드)</text>

  <text x="218" y="761" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">MEMORY.md = 인덱스 파일 (200줄 제한)  |  개별 .md = 상세 내용 저장소</text>
</svg>
