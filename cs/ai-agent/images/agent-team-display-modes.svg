<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700" height="350">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
    </style>
    <linearGradient id="blueGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3498DB"/>
      <stop offset="100%" stop-color="#2980B9"/>
    </linearGradient>
    <linearGradient id="greenGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#27AE60"/>
    </linearGradient>
    <linearGradient id="purpleGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9B59B6"/>
      <stop offset="100%" stop-color="#8E44AD"/>
    </linearGradient>
    <filter id="shadow2" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect x="0" y="0" width="700" height="350" rx="12" ry="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>

  <!-- 타이틀 -->
  <text x="350" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#2C3E50">Agent Team 표시 모드 비교</text>

  <!-- 구분선 (중앙) -->
  <line x1="350" y1="50" x2="350" y2="330" stroke="#E5E7EB" stroke-width="2" stroke-dasharray="8,4"/>
  <circle cx="350" cy="190" r="18" fill="#F8F9FA" stroke="#E5E7EB" stroke-width="2"/>
  <text x="350" y="195" text-anchor="middle" font-size="12" font-weight="700" fill="#7F8C8D">VS</text>

  <!-- ==================== 좌측: In-Process 모드 ==================== -->
  <text x="175" y="65" text-anchor="middle" font-size="16" font-weight="700" fill="#2980B9">In-Process 모드</text>
  <text x="175" y="82" text-anchor="middle" font-size="11" fill="#7F8C8D">하나의 터미널에서 탭 전환</text>

  <!-- 터미널 외곽 -->
  <rect x="30" y="95" width="290" height="200" rx="8" ry="8" fill="#1E1E2E" stroke="#3498DB" stroke-width="2" filter="url(#shadow2)"/>

  <!-- 터미널 타이틀바 -->
  <rect x="30" y="95" width="290" height="28" rx="8" ry="8" fill="#2D2D3F"/>
  <rect x="30" y="115" width="290" height="8" fill="#2D2D3F"/>
  <circle cx="48" cy="109" r="5" fill="#E74C3C"/>
  <circle cx="64" cy="109" r="5" fill="#E67E22"/>
  <circle cx="80" cy="109" r="5" fill="#2ECC71"/>
  <text x="175" y="113" text-anchor="middle" font-size="10" fill="#95A5A6">Terminal</text>

  <!-- 탭 바 -->
  <rect x="30" y="123" width="290" height="24" fill="#252535"/>

  <!-- 활성 탭: Lead -->
  <rect x="35" y="125" width="65" height="20" rx="4" ry="4" fill="#2980B9"/>
  <text x="67" y="139" text-anchor="middle" font-size="9" font-weight="600" fill="#FFFFFF">Lead</text>

  <!-- 비활성 탭들 -->
  <rect x="105" y="125" width="40" height="20" rx="4" ry="4" fill="#3D3D50"/>
  <text x="125" y="139" text-anchor="middle" font-size="9" fill="#95A5A6">A</text>

  <rect x="150" y="125" width="40" height="20" rx="4" ry="4" fill="#3D3D50"/>
  <text x="170" y="139" text-anchor="middle" font-size="9" fill="#95A5A6">B</text>

  <rect x="195" y="125" width="40" height="20" rx="4" ry="4" fill="#3D3D50"/>
  <text x="215" y="139" text-anchor="middle" font-size="9" fill="#95A5A6">C</text>

  <!-- 터미널 내용 (Lead 활성) -->
  <text x="45" y="165" font-size="11" fill="#2ECC71" font-family="'Consolas', 'Courier New', monospace">$ claude</text>
  <text x="45" y="182" font-size="10" fill="#D6EAF8" font-family="'Consolas', 'Courier New', monospace">Team Lead 세션 활성</text>
  <text x="45" y="199" font-size="10" fill="#95A5A6" font-family="'Consolas', 'Courier New', monospace">Teammate A: 작업 중...</text>
  <text x="45" y="216" font-size="10" fill="#95A5A6" font-family="'Consolas', 'Courier New', monospace">Teammate B: 작업 중...</text>
  <text x="45" y="233" font-size="10" fill="#95A5A6" font-family="'Consolas', 'Courier New', monospace">Teammate C: 대기 중</text>
  <text x="45" y="258" font-size="11" fill="#2ECC71" font-family="'Consolas', 'Courier New', monospace">&#x25B6; _</text>

  <!-- Shift+Down 주석 -->
  <rect x="55" y="300" width="190" height="26" rx="6" ry="6" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
  <rect x="60" y="303" width="90" height="20" rx="4" ry="4" fill="url(#purpleGrad2)"/>
  <text x="105" y="317" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF">Shift+Down</text>
  <text x="158" y="317" font-size="10" fill="#2C3E50">으로 순환</text>

  <!-- ==================== 우측: Split-Pane 모드 ==================== -->
  <text x="525" y="65" text-anchor="middle" font-size="16" font-weight="700" fill="#27AE60">Split-Pane 모드</text>
  <text x="525" y="82" text-anchor="middle" font-size="11" fill="#7F8C8D">터미널 4분할 동시 표시</text>

  <!-- 터미널 외곽 -->
  <rect x="380" y="95" width="290" height="200" rx="8" ry="8" fill="#1E1E2E" stroke="#2ECC71" stroke-width="2" filter="url(#shadow2)"/>

  <!-- 터미널 타이틀바 -->
  <rect x="380" y="95" width="290" height="28" rx="8" ry="8" fill="#2D2D3F"/>
  <rect x="380" y="115" width="290" height="8" fill="#2D2D3F"/>
  <circle cx="398" cy="109" r="5" fill="#E74C3C"/>
  <circle cx="414" cy="109" r="5" fill="#E67E22"/>
  <circle cx="430" cy="109" r="5" fill="#2ECC71"/>
  <text x="525" y="113" text-anchor="middle" font-size="10" fill="#95A5A6">tmux - 4 panes</text>

  <!-- 4분할 패널 -->
  <!-- 좌상: Lead -->
  <rect x="385" y="128" width="138" height="80" rx="4" ry="4" fill="#1A1A2E" stroke="#2980B9" stroke-width="1.5"/>
  <rect x="385" y="128" width="138" height="16" rx="4" ry="4" fill="#2980B9"/>
  <rect x="385" y="140" width="138" height="4" fill="#2980B9"/>
  <text x="454" y="140" text-anchor="middle" font-size="9" font-weight="600" fill="#FFFFFF">Lead</text>
  <text x="393" y="160" font-size="8" fill="#D6EAF8" font-family="'Consolas', 'Courier New', monospace">$ claude</text>
  <text x="393" y="172" font-size="8" fill="#95A5A6" font-family="'Consolas', 'Courier New', monospace">메인 세션 활성</text>
  <text x="393" y="196" font-size="8" fill="#2ECC71" font-family="'Consolas', 'Courier New', monospace">&#x25B6; _</text>

  <!-- 우상: A -->
  <rect x="527" y="128" width="138" height="80" rx="4" ry="4" fill="#1A1A2E" stroke="#27AE60" stroke-width="1.5"/>
  <rect x="527" y="128" width="138" height="16" rx="4" ry="4" fill="#27AE60"/>
  <rect x="527" y="140" width="138" height="4" fill="#27AE60"/>
  <text x="596" y="140" text-anchor="middle" font-size="9" font-weight="600" fill="#FFFFFF">Teammate A</text>
  <text x="535" y="160" font-size="8" fill="#D5F5E3" font-family="'Consolas', 'Courier New', monospace">보안 리뷰 진행 중</text>
  <text x="535" y="172" font-size="8" fill="#95A5A6" font-family="'Consolas', 'Courier New', monospace">XSS 검사...</text>
  <text x="535" y="196" font-size="8" fill="#E67E22" font-family="'Consolas', 'Courier New', monospace">&#x25CF; 작업 중</text>

  <!-- 좌하: B -->
  <rect x="385" y="212" width="138" height="78" rx="4" ry="4" fill="#1A1A2E" stroke="#27AE60" stroke-width="1.5"/>
  <rect x="385" y="212" width="138" height="16" rx="4" ry="4" fill="#27AE60"/>
  <rect x="385" y="224" width="138" height="4" fill="#27AE60"/>
  <text x="454" y="224" text-anchor="middle" font-size="9" font-weight="600" fill="#FFFFFF">Teammate B</text>
  <text x="393" y="244" font-size="8" fill="#D5F5E3" font-family="'Consolas', 'Courier New', monospace">성능 리뷰 진행 중</text>
  <text x="393" y="256" font-size="8" fill="#95A5A6" font-family="'Consolas', 'Courier New', monospace">N+1 쿼리 분석...</text>
  <text x="393" y="280" font-size="8" fill="#E67E22" font-family="'Consolas', 'Courier New', monospace">&#x25CF; 작업 중</text>

  <!-- 우하: C -->
  <rect x="527" y="212" width="138" height="78" rx="4" ry="4" fill="#1A1A2E" stroke="#27AE60" stroke-width="1.5"/>
  <rect x="527" y="212" width="138" height="16" rx="4" ry="4" fill="#27AE60"/>
  <rect x="527" y="224" width="138" height="4" fill="#27AE60"/>
  <text x="596" y="224" text-anchor="middle" font-size="9" font-weight="600" fill="#FFFFFF">Teammate C</text>
  <text x="535" y="244" font-size="8" fill="#D5F5E3" font-family="'Consolas', 'Courier New', monospace">테스트 리뷰</text>
  <text x="535" y="256" font-size="8" fill="#95A5A6" font-family="'Consolas', 'Courier New', monospace">대기 중...</text>
  <text x="535" y="280" font-size="8" fill="#7F8C8D" font-family="'Consolas', 'Courier New', monospace">&#x25CB; 대기</text>

  <!-- tmux 필요 주석 -->
  <rect x="440" y="300" width="170" height="26" rx="6" ry="6" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
  <rect x="445" y="303" width="70" height="20" rx="4" ry="4" fill="url(#purpleGrad2)"/>
  <text x="480" y="317" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF">tmux</text>
  <text x="528" y="317" font-size="10" fill="#2C3E50">필요</text>

  <!-- 하단 설명 -->
  <text x="350" y="345" text-anchor="middle" font-size="10" fill="#95A5A6">In-Process: 리소스 절약 | Split-Pane: 실시간 모니터링에 유리</text>
</svg>