<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 500" width="750" height="500">
  <defs>
    <!-- 그라디언트 정의 -->
    <linearGradient id="nodePurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#8E44AD"/>
    </linearGradient>
    <linearGradient id="nodeBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB"/>
      <stop offset="100%" style="stop-color:#2980B9"/>
    </linearGradient>
    <linearGradient id="nodeTeal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1ABC9C"/>
      <stop offset="100%" style="stop-color:#16A085"/>
    </linearGradient>
    <linearGradient id="nodeGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71"/>
      <stop offset="100%" style="stop-color:#27AE60"/>
    </linearGradient>
    <linearGradient id="nodeOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22"/>
      <stop offset="100%" style="stop-color:#D35400"/>
    </linearGradient>
    <linearGradient id="nodeRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C"/>
      <stop offset="100%" style="stop-color:#C0392B"/>
    </linearGradient>
    <!-- 그림자 필터 -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000022"/>
    </filter>
    <filter id="shadowLoop" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <!-- 화살표 마커 -->
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7F8C8D"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E74C3C"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27AE60"/>
    </marker>
  </defs>

  <!-- 흰 배경 -->
  <rect width="750" height="500" fill="#FFFFFF" rx="0"/>

  <!-- 타이틀 영역 -->
  <rect x="0" y="0" width="750" height="54" fill="#F8F9FA" rx="0"/>
  <line x1="0" y1="54" x2="750" y2="54" stroke="#ECF0F1" stroke-width="2"/>
  <text x="375" y="22" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2C3E50" text-anchor="middle">Skill Creator Workflow</text>
  <text x="375" y="42" font-family="Arial, sans-serif" font-size="11" fill="#7F8C8D" text-anchor="middle">스킬 생성 반복 루프 — 6단계 순환 프로세스</text>

  <!-- ============================================================ -->
  <!-- 상단 직선 흐름: 1 → 2 → 3 (단계 박스) -->
  <!-- ============================================================ -->

  <!-- 단계 1: Intent (보라색) -->
  <rect x="40" y="90" width="150" height="105" rx="10" fill="white" stroke="#9B59B6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="90" width="150" height="36" rx="10" fill="url(#nodePurple)"/>
  <rect x="40" y="116" width="150" height="10" rx="0" fill="url(#nodePurple)"/>
  <!-- 번호 뱃지 -->
  <circle cx="62" cy="108" r="10" fill="white" fill-opacity="0.25"/>
  <text x="62" y="113" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <text x="122" y="113" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Intent</text>
  <text x="115" y="148" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2C3E50" text-anchor="middle">의도 캡처</text>
  <text x="115" y="167" font-family="Arial, sans-serif" font-size="9.5" fill="#7F8C8D" text-anchor="middle">스킬이 무엇을</text>
  <text x="115" y="182" font-family="Arial, sans-serif" font-size="9.5" fill="#7F8C8D" text-anchor="middle">하는가?</text>

  <!-- 화살표 1→2 -->
  <line x1="193" y1="142" x2="227" y2="142" stroke="#7F8C8D" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- 단계 2: Interview (파란색) -->
  <rect x="230" y="90" width="150" height="105" rx="10" fill="white" stroke="#3498DB" stroke-width="2" filter="url(#shadow)"/>
  <rect x="230" y="90" width="150" height="36" rx="10" fill="url(#nodeBlue)"/>
  <rect x="230" y="116" width="150" height="10" rx="0" fill="url(#nodeBlue)"/>
  <circle cx="252" cy="108" r="10" fill="white" fill-opacity="0.25"/>
  <text x="252" y="113" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">2</text>
  <text x="312" y="113" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Interview</text>
  <text x="305" y="148" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2C3E50" text-anchor="middle">인터뷰</text>
  <text x="305" y="167" font-family="Arial, sans-serif" font-size="9.5" fill="#7F8C8D" text-anchor="middle">엣지 케이스,</text>
  <text x="305" y="182" font-family="Arial, sans-serif" font-size="9.5" fill="#7F8C8D" text-anchor="middle">입출력 확인</text>

  <!-- 화살표 2→3 -->
  <line x1="383" y1="142" x2="417" y2="142" stroke="#7F8C8D" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- 단계 3: Draft (청록색) -->
  <rect x="420" y="90" width="150" height="105" rx="10" fill="white" stroke="#1ABC9C" stroke-width="2" filter="url(#shadow)"/>
  <rect x="420" y="90" width="150" height="36" rx="10" fill="url(#nodeTeal)"/>
  <rect x="420" y="116" width="150" height="10" rx="0" fill="url(#nodeTeal)"/>
  <circle cx="442" cy="108" r="10" fill="white" fill-opacity="0.25"/>
  <text x="442" y="113" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">3</text>
  <text x="502" y="113" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Draft</text>
  <text x="495" y="148" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2C3E50" text-anchor="middle">초안 작성</text>
  <text x="495" y="167" font-family="Arial, sans-serif" font-size="9.5" fill="#7F8C8D" text-anchor="middle">SKILL.md +</text>
  <text x="495" y="182" font-family="Arial, sans-serif" font-size="9.5" fill="#7F8C8D" text-anchor="middle">번들 리소스</text>

  <!-- 화살표 3→4 (꺾임: 오른쪽 아래) -->
  <!-- 세로로 내려오는 꺾임 화살표 -->
  <path d="M 570 142 L 620 142 L 620 250" stroke="#7F8C8D" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <polygon points="615,246 620,258 625,246" fill="#7F8C8D"/>

  <!-- ============================================================ -->
  <!-- 반복 루프 구간 레이블 -->
  <!-- ============================================================ -->
  <rect x="40" y="230" width="700" height="215" rx="12" fill="#FFF9F0" stroke="#E67E22" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="55" y="222" width="100" height="18" fill="#FFF9F0"/>
  <text x="105" y="235" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E67E22" text-anchor="middle">반복 루프</text>

  <!-- ============================================================ -->
  <!-- 하단 루프 단계: 4 → 5 → 6 → (4로 복귀) -->
  <!-- ============================================================ -->

  <!-- 단계 4: Test (초록색) -->
  <rect x="490" y="255" width="150" height="110" rx="10" fill="white" stroke="#2ECC71" stroke-width="2" filter="url(#shadow)"/>
  <rect x="490" y="255" width="150" height="36" rx="10" fill="url(#nodeGreen)"/>
  <rect x="490" y="281" width="150" height="10" rx="0" fill="url(#nodeGreen)"/>
  <circle cx="512" cy="273" r="10" fill="white" fill-opacity="0.25"/>
  <text x="512" y="278" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">4</text>
  <text x="572" y="278" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Test</text>
  <text x="565" y="313" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2C3E50" text-anchor="middle">테스트 실행</text>
  <text x="565" y="332" font-family="Arial, sans-serif" font-size="9.5" fill="#7F8C8D" text-anchor="middle">With-skill +</text>
  <text x="565" y="347" font-family="Arial, sans-serif" font-size="9.5" fill="#7F8C8D" text-anchor="middle">Baseline 병렬</text>

  <!-- 화살표 4→5 -->
  <line x1="487" y1="310" x2="453" y2="310" stroke="#7F8C8D" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- 단계 5: Evaluate (주황색) -->
  <rect x="300" y="255" width="150" height="110" rx="10" fill="white" stroke="#E67E22" stroke-width="2" filter="url(#shadow)"/>
  <rect x="300" y="255" width="150" height="36" rx="10" fill="url(#nodeOrange)"/>
  <rect x="300" y="281" width="150" height="10" rx="0" fill="url(#nodeOrange)"/>
  <circle cx="322" cy="273" r="10" fill="white" fill-opacity="0.25"/>
  <text x="322" y="278" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">5</text>
  <text x="382" y="278" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Evaluate</text>
  <text x="375" y="313" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2C3E50" text-anchor="middle">평가</text>
  <text x="375" y="332" font-family="Arial, sans-serif" font-size="9.5" fill="#7F8C8D" text-anchor="middle">Grader → Benchmark</text>
  <text x="375" y="347" font-family="Arial, sans-serif" font-size="9.5" fill="#7F8C8D" text-anchor="middle">→ Analyzer</text>

  <!-- 화살표 5→6 -->
  <line x1="297" y1="310" x2="263" y2="310" stroke="#7F8C8D" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- 단계 6: Iterate (빨간색) -->
  <rect x="110" y="255" width="150" height="110" rx="10" fill="white" stroke="#E74C3C" stroke-width="2" filter="url(#shadow)"/>
  <rect x="110" y="255" width="150" height="36" rx="10" fill="url(#nodeRed)"/>
  <rect x="110" y="281" width="150" height="10" rx="0" fill="url(#nodeRed)"/>
  <circle cx="132" cy="273" r="10" fill="white" fill-opacity="0.25"/>
  <text x="132" y="278" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">6</text>
  <text x="192" y="278" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Iterate</text>
  <text x="185" y="313" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2C3E50" text-anchor="middle">반복</text>
  <text x="185" y="332" font-family="Arial, sans-serif" font-size="9.5" fill="#7F8C8D" text-anchor="middle">피드백 반영</text>
  <text x="185" y="347" font-family="Arial, sans-serif" font-size="9.5" fill="#7F8C8D" text-anchor="middle">스킬 개선</text>

  <!-- ============================================================ -->
  <!-- 6 → 4 복귀 화살표 (루프 하단 곡선) -->
  <!-- ============================================================ -->
  <!-- 6에서 아래로 → 오른쪽으로 → 4 아래서 올라가기 -->
  <path d="M 185 367 L 185 415 L 565 415 L 565 367"
        stroke="#E74C3C" stroke-width="2.5" fill="none"
        stroke-dasharray="6,3"
        marker-end="url(#arrowRed)"/>

  <!-- 루프 화살표 레이블 -->
  <rect x="315" y="406" width="120" height="18" rx="4" fill="#FFF0EE" stroke="#E74C3C" stroke-width="1"/>
  <text x="375" y="419" font-family="Arial, sans-serif" font-size="9.5" fill="#E74C3C" text-anchor="middle" font-weight="bold">피드백 → 재테스트</text>

  <!-- ============================================================ -->
  <!-- 루프 탈출: 5 단계 → 완료 -->
  <!-- ============================================================ -->
  <!-- 5에서 아래로 빠져나가는 성공 화살표 -->
  <line x1="375" y1="367" x2="375" y2="448" stroke="#27AE60" stroke-width="2.5" marker-end="url(#arrowGreen)" stroke-dasharray="none"/>

  <!-- 루프 탈출 레이블 박스 -->
  <rect x="290" y="450" width="170" height="34" rx="8" fill="white" stroke="#27AE60" stroke-width="2" filter="url(#shadowLoop)"/>
  <text x="375" y="466" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#27AE60" text-anchor="middle">사용자 만족</text>
  <text x="375" y="479" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D" text-anchor="middle">루프 탈출 → 스킬 완성</text>

  <!-- ============================================================ -->
  <!-- 범례 -->
  <!-- ============================================================ -->
  <rect x="598" y="450" width="140" height="38" rx="6" fill="#F8F9FA" stroke="#ECF0F1" stroke-width="1"/>
  <text x="668" y="465" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D" text-anchor="middle">--- 반복 루프</text>
  <line x1="608" y1="463" x2="640" y2="463" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="668" y="482" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D" text-anchor="middle">— 직선 흐름</text>
  <line x1="608" y1="480" x2="640" y2="480" stroke="#7F8C8D" stroke-width="1.5"/>

</svg>
