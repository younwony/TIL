<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498DB"/>
      <stop offset="100%" style="stop-color:#2980B9"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ECC71"/>
      <stop offset="100%" style="stop-color:#27AE60"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#8E44AD"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="520" rx="12" fill="#FAFBFC" stroke="#E1E4E8" stroke-width="1"/>

  <!-- 상단 타이틀 -->
  <text x="440" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#2C3E50">Claude Code 필수 단축키 &amp; 명령어</text>

  <!-- ========== 열 1: 키보드 단축키 ========== -->
  <g transform="translate(15, 52)">
    <!-- 헤더 -->
    <rect width="270" height="34" rx="8" fill="url(#blueGrad)"/>
    <text x="135" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">&#x2328;&#xFE0F; 키보드 단축키</text>

    <!-- 배경 -->
    <rect y="38" width="270" height="420" rx="8" fill="#E0F2FE" stroke="#BFDBFE" stroke-width="1"/>

    <!-- 항목 1: Shift+Tab -->
    <g transform="translate(14, 60)">
      <rect width="90" height="22" rx="4" fill="#F0F0F0" stroke="#D1D5DB" stroke-width="0.5"/>
      <text x="45" y="15" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2C3E50">Shift+Tab</text>
      <polygon points="100,11 108,11 104,7 108,11 104,15" fill="#7F8C8D"/>
      <text x="116" y="15" font-size="11" fill="#2C3E50">Plan &#x2194; Code 전환</text>
    </g>

    <!-- 항목 2: Esc -->
    <g transform="translate(14, 92)">
      <rect width="90" height="22" rx="4" fill="#F0F0F0" stroke="#D1D5DB" stroke-width="0.5"/>
      <text x="45" y="15" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2C3E50">Esc</text>
      <polygon points="100,11 108,11 104,7 108,11 104,15" fill="#7F8C8D"/>
      <text x="116" y="15" font-size="11" fill="#2C3E50">응답 중단 / 수정</text>
    </g>

    <!-- 항목 3: Tab (2회) -->
    <g transform="translate(14, 124)">
      <rect width="90" height="22" rx="4" fill="#F0F0F0" stroke="#D1D5DB" stroke-width="0.5"/>
      <text x="45" y="15" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2C3E50">Tab (2회)</text>
      <polygon points="100,11 108,11 104,7 108,11 104,15" fill="#7F8C8D"/>
      <text x="116" y="15" font-size="11" fill="#2C3E50">자동완성</text>
    </g>

    <!-- 항목 4: Ctrl+C -->
    <g transform="translate(14, 156)">
      <rect width="90" height="22" rx="4" fill="#F0F0F0" stroke="#D1D5DB" stroke-width="0.5"/>
      <text x="45" y="15" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2C3E50">Ctrl+C</text>
      <polygon points="100,11 108,11 104,7 108,11 104,15" fill="#7F8C8D"/>
      <text x="116" y="15" font-size="11" fill="#2C3E50">현재 작업 취소</text>
    </g>

    <!-- 항목 5: Ctrl+L -->
    <g transform="translate(14, 188)">
      <rect width="90" height="22" rx="4" fill="#F0F0F0" stroke="#D1D5DB" stroke-width="0.5"/>
      <text x="45" y="15" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2C3E50">Ctrl+L</text>
      <polygon points="100,11 108,11 104,7 108,11 104,15" fill="#7F8C8D"/>
      <text x="116" y="15" font-size="11" fill="#2C3E50">화면 정리</text>
    </g>

    <!-- 항목 6: Ctrl+R -->
    <g transform="translate(14, 220)">
      <rect width="90" height="22" rx="4" fill="#F0F0F0" stroke="#D1D5DB" stroke-width="0.5"/>
      <text x="45" y="15" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2C3E50">Ctrl+R</text>
      <polygon points="100,11 108,11 104,7 108,11 104,15" fill="#7F8C8D"/>
      <text x="116" y="15" font-size="11" fill="#2C3E50">이전 명령 검색</text>
    </g>
  </g>

  <!-- ========== 열 2: 슬래시 명령어 ========== -->
  <g transform="translate(300, 52)">
    <!-- 헤더 -->
    <rect width="270" height="34" rx="8" fill="url(#greenGrad)"/>
    <text x="135" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">/ 슬래시 명령어</text>

    <!-- 배경 -->
    <rect y="38" width="270" height="420" rx="8" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>

    <!-- 항목 1: /init -->
    <g transform="translate(14, 60)">
      <rect width="90" height="22" rx="4" fill="#F0F0F0" stroke="#D1D5DB" stroke-width="0.5"/>
      <text x="45" y="15" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2C3E50">/init</text>
      <polygon points="100,11 108,11 104,7 108,11 104,15" fill="#7F8C8D"/>
      <text x="116" y="15" font-size="11" fill="#2C3E50">CLAUDE.md 생성</text>
    </g>

    <!-- 항목 2: /clear -->
    <g transform="translate(14, 92)">
      <rect width="90" height="22" rx="4" fill="#F0F0F0" stroke="#D1D5DB" stroke-width="0.5"/>
      <text x="45" y="15" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2C3E50">/clear</text>
      <polygon points="100,11 108,11 104,7 108,11 104,15" fill="#7F8C8D"/>
      <text x="116" y="15" font-size="11" fill="#2C3E50">컨텍스트 초기화</text>
    </g>

    <!-- 항목 3: /compact -->
    <g transform="translate(14, 124)">
      <rect width="90" height="22" rx="4" fill="#F0F0F0" stroke="#D1D5DB" stroke-width="0.5"/>
      <text x="45" y="15" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2C3E50">/compact</text>
      <polygon points="100,11 108,11 104,7 108,11 104,15" fill="#7F8C8D"/>
      <text x="116" y="15" font-size="11" fill="#2C3E50">대화 요약 압축</text>
    </g>

    <!-- 항목 4: /review -->
    <g transform="translate(14, 156)">
      <rect width="90" height="22" rx="4" fill="#F0F0F0" stroke="#D1D5DB" stroke-width="0.5"/>
      <text x="45" y="15" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2C3E50">/review</text>
      <polygon points="100,11 108,11 104,7 108,11 104,15" fill="#7F8C8D"/>
      <text x="116" y="15" font-size="11" fill="#2C3E50">코드 리뷰</text>
    </g>

    <!-- 항목 5: /cost -->
    <g transform="translate(14, 188)">
      <rect width="90" height="22" rx="4" fill="#F0F0F0" stroke="#D1D5DB" stroke-width="0.5"/>
      <text x="45" y="15" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2C3E50">/cost</text>
      <polygon points="100,11 108,11 104,7 108,11 104,15" fill="#7F8C8D"/>
      <text x="116" y="15" font-size="11" fill="#2C3E50">토큰 사용량 확인</text>
    </g>

    <!-- 항목 6: /doctor -->
    <g transform="translate(14, 220)">
      <rect width="90" height="22" rx="4" fill="#F0F0F0" stroke="#D1D5DB" stroke-width="0.5"/>
      <text x="45" y="15" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2C3E50">/doctor</text>
      <polygon points="100,11 108,11 104,7 108,11 104,15" fill="#7F8C8D"/>
      <text x="116" y="15" font-size="11" fill="#2C3E50">설정 진단</text>
    </g>
  </g>

  <!-- ========== 열 3: CLI 플래그 ========== -->
  <g transform="translate(585, 52)">
    <!-- 헤더 -->
    <rect width="270" height="34" rx="8" fill="url(#purpleGrad)"/>
    <text x="135" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">&#x1F6A9; CLI 플래그</text>

    <!-- 배경 -->
    <rect y="38" width="270" height="420" rx="8" fill="#F3E8FF" stroke="#D8B4FE" stroke-width="1"/>

    <!-- 항목 1: --print -->
    <g transform="translate(14, 60)">
      <rect width="90" height="22" rx="4" fill="#F0F0F0" stroke="#D1D5DB" stroke-width="0.5"/>
      <text x="45" y="15" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2C3E50">--print</text>
      <polygon points="100,11 108,11 104,7 108,11 104,15" fill="#7F8C8D"/>
      <text x="116" y="15" font-size="11" fill="#2C3E50">1회성 출력</text>
    </g>

    <!-- 항목 2: --resume -->
    <g transform="translate(14, 92)">
      <rect width="90" height="22" rx="4" fill="#F0F0F0" stroke="#D1D5DB" stroke-width="0.5"/>
      <text x="45" y="15" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2C3E50">--resume</text>
      <polygon points="100,11 108,11 104,7 108,11 104,15" fill="#7F8C8D"/>
      <text x="116" y="15" font-size="11" fill="#2C3E50">이전 세션 복원</text>
    </g>

    <!-- 항목 3: -p -->
    <g transform="translate(14, 124)">
      <rect width="90" height="22" rx="4" fill="#F0F0F0" stroke="#D1D5DB" stroke-width="0.5"/>
      <text x="45" y="15" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2C3E50">-p</text>
      <polygon points="100,11 108,11 104,7 108,11 104,15" fill="#7F8C8D"/>
      <text x="116" y="15" font-size="11" fill="#2C3E50">파이프 입력</text>
    </g>

    <!-- 항목 4: --model -->
    <g transform="translate(14, 156)">
      <rect width="90" height="22" rx="4" fill="#F0F0F0" stroke="#D1D5DB" stroke-width="0.5"/>
      <text x="45" y="15" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2C3E50">--model</text>
      <polygon points="100,11 108,11 104,7 108,11 104,15" fill="#7F8C8D"/>
      <text x="116" y="15" font-size="11" fill="#2C3E50">모델 지정</text>
    </g>

    <!-- 항목 5: --verbose -->
    <g transform="translate(14, 188)">
      <rect width="90" height="22" rx="4" fill="#F0F0F0" stroke="#D1D5DB" stroke-width="0.5"/>
      <text x="45" y="15" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2C3E50">--verbose</text>
      <polygon points="100,11 108,11 104,7 108,11 104,15" fill="#7F8C8D"/>
      <text x="116" y="15" font-size="11" fill="#2C3E50">상세 로그</text>
    </g>

    <!-- 항목 6: --allowedTools -->
    <g transform="translate(14, 220)">
      <rect width="90" height="22" rx="4" fill="#F0F0F0" stroke="#D1D5DB" stroke-width="0.5"/>
      <text x="45" y="15" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#2C3E50">--allowedTools</text>
      <polygon points="100,11 108,11 104,7 108,11 104,15" fill="#7F8C8D"/>
      <text x="116" y="15" font-size="11" fill="#2C3E50">도구 제한</text>
    </g>
  </g>

  <!-- 하단 구분선 및 참고 텍스트 -->
  <line x1="30" y1="498" x2="850" y2="498" stroke="#E1E4E8" stroke-width="1"/>
  <text x="440" y="514" text-anchor="middle" font-size="10" fill="#7F8C8D">Claude Code v1.x | 자세한 내용: claude --help</text>
</svg>