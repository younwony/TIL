<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 500" width="780" height="500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <!-- 카드 그림자 -->
    <filter id="cardShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#2C3E50" flood-opacity="0.15"/>
    </filter>
    <!-- 중앙 박스 그림자 -->
    <filter id="centerShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#E74C3C" flood-opacity="0.25"/>
    </filter>
    <!-- 그라데이션들 -->
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3498DB"/>
      <stop offset="100%" stop-color="#2980B9"/>
    </linearGradient>
    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B59B6"/>
      <stop offset="100%" stop-color="#8E44AD"/>
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#27AE60"/>
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E67E22"/>
      <stop offset="100%" stop-color="#D35400"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="780" height="500" rx="12" fill="#ECF0F1"/>

  <!-- 타이틀 -->
  <text x="390" y="38" text-anchor="middle" fill="#2C3E50" font-size="18" font-weight="bold">2026년 2월 AI 코딩 도구 4대 업데이트 비교</text>

  <!-- ===== 카드 1: 좌상 - Claude Code Remote Control ===== -->
  <g transform="translate(20, 55)" filter="url(#cardShadow)">
    <rect width="355" height="175" rx="10" fill="url(#gradBlue)"/>
    <!-- 아이콘: 모바일 + QR -->
    <g transform="translate(18, 18)">
      <!-- 모바일 -->
      <rect x="0" y="0" width="24" height="38" rx="4" fill="none" stroke="#fff" stroke-width="2"/>
      <line x1="8" y1="32" x2="16" y2="32" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
      <rect x="6" y="4" width="12" height="20" rx="1" fill="rgba(255,255,255,0.2)"/>
      <!-- QR 코드 -->
      <g transform="translate(30, 4)">
        <rect width="18" height="18" rx="2" fill="none" stroke="#fff" stroke-width="1.5"/>
        <rect x="3" y="3" width="5" height="5" fill="#fff"/>
        <rect x="10" y="3" width="5" height="5" fill="#fff"/>
        <rect x="3" y="10" width="5" height="5" fill="#fff"/>
        <rect x="11" y="11" width="3" height="3" fill="#fff"/>
      </g>
    </g>
    <text x="72" y="34" fill="#fff" font-size="16" font-weight="bold">Claude Code</text>
    <text x="72" y="52" fill="#fff" font-size="16" font-weight="bold">Remote Control</text>
    <line x1="18" y1="70" x2="337" y2="70" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="18" y="92" fill="rgba(255,255,255,0.95)" font-size="13">tmux + Tailscale 패턴을 공식 기능으로 흡수</text>
    <text x="18" y="112" fill="rgba(255,255,255,0.95)" font-size="13">명령어 한 줄로 원격 제어: /remote-control</text>
    <text x="18" y="132" fill="rgba(255,255,255,0.95)" font-size="13">모바일 QR 스캔으로 즉시 접속</text>
    <!-- 태그 -->
    <rect x="18" y="147" width="110" height="22" rx="11" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <text x="73" y="162" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Max 플랜 프리뷰</text>
  </g>

  <!-- ===== 카드 2: 우상 - Cowork Enterprise ===== -->
  <g transform="translate(405, 55)" filter="url(#cardShadow)">
    <rect width="355" height="175" rx="10" fill="url(#gradPurple)"/>
    <!-- 아이콘: 마켓/스토어 -->
    <g transform="translate(18, 16)">
      <!-- 상점 지붕 -->
      <path d="M0,18 L4,2 L40,2 L44,18 Z" fill="none" stroke="#fff" stroke-width="2" stroke-linejoin="round"/>
      <path d="M0,18 Q11,28 22,18 Q33,28 44,18" fill="none" stroke="#fff" stroke-width="2"/>
      <!-- 상점 바디 -->
      <rect x="2" y="18" width="40" height="20" fill="none" stroke="#fff" stroke-width="2"/>
      <rect x="16" y="24" width="12" height="14" fill="rgba(255,255,255,0.2)" stroke="#fff" stroke-width="1.5"/>
    </g>
    <text x="72" y="34" fill="#fff" font-size="16" font-weight="bold">Cowork Enterprise</text>
    <text x="72" y="52" fill="#fff" font-size="16" font-weight="bold">플러그인 마켓플레이스</text>
    <line x1="18" y1="70" x2="337" y2="70" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="18" y="92" fill="rgba(255,255,255,0.95)" font-size="13">사내 플러그인 마켓플레이스 제공</text>
    <text x="18" y="112" fill="rgba(255,255,255,0.95)" font-size="13">커넥터 12개로 기업 시스템 통합</text>
    <text x="18" y="132" fill="rgba(255,255,255,0.95)" font-size="13">설치 → 설정 → 실행 3단계 워크플로우</text>
    <!-- 태그 -->
    <rect x="18" y="147" width="90" height="22" rx="11" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <text x="63" y="162" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">커넥터 12개</text>
  </g>

  <!-- ===== 카드 3: 좌하 - Codex Sub-Agent + WebSocket ===== -->
  <g transform="translate(20, 265)" filter="url(#cardShadow)">
    <rect width="355" height="175" rx="10" fill="url(#gradGreen)"/>
    <!-- 아이콘: 병렬 화살표 -->
    <g transform="translate(18, 18)">
      <line x1="0" y1="8" x2="32" y2="8" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      <polygon points="32,2 44,8 32,14" fill="#fff"/>
      <line x1="0" y1="22" x2="32" y2="22" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      <polygon points="32,16 44,22 32,28" fill="#fff"/>
      <line x1="0" y1="36" x2="32" y2="36" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      <polygon points="32,30 44,36 32,42" fill="#fff"/>
    </g>
    <text x="72" y="34" fill="#fff" font-size="16" font-weight="bold">Codex Sub-Agent</text>
    <text x="72" y="52" fill="#fff" font-size="16" font-weight="bold">+ WebSocket</text>
    <line x1="18" y1="70" x2="337" y2="70" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="18" y="92" fill="rgba(255,255,255,0.95)" font-size="13">병렬 에이전트로 다중 작업 동시 처리</text>
    <text x="18" y="112" fill="rgba(255,255,255,0.95)" font-size="13">WebSocket 지속 연결로 20~40% 속도 향상</text>
    <text x="18" y="132" fill="rgba(255,255,255,0.95)" font-size="13">서버 인메모리 상태 유지로 오버헤드 제거</text>
    <!-- 태그 -->
    <rect x="18" y="147" width="110" height="22" rx="11" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <text x="73" y="162" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Responses API</text>
  </g>

  <!-- ===== 카드 4: 우하 - Gemini CLI Hooks ===== -->
  <g transform="translate(405, 265)" filter="url(#cardShadow)">
    <rect width="355" height="175" rx="10" fill="url(#gradOrange)"/>
    <!-- 아이콘: 후크/갈고리 -->
    <g transform="translate(18, 14)">
      <path d="M10,0 L10,20 Q10,36 24,36 Q38,36 38,22 L38,16" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <circle cx="38" cy="12" r="5" fill="none" stroke="#fff" stroke-width="2.5"/>
    </g>
    <text x="72" y="34" fill="#fff" font-size="16" font-weight="bold">Gemini CLI Hooks</text>
    <text x="72" y="52" fill="#fff" font-size="16" font-weight="bold">에이전트 루프 제어</text>
    <line x1="18" y1="70" x2="337" y2="70" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="18" y="92" fill="rgba(255,255,255,0.95)" font-size="13">에이전트 루프에 코드 제어 포인트 삽입</text>
    <text x="18" y="112" fill="rgba(255,255,255,0.95)" font-size="13">커뮤니티 Hook 패턴을 공식 기능으로 흡수</text>
    <text x="18" y="132" fill="rgba(255,255,255,0.95)" font-size="13">사전/사후 실행 훅으로 워크플로우 커스터마이징</text>
    <!-- 태그 -->
    <rect x="18" y="147" width="75" height="22" rx="11" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <text x="55" y="162" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">v0.26.0</text>
  </g>

  <!-- ===== 중앙 겹치는 영역 ===== -->
  <g transform="translate(140, 228)" filter="url(#centerShadow)">
    <rect width="500" height="44" rx="22" fill="#fff" stroke="#E74C3C" stroke-width="2.5"/>
    <text x="250" y="20" text-anchor="middle" fill="#2C3E50" font-size="13" font-weight="bold" dominant-baseline="central">
      <tspan>공통 패턴:</tspan>
      <tspan fill="#C0392B"> 커뮤니티가 이미 하던 행동을 제품으로 흡수</tspan>
    </text>
  </g>

  <!-- 하단 범례 -->
  <g transform="translate(170, 468)">
    <circle cx="0" cy="0" r="5" fill="#3498DB"/>
    <text x="10" y="4" fill="#2C3E50" font-size="10">Anthropic</text>
    <circle cx="90" cy="0" r="5" fill="#9B59B6"/>
    <text x="100" y="4" fill="#2C3E50" font-size="10">Anthropic</text>
    <circle cx="180" cy="0" r="5" fill="#2ECC71"/>
    <text x="190" y="4" fill="#2C3E50" font-size="10">OpenAI</text>
    <circle cx="255" cy="0" r="5" fill="#E67E22"/>
    <text x="265" y="4" fill="#2C3E50" font-size="10">Google</text>
    <text x="360" y="4" fill="#95A5A6" font-size="10">2026.02</text>
  </g>
</svg>