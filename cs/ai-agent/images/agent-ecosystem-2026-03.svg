<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600" font-family="Arial, sans-serif">
  <defs>
    <!-- 파랑 (도구 & 환경) -->
    <linearGradient id="nodeBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB"/>
      <stop offset="100%" style="stop-color:#2980B9"/>
    </linearGradient>
    <!-- 초록 (품질 & 방법론) -->
    <linearGradient id="nodeGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71"/>
      <stop offset="100%" style="stop-color:#27AE60"/>
    </linearGradient>
    <!-- 주황 (제품 전략) -->
    <linearGradient id="nodeOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22"/>
      <stop offset="100%" style="stop-color:#D35400"/>
    </linearGradient>
    <!-- 보라 (실용 기술) -->
    <linearGradient id="nodePurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#8E44AD"/>
    </linearGradient>
    <!-- 중앙 다크 -->
    <linearGradient id="nodeDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50"/>
      <stop offset="100%" style="stop-color:#1A252F"/>
    </linearGradient>
    <!-- 청록 (보조) -->
    <linearGradient id="nodeTeal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1ABC9C"/>
      <stop offset="100%" style="stop-color:#16A085"/>
    </linearGradient>

    <!-- 영역 배경 그라디언트 -->
    <linearGradient id="bgBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EBF5FB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D6EAF8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bgGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EAFAF1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D5F5E3;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bgOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF2E9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FAE5D3;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bgPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4ECF7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E8DAEF;stop-opacity:1"/>
    </linearGradient>

    <!-- 화살표 마커 -->
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#95A5A6"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3498DB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#27AE60"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D35400"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8E44AD"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- 전체 배경 -->
  <rect width="860" height="600" fill="#FAFBFC" rx="12"/>

  <!-- 타이틀 영역 -->
  <rect x="0" y="0" width="860" height="70" rx="12" fill="url(#nodeDark)"/>
  <rect x="0" y="58" width="860" height="12" fill="url(#nodeDark)"/>
  <text x="430" y="32" text-anchor="middle" fill="white" font-size="20" font-weight="bold">AI 에이전트 생태계 2026</text>
  <text x="430" y="54" text-anchor="middle" fill="#BDC3C7" font-size="12">AI Agent Ecosystem — March 2026</text>

  <!-- ===== 영역 배경 패널 ===== -->

  <!-- 1. 도구 & 환경 (좌상단) -->
  <rect x="20" y="90" width="390" height="220" rx="10" fill="url(#bgBlue)" stroke="#AED6F1" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="20" y="90" width="390" height="36" rx="10" fill="url(#nodeBlue)"/>
  <rect x="20" y="114" width="390" height="12" fill="url(#nodeBlue)"/>
  <text x="215" y="113" text-anchor="middle" fill="white" font-size="13" font-weight="bold">도구 &amp; 환경  |  Tools &amp; Environment</text>

  <!-- 2. 품질 & 방법론 (우상단) -->
  <rect x="450" y="90" width="390" height="220" rx="10" fill="url(#bgGreen)" stroke="#A9DFBF" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="450" y="90" width="390" height="36" rx="10" fill="url(#nodeGreen)"/>
  <rect x="450" y="114" width="390" height="12" fill="url(#nodeGreen)"/>
  <text x="645" y="113" text-anchor="middle" fill="white" font-size="13" font-weight="bold">품질 &amp; 방법론  |  Quality &amp; Methodology</text>

  <!-- 3. 제품 전략 (좌하단) -->
  <rect x="20" y="340" width="390" height="220" rx="10" fill="url(#bgOrange)" stroke="#FAD7A0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="20" y="340" width="390" height="36" rx="10" fill="url(#nodeOrange)"/>
  <rect x="20" y="364" width="390" height="12" fill="url(#nodeOrange)"/>
  <text x="215" y="363" text-anchor="middle" fill="white" font-size="13" font-weight="bold">제품 전략  |  Product Strategy</text>

  <!-- 4. 실용 기술 (우하단) -->
  <rect x="450" y="340" width="390" height="220" rx="10" fill="url(#bgPurple)" stroke="#D7BDE2" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="450" y="340" width="390" height="36" rx="10" fill="url(#nodePurple)"/>
  <rect x="450" y="364" width="390" height="12" fill="url(#nodePurple)"/>
  <text x="645" y="363" text-anchor="middle" fill="white" font-size="13" font-weight="bold">실용 기술  |  Practical Technology</text>

  <!-- ===== 연결선 (노드보다 먼저 그리기) ===== -->

  <!-- 중앙 십자 연결선 (영역 간) -->
  <!-- 좌상 → 우상 -->
  <line x1="410" y1="200" x2="450" y2="200" stroke="#7F8C8D" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>
  <!-- 좌하 → 우하 -->
  <line x1="410" y1="450" x2="450" y2="450" stroke="#7F8C8D" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>
  <!-- 좌상 → 좌하 -->
  <line x1="215" y1="310" x2="215" y2="340" stroke="#7F8C8D" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>
  <!-- 우상 → 우하 -->
  <line x1="645" y1="310" x2="645" y2="340" stroke="#7F8C8D" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>

  <!-- ===== 도구 & 환경 영역 노드 ===== -->

  <!-- PM Skills -->
  <rect x="38" y="140" width="170" height="62" rx="8" fill="url(#nodeBlue)" filter="url(#shadow)"/>
  <text x="123" y="164" text-anchor="middle" fill="white" font-size="13" font-weight="bold">PM Skills</text>
  <text x="123" y="181" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10">에이전트 협업 프로젝트 관리</text>
  <text x="123" y="195" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Product Manager Capabilities</text>

  <!-- Superset IDE -->
  <rect x="222" y="140" width="170" height="62" rx="8" fill="url(#nodeBlue)" filter="url(#shadow)"/>
  <text x="307" y="164" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Superset IDE</text>
  <text x="307" y="181" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10">AI 통합 차세대 개발 환경</text>
  <text x="307" y="195" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Next-Gen AI-native IDE</text>

  <!-- Agent Safehouse -->
  <rect x="38" y="218" width="170" height="62" rx="8" fill="url(#nodeTeal)" filter="url(#shadow)"/>
  <text x="123" y="242" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Agent Safehouse</text>
  <text x="123" y="259" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10">에이전트 격리 실행 샌드박스</text>
  <text x="123" y="273" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Isolated Execution Sandbox</text>

  <!-- Autoresearch -->
  <rect x="222" y="218" width="170" height="62" rx="8" fill="url(#nodeTeal)" filter="url(#shadow)"/>
  <text x="307" y="242" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Autoresearch</text>
  <text x="307" y="259" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10">자동 리서치 에이전트 시스템</text>
  <text x="307" y="273" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Automated Research Agent</text>

  <!-- ===== 품질 & 방법론 영역 노드 ===== -->

  <!-- LLM 코드 품질 한계 -->
  <rect x="468" y="140" width="170" height="62" rx="8" fill="url(#nodeGreen)" filter="url(#shadow)"/>
  <text x="553" y="161" text-anchor="middle" fill="white" font-size="12" font-weight="bold">LLM 코드 품질 한계</text>
  <text x="553" y="178" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10">AI 생성 코드의 품질 이슈</text>
  <text x="553" y="192" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">LLM Code Quality Limits</text>

  <!-- 스펙 주도 개발 -->
  <rect x="652" y="140" width="170" height="62" rx="8" fill="url(#nodeGreen)" filter="url(#shadow)"/>
  <text x="737" y="161" text-anchor="middle" fill="white" font-size="12" font-weight="bold">스펙 주도 개발</text>
  <text x="737" y="178" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10">명세 기반 AI 코드 생성</text>
  <text x="737" y="192" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Spec-Driven Development</text>

  <!-- AI 코드 리뷰 -->
  <rect x="560" y="218" width="170" height="62" rx="8" fill="url(#nodeGreen)" filter="url(#shadow)"/>
  <text x="645" y="242" text-anchor="middle" fill="white" font-size="13" font-weight="bold">AI 코드 리뷰</text>
  <text x="645" y="259" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10">AI+인간 협업 검증 파이프라인</text>
  <text x="645" y="273" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">AI-Human Code Review Pipeline</text>

  <!-- ===== 제품 전략 영역 노드 ===== -->

  <!-- MLP -->
  <rect x="38" y="388" width="170" height="62" rx="8" fill="url(#nodeOrange)" filter="url(#shadow)"/>
  <text x="123" y="412" text-anchor="middle" fill="white" font-size="13" font-weight="bold">MLP</text>
  <text x="123" y="429" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10">최소 사랑받는 제품 전략</text>
  <text x="123" y="443" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Minimum Lovable Product</text>

  <!-- 파일시스템 맥락 관리 -->
  <rect x="222" y="388" width="170" height="62" rx="8" fill="url(#nodeOrange)" filter="url(#shadow)"/>
  <text x="307" y="409" text-anchor="middle" fill="white" font-size="12" font-weight="bold">파일시스템 맥락 관리</text>
  <text x="307" y="426" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10">컨텍스트 파일 기반 전략</text>
  <text x="307" y="440" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Filesystem Context Management</text>

  <!-- 전략 부연 설명 -->
  <rect x="38" y="468" width="354" height="68" rx="8" fill="white" stroke="#FAD7A0" stroke-width="1.5"/>
  <text x="215" y="487" text-anchor="middle" fill="#D35400" font-size="11" font-weight="bold">핵심 관점</text>
  <text x="215" y="503" text-anchor="middle" fill="#2C3E50" font-size="10">MVP 넘어 사용자 감동 경험 제공</text>
  <text x="215" y="518" text-anchor="middle" fill="#2C3E50" font-size="10">CLAUDE.md · AGENTS.md 맥락 파일 활용</text>
  <text x="215" y="533" text-anchor="middle" fill="#7F8C8D" font-size="9">에이전트가 이해하는 구조화된 명세</text>

  <!-- ===== 실용 기술 영역 노드 ===== -->

  <!-- Scrapling -->
  <rect x="468" y="388" width="160" height="62" rx="8" fill="url(#nodePurple)" filter="url(#shadow)"/>
  <text x="548" y="412" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Scrapling</text>
  <text x="548" y="429" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10">적응형 웹 스크래핑 라이브러리</text>
  <text x="548" y="443" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Adaptive Web Scraping</text>

  <!-- Qwen3.5 -->
  <rect x="642" y="388" width="160" height="62" rx="8" fill="url(#nodePurple)" filter="url(#shadow)"/>
  <text x="722" y="412" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Qwen 3.5</text>
  <text x="722" y="429" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10">오픈소스 고성능 LLM 모델</text>
  <text x="722" y="443" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Open-source High-perf LLM</text>

  <!-- 벡터 쿼리 -->
  <rect x="555" y="468" width="170" height="62" rx="8" fill="url(#nodePurple)" filter="url(#shadow)"/>
  <text x="640" y="492" text-anchor="middle" fill="white" font-size="13" font-weight="bold">벡터 쿼리</text>
  <text x="640" y="509" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="10">의미 기반 유사도 검색 기술</text>
  <text x="640" y="523" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Vector Similarity Search</text>

  <!-- ===== 하단 범례 ===== -->
  <rect x="20" y="570" width="820" height="22" rx="6" fill="#ECF0F1"/>
  <circle cx="60" cy="581" r="5" fill="#3498DB"/>
  <text x="72" y="585" fill="#2C3E50" font-size="10">도구 &amp; 환경</text>
  <circle cx="165" cy="581" r="5" fill="#27AE60"/>
  <text x="177" y="585" fill="#2C3E50" font-size="10">품질 &amp; 방법론</text>
  <circle cx="280" cy="581" r="5" fill="#E67E22"/>
  <text x="292" y="585" fill="#2C3E50" font-size="10">제품 전략</text>
  <circle cx="375" cy="581" r="5" fill="#9B59B6"/>
  <text x="387" y="585" fill="#2C3E50" font-size="10">실용 기술</text>
  <line x1="480" y1="581" x2="500" y2="581" stroke="#7F8C8D" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="508" y="585" fill="#7F8C8D" font-size="10">영역 간 연결 관계</text>
  <text x="720" y="585" text-anchor="middle" fill="#95A5A6" font-size="9">AI Agent Ecosystem · 2026.03</text>
</svg>
