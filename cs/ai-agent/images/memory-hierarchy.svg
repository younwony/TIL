<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" width="780" height="580">
  <defs>
    <!-- 그라디언트 팔레트 -->
    <linearGradient id="nodeBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB"/>
      <stop offset="100%" style="stop-color:#2980B9"/>
    </linearGradient>
    <linearGradient id="nodeGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71"/>
      <stop offset="100%" style="stop-color:#27AE60"/>
    </linearGradient>
    <linearGradient id="nodeRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C"/>
      <stop offset="100%" style="stop-color:#C0392B"/>
    </linearGradient>
    <linearGradient id="nodeOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22"/>
      <stop offset="100%" style="stop-color:#D35400"/>
    </linearGradient>
    <linearGradient id="nodePurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#8E44AD"/>
    </linearGradient>
    <linearGradient id="nodeGray" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#95A5A6"/>
      <stop offset="100%" style="stop-color:#7F8C8D"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <!-- 드롭섀도우 -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
    <filter id="shadowStrong" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000033"/>
    </filter>
    <!-- 피드백 강조 배경 -->
    <linearGradient id="feedbackBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0"/>
      <stop offset="100%" style="stop-color:#FFE0B2"/>
    </linearGradient>
  </defs>

  <!-- 전체 배경 -->
  <rect width="780" height="580" fill="#F5F7FA" rx="12"/>

  <!-- 헤더 -->
  <rect x="0" y="0" width="780" height="52" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="26" width="780" height="26" fill="url(#headerGrad)"/>
  <text x="390" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Claude Code 메모리 계층 구조</text>
  <text x="390" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a0b4cc">Memory Hierarchy — 우선순위 높음 → 낮음</text>

  <!-- ============================================================ -->
  <!-- 레이어 1: 사용자 직접 지시 (최우선) -->
  <!-- ============================================================ -->
  <g filter="url(#shadowStrong)">
    <rect x="140" y="68" width="500" height="54" rx="10" fill="url(#nodeRed)"/>
  </g>
  <!-- 왕관 배지 -->
  <circle cx="165" cy="95" r="16" fill="#ffffff" opacity="0.2"/>
  <text x="165" y="101" text-anchor="middle" font-family="Arial, sans-serif" font-size="16">&#x1F451;</text>
  <!-- 텍스트 -->
  <text x="390" y="89" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">사용자 직접 지시</text>
  <text x="390" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FFD7D0">채팅창 입력 · 즉각 반영 · 모든 설정을 override</text>
  <!-- 우선순위 배지 -->
  <rect x="590" y="76" width="38" height="16" rx="8" fill="#ffffff" opacity="0.25"/>
  <text x="609" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#ffffff">P1</text>

  <!-- 화살표 1→2 -->
  <line x1="390" y1="122" x2="390" y2="138" stroke="#7F8C8D" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="390,142 385,134 395,134" fill="#7F8C8D"/>

  <!-- ============================================================ -->
  <!-- 레이어 2: 로컬 CLAUDE.md -->
  <!-- ============================================================ -->
  <g filter="url(#shadow)">
    <rect x="160" y="146" width="460" height="54" rx="10" fill="url(#nodeOrange)"/>
  </g>
  <circle cx="185" cy="173" r="16" fill="#ffffff" opacity="0.2"/>
  <text x="185" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">&#x1F4C1;</text>
  <text x="390" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">로컬 CLAUDE.md</text>
  <text x="390" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FFE0C0">프로젝트 전용 규칙 · 저장소에 체크인 · 팀 공유 가능</text>
  <rect x="570" y="154" width="38" height="16" rx="8" fill="#ffffff" opacity="0.25"/>
  <text x="589" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#ffffff">P2</text>

  <!-- 화살표 2→3 -->
  <line x1="390" y1="200" x2="390" y2="216" stroke="#7F8C8D" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="390,220 385,212 395,212" fill="#7F8C8D"/>

  <!-- ============================================================ -->
  <!-- 레이어 3: 글로벌 CLAUDE.md -->
  <!-- ============================================================ -->
  <g filter="url(#shadow)">
    <rect x="180" y="224" width="420" height="54" rx="10" fill="url(#nodePurple)"/>
  </g>
  <circle cx="205" cy="251" r="16" fill="#ffffff" opacity="0.2"/>
  <text x="205" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">&#x1F30D;</text>
  <text x="390" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">글로벌 CLAUDE.md</text>
  <text x="390" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E5C8F5">모든 프로젝트 공통 규칙 · ~/.claude/ 저장 · 개인 설정</text>
  <rect x="550" y="232" width="38" height="16" rx="8" fill="#ffffff" opacity="0.25"/>
  <text x="569" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#ffffff">P3</text>

  <!-- 화살표 3→4 -->
  <line x1="390" y1="278" x2="390" y2="294" stroke="#7F8C8D" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="390,298 385,290 395,290" fill="#7F8C8D"/>

  <!-- ============================================================ -->
  <!-- 레이어 4: MEMORY.md (Auto Memory) — 중앙 노드 -->
  <!-- ============================================================ -->
  <g filter="url(#shadow)">
    <rect x="200" y="302" width="380" height="56" rx="10" fill="url(#nodeBlue)"/>
  </g>
  <circle cx="225" cy="330" r="16" fill="#ffffff" opacity="0.2"/>
  <text x="225" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">&#x1F9E0;</text>
  <text x="390" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">MEMORY.md (Auto Memory)</text>
  <text x="390" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#BDE0FF">Claude가 자동 관리 · 세션 간 지식 유지 · 4가지 타입으로 분류</text>
  <rect x="530" y="310" width="38" height="16" rx="8" fill="#ffffff" opacity="0.25"/>
  <text x="549" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#ffffff">P4</text>

  <!-- MEMORY.md → 4가지 분기 화살표 -->
  <!-- 가운데 수직선 분기점 -->
  <line x1="390" y1="358" x2="390" y2="376" stroke="#7F8C8D" stroke-width="1.5"/>

  <!-- 수평 분배선 -->
  <line x1="98" y1="376" x2="682" y2="376" stroke="#7F8C8D" stroke-width="1.5"/>

  <!-- 각 타입으로 내려가는 수직선 -->
  <line x1="98"  y1="376" x2="98"  y2="390" stroke="#7F8C8D" stroke-width="1.5"/>
  <line x1="294" y1="376" x2="294" y2="390" stroke="#7F8C8D" stroke-width="1.5"/>
  <line x1="490" y1="376" x2="490" y2="390" stroke="#7F8C8D" stroke-width="1.5"/>
  <line x1="682" y1="376" x2="682" y2="390" stroke="#7F8C8D" stroke-width="1.5"/>

  <!-- 화살표 머리 -->
  <polygon points="98,394  93,386  103,386"  fill="#7F8C8D"/>
  <polygon points="294,394 289,386 299,386" fill="#7F8C8D"/>
  <polygon points="490,394 485,386 495,386" fill="#7F8C8D"/>
  <polygon points="682,394 677,386 687,386" fill="#7F8C8D"/>

  <!-- ============================================================ -->
  <!-- 메모리 타입 카드 4개 -->
  <!-- ============================================================ -->

  <!-- feedback (강조: 가장 중요) -->
  <g filter="url(#shadow)">
    <rect x="28" y="398" width="140" height="90" rx="9" fill="#FFF8F0" stroke="#E67E22" stroke-width="2"/>
  </g>
  <!-- 중요 배지 -->
  <rect x="28" y="398" width="140" height="26" rx="9" fill="url(#nodeOrange)"/>
  <rect x="28" y="415" width="140" height="9" fill="url(#nodeOrange)"/>
  <text x="72" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">feedback</text>
  <rect x="120" y="402" width="42" height="14" rx="7" fill="#ffffff" opacity="0.9"/>
  <text x="141" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="#E67E22">가장 중요</text>
  <text x="98" y="441" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#C0392B">교정 기록</text>
  <text x="98" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">잘못된 행동을</text>
  <text x="98" y="469" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">수정한 내역 보존</text>
  <text x="98" y="481" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#BDC3C7">같은 실수 반복 방지</text>

  <!-- user -->
  <g filter="url(#shadow)">
    <rect x="224" y="398" width="140" height="90" rx="9" fill="#F0FFF4" stroke="#2ECC71" stroke-width="1.5"/>
  </g>
  <rect x="224" y="398" width="140" height="26" rx="9" fill="url(#nodeGreen)"/>
  <rect x="224" y="415" width="140" height="9" fill="url(#nodeGreen)"/>
  <text x="294" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">user</text>
  <text x="294" y="441" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#27AE60">사용자 프로필</text>
  <text x="294" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">선호 언어, 스타일,</text>
  <text x="294" y="469" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">개인 작업 패턴</text>
  <text x="294" y="481" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#BDC3C7">장기 선호도 학습</text>

  <!-- project -->
  <g filter="url(#shadow)">
    <rect x="420" y="398" width="140" height="90" rx="9" fill="#EEF2FF" stroke="#3498DB" stroke-width="1.5"/>
  </g>
  <rect x="420" y="398" width="140" height="26" rx="9" fill="url(#nodeBlue)"/>
  <rect x="420" y="415" width="140" height="9" fill="url(#nodeBlue)"/>
  <text x="490" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">project</text>
  <text x="490" y="441" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#2980B9">프로젝트 상황</text>
  <text x="490" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">현재 진행 상태,</text>
  <text x="490" y="469" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">결정 사항, 컨텍스트</text>
  <text x="490" y="481" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#BDC3C7">세션 간 연속성 유지</text>

  <!-- reference -->
  <g filter="url(#shadow)">
    <rect x="612" y="398" width="140" height="90" rx="9" fill="#F5F0FF" stroke="#9B59B6" stroke-width="1.5"/>
  </g>
  <rect x="612" y="398" width="140" height="26" rx="9" fill="url(#nodePurple)"/>
  <rect x="612" y="415" width="140" height="9" fill="url(#nodePurple)"/>
  <text x="682" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">reference</text>
  <text x="682" y="441" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#8E44AD">외부 리소스 위치</text>
  <text x="682" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">문서, URL, 파일</text>
  <text x="682" y="469" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">경로 등 참조 정보</text>
  <text x="682" y="481" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#BDC3C7">빠른 리소스 접근</text>

  <!-- ============================================================ -->
  <!-- 수직 연결선 4→5 (중앙) -->
  <!-- ============================================================ -->
  <line x1="390" y1="488" x2="390" y2="502" stroke="#7F8C8D" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="390,506 385,498 395,498" fill="#7F8C8D"/>

  <!-- ============================================================ -->
  <!-- 레이어 5: 시스템 기본 동작 -->
  <!-- ============================================================ -->
  <g filter="url(#shadow)">
    <rect x="220" y="510" width="340" height="46" rx="10" fill="url(#nodeGray)"/>
  </g>
  <circle cx="245" cy="533" r="14" fill="#ffffff" opacity="0.2"/>
  <text x="245" y="539" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">&#x2699;&#xFE0F;</text>
  <text x="400" y="528" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">시스템 기본 동작</text>
  <text x="400" y="544" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ECF0F1">위 레이어에 명시 없을 때만 적용 · Claude 내장 기본값</text>
  <rect x="508" y="517" width="38" height="16" rx="8" fill="#ffffff" opacity="0.25"/>
  <text x="527" y="529" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#ffffff">P5</text>

  <!-- ============================================================ -->
  <!-- 범례 -->
  <!-- ============================================================ -->
  <rect x="28" y="566" width="724" height="1" fill="#D5DBDB"/>
  <text x="390" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">우선순위: P1(최우선) &gt; P2 &gt; P3 &gt; P4 &gt; P5(최하위) · 높은 레이어가 낮은 레이어를 항상 override</text>

</svg>
