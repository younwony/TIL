<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #1E3A5F; }
      .header-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #FFFFFF; }
      .cell-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12.5px; fill: #334155; }
      .cell-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12.5px; font-weight: 600; fill: #1E3A5F; }
    </style>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="420" fill="#FFFFFF" rx="8"/>

  <!-- 타이틀 -->
  <text x="440" y="40" text-anchor="middle" class="title">확장 시스템 비교</text>
  <line x1="340" y1="50" x2="540" y2="50" stroke="#1E3A5F" stroke-width="2" stroke-linecap="round"/>

  <!-- 테이블 영역 -->
  <g transform="translate(30, 70)">
    <!-- 테이블 외곽선 -->
    <rect x="0" y="0" width="820" height="330" rx="6" fill="none" stroke="#CBD5E1" stroke-width="1.5"/>

    <!-- 헤더 행 -->
    <rect x="0" y="0" width="820" height="48" rx="6" fill="#1E3A5F"/>
    <!-- 헤더 하단 직각 보정 -->
    <rect x="0" y="6" width="820" height="42" fill="#1E3A5F"/>

    <!-- 헤더 컬럼 구분선 -->
    <line x1="120" y1="8" x2="120" y2="40" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="295" y1="8" x2="295" y2="40" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="470" y1="8" x2="470" y2="40" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="645" y1="8" x2="645" y2="40" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

    <!-- 헤더 텍스트 -->
    <text x="60" y="30" text-anchor="middle" class="header-text">구분</text>
    <text x="207" y="30" text-anchor="middle" class="header-text">CLAUDE.md</text>
    <text x="382" y="30" text-anchor="middle" class="header-text">Skills</text>
    <text x="557" y="30" text-anchor="middle" class="header-text">Slash Commands</text>
    <text x="732" y="30" text-anchor="middle" class="header-text">Plugins</text>

    <!-- 행 1: 범위 (흰색 배경) -->
    <rect x="0" y="48" width="820" height="56" fill="#FFFFFF"/>
    <line x1="120" y1="48" x2="120" y2="104" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="295" y1="48" x2="295" y2="104" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="470" y1="48" x2="470" y2="104" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="645" y1="48" x2="645" y2="104" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="0" y1="104" x2="820" y2="104" stroke="#E2E8F0" stroke-width="1"/>
    <text x="60" y="80" text-anchor="middle" class="cell-label">범위</text>
    <text x="207" y="80" text-anchor="middle" class="cell-text">프로젝트 전체</text>
    <text x="382" y="80" text-anchor="middle" class="cell-text">특정 워크플로우</text>
    <text x="557" y="80" text-anchor="middle" class="cell-text">단일 명령</text>
    <text x="732" y="80" text-anchor="middle" class="cell-text">통합 패키지</text>

    <!-- 행 2: 실행 (연회색 배경) -->
    <rect x="0" y="104" width="820" height="56" fill="#F8FAFC"/>
    <line x1="120" y1="104" x2="120" y2="160" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="295" y1="104" x2="295" y2="160" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="470" y1="104" x2="470" y2="160" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="645" y1="104" x2="645" y2="160" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="0" y1="160" x2="820" y2="160" stroke="#E2E8F0" stroke-width="1"/>
    <text x="60" y="136" text-anchor="middle" class="cell-label">실행</text>
    <text x="207" y="136" text-anchor="middle" class="cell-text">자동 로드</text>
    <text x="382" y="136" text-anchor="middle" class="cell-text">자동 감지</text>
    <text x="557" y="136" text-anchor="middle" class="cell-text">수동 호출</text>
    <text x="732" y="136" text-anchor="middle" class="cell-text">-</text>

    <!-- 행 3: 공유 (흰색 배경) -->
    <rect x="0" y="160" width="820" height="56" fill="#FFFFFF"/>
    <line x1="120" y1="160" x2="120" y2="216" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="295" y1="160" x2="295" y2="216" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="470" y1="160" x2="470" y2="216" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="645" y1="160" x2="645" y2="216" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="0" y1="216" x2="820" y2="216" stroke="#E2E8F0" stroke-width="1"/>
    <text x="60" y="192" text-anchor="middle" class="cell-label">공유</text>
    <text x="207" y="192" text-anchor="middle" class="cell-text">Git 커밋</text>
    <text x="382" y="192" text-anchor="middle" class="cell-text">파일 공유</text>
    <text x="557" y="192" text-anchor="middle" class="cell-text">파일 공유</text>
    <text x="732" y="192" text-anchor="middle" class="cell-text">Marketplace</text>

    <!-- 행 4: 용도 (연회색 배경) -->
    <rect x="0" y="216" width="820" height="56" fill="#F8FAFC"/>
    <line x1="120" y1="216" x2="120" y2="272" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="295" y1="216" x2="295" y2="272" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="470" y1="216" x2="470" y2="272" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="645" y1="216" x2="645" y2="272" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="0" y1="272" x2="820" y2="272" stroke="#E2E8F0" stroke-width="1"/>
    <text x="60" y="248" text-anchor="middle" class="cell-label">용도</text>
    <text x="207" y="248" text-anchor="middle" class="cell-text">설정, 규칙</text>
    <text x="382" y="248" text-anchor="middle" class="cell-text">반복 작업 자동화</text>
    <text x="557" y="248" text-anchor="middle" class="cell-text">빈번한 프롬프트</text>
    <text x="732" y="248" text-anchor="middle" class="cell-text">올인원 확장</text>

    <!-- 행 5: 예시 (흰색 배경) -->
    <rect x="0" y="272" width="820" height="52" fill="#FFFFFF"/>
    <rect x="0" y="318" width="820" height="12" rx="6" fill="#FFFFFF"/>
    <line x1="120" y1="272" x2="120" y2="330" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="295" y1="272" x2="295" y2="330" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="470" y1="272" x2="470" y2="330" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="645" y1="272" x2="645" y2="330" stroke="#E2E8F0" stroke-width="1"/>
    <text x="60" y="305" text-anchor="middle" class="cell-label">예시</text>
    <text x="207" y="305" text-anchor="middle" class="cell-text">코딩 스타일</text>
    <text x="382" y="305" text-anchor="middle" class="cell-text">PR 리뷰 자동화</text>
    <text x="557" y="305" text-anchor="middle" class="cell-text">/commit</text>
    <text x="732" y="305" text-anchor="middle" class="cell-text">dx 플러그인</text>

    <!-- 좌측 구분 컬럼 배경 하이라이트 -->
    <rect x="1" y="48" width="119" height="282" fill="rgba(30,58,95,0.04)" pointer-events="none"/>
  </g>
</svg>
