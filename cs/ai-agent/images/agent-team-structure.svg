<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" width="700" height="450">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
    </style>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3498DB"/>
      <stop offset="100%" stop-color="#2980B9"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#27AE60"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E67E22"/>
      <stop offset="100%" stop-color="#D35400"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/>
    </filter>
    <!-- 화살표 마커 -->
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2980B9"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7F8C8D"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect x="0" y="0" width="700" height="450" rx="12" ry="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>

  <!-- 타이틀 -->
  <text x="350" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#2C3E50">Agent Team 구조</text>

  <!-- ==================== Team Lead 박스 ==================== -->
  <rect x="230" y="50" width="240" height="60" rx="10" ry="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="350" y="76" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">Team Lead</text>
  <text x="350" y="96" text-anchor="middle" font-size="12" fill="#D6EAF8">(메인 세션)</text>

  <!-- ==================== Team Lead → Teammate 화살표 ==================== -->
  <!-- Lead → A -->
  <line x1="280" y1="110" x2="130" y2="175" stroke="#2980B9" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <!-- Lead → B -->
  <line x1="350" y1="110" x2="350" y2="175" stroke="#2980B9" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <!-- Lead → C -->
  <line x1="420" y1="110" x2="570" y2="175" stroke="#2980B9" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- 화살표 라벨 -->
  <text x="350" y="148" text-anchor="middle" font-size="10" fill="#7F8C8D" font-style="italic">작업 분배</text>

  <!-- ==================== Teammate A ==================== -->
  <rect x="40" y="180" width="180" height="60" rx="10" ry="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="130" y="206" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Teammate A</text>
  <text x="130" y="226" text-anchor="middle" font-size="11" fill="#D5F5E3">(보안 리뷰)</text>

  <!-- ==================== Teammate B ==================== -->
  <rect x="260" y="180" width="180" height="60" rx="10" ry="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="350" y="206" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Teammate B</text>
  <text x="350" y="226" text-anchor="middle" font-size="11" fill="#D5F5E3">(성능 리뷰)</text>

  <!-- ==================== Teammate C ==================== -->
  <rect x="480" y="180" width="180" height="60" rx="10" ry="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="570" y="206" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Teammate C</text>
  <text x="570" y="226" text-anchor="middle" font-size="11" fill="#D5F5E3">(테스트 리뷰)</text>

  <!-- ==================== Teammate 간 양방향 점선 화살표 ==================== -->
  <!-- A ↔ B -->
  <line x1="220" y1="200" x2="260" y2="200" stroke="#7F8C8D" stroke-width="1.5" stroke-dasharray="5,3" marker-start="url(#arrowGray)" marker-end="url(#arrowGray)"/>
  <!-- B ↔ C -->
  <line x1="440" y1="200" x2="480" y2="200" stroke="#7F8C8D" stroke-width="1.5" stroke-dasharray="5,3" marker-start="url(#arrowGray)" marker-end="url(#arrowGray)"/>
  <!-- A ↔ C (아래쪽 곡선) -->
  <path d="M 130 240 Q 130 270, 350 275 Q 570 270, 570 240" stroke="#7F8C8D" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-start="url(#arrowGray)" marker-end="url(#arrowGray)"/>

  <!-- 점선 라벨 -->
  <text x="350" y="290" text-anchor="middle" font-size="10" fill="#7F8C8D" font-style="italic">직접 소통</text>

  <!-- ==================== 독립 컨텍스트 박스 ==================== -->
  <rect x="60" y="248" width="140" height="26" rx="6" ry="6" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
  <text x="130" y="266" text-anchor="middle" font-size="11" fill="#7F8C8D">독립 컨텍스트</text>

  <rect x="280" y="248" width="140" height="26" rx="6" ry="6" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
  <text x="350" y="266" text-anchor="middle" font-size="11" fill="#7F8C8D">독립 컨텍스트</text>

  <rect x="500" y="248" width="140" height="26" rx="6" ry="6" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
  <text x="570" y="266" text-anchor="middle" font-size="11" fill="#7F8C8D">독립 컨텍스트</text>

  <!-- ==================== 하단: 공유 작업 목록 바 ==================== -->
  <rect x="40" y="310" width="620" height="45" rx="10" ry="10" fill="url(#orangeGrad)" filter="url(#shadow)"/>
  <text x="350" y="337" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">공유 작업 목록 (Shared Task List)</text>

  <!-- 공유 작업 목록으로 향하는 점선 -->
  <line x1="130" y1="274" x2="130" y2="310" stroke="#D35400" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="350" y1="274" x2="350" y2="310" stroke="#D35400" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="570" y1="274" x2="570" y2="310" stroke="#D35400" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- ==================== 범례 ==================== -->
  <rect x="40" y="375" width="620" height="55" rx="8" ry="8" fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1"/>
  <text x="60" y="397" font-size="11" font-weight="600" fill="#2C3E50">범례:</text>

  <!-- 실선 화살표 -->
  <line x1="100" y1="393" x2="140" y2="393" stroke="#2980B9" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="148" y="397" font-size="11" fill="#2C3E50">작업 분배</text>

  <!-- 점선 화살표 -->
  <line x1="230" y1="393" x2="270" y2="393" stroke="#7F8C8D" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>
  <text x="278" y="397" font-size="11" fill="#2C3E50">직접 소통</text>

  <!-- 색상 범례 -->
  <rect x="370" y="385" width="16" height="16" rx="3" ry="3" fill="url(#blueGrad)"/>
  <text x="392" y="397" font-size="11" fill="#2C3E50">Team Lead</text>

  <rect x="462" y="385" width="16" height="16" rx="3" ry="3" fill="url(#greenGrad)"/>
  <text x="484" y="397" font-size="11" fill="#2C3E50">Teammate</text>

  <rect x="554" y="385" width="16" height="16" rx="3" ry="3" fill="url(#orangeGrad)"/>
  <text x="576" y="397" font-size="11" fill="#2C3E50">공유 자원</text>

  <text x="350" y="422" text-anchor="middle" font-size="10" fill="#95A5A6">각 Teammate는 독립된 컨텍스트에서 실행되며, 공유 작업 목록을 통해 협업합니다</text>
</svg>