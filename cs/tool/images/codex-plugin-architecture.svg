<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <!-- 파랑 (Claude 계열) -->
    <linearGradient id="nodeBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB"/>
      <stop offset="100%" style="stop-color:#2980B9"/>
    </linearGradient>
    <!-- 진파랑 (Claude Code 컨테이너) -->
    <linearGradient id="nodeDarkBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50"/>
      <stop offset="100%" style="stop-color:#1A252F"/>
    </linearGradient>
    <!-- 초록 (Codex 계열) -->
    <linearGradient id="nodeGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71"/>
      <stop offset="100%" style="stop-color:#27AE60"/>
    </linearGradient>
    <!-- 주황 (OpenAI) -->
    <linearGradient id="nodeOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22"/>
      <stop offset="100%" style="stop-color:#D35400"/>
    </linearGradient>
    <!-- 보라 (Review Gate) -->
    <linearGradient id="nodePurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#8E44AD"/>
    </linearGradient>
    <!-- 회색 (사용자) -->
    <linearGradient id="nodeGray" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7F8C8D"/>
      <stop offset="100%" style="stop-color:#636E72"/>
    </linearGradient>
    <!-- 배경 그라디언트 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC"/>
      <stop offset="100%" style="stop-color:#EAF4FB"/>
    </linearGradient>
    <!-- 드롭섀도우 -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000022"/>
    </filter>
    <!-- 점선 마커 -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980B9"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27AE60"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8E44AD"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#636E72"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="900" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- 제목 -->
  <text x="450" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#2C3E50">Codex Plugin for Claude Code - 아키텍처</text>
  <line x1="60" y1="44" x2="840" y2="44" stroke="#BDC3C7" stroke-width="1"/>

  <!-- ─────────────────────────────────────────────────────────────── -->
  <!-- Claude Code 컨테이너 (큰 영역) -->
  <rect x="210" y="65" width="440" height="280" rx="12" fill="#EBF5FB" stroke="#2980B9" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="430" y="87" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980B9">Claude Code</text>
  <text x="430" y="101" text-anchor="middle" font-size="9" fill="#7F8C8D">메인 AI 코딩 에이전트</text>

  <!-- Plugin System 내부 박스 -->
  <rect x="228" y="110" width="180" height="70" rx="8" fill="url(#nodeBlue)" filter="url(#shadow)"/>
  <text x="318" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Plugin System</text>
  <text x="318" y="156" text-anchor="middle" font-size="9" fill="#D6EAF8">커맨드 라우터 / 훅 관리</text>
  <text x="318" y="169" text-anchor="middle" font-size="9" fill="#D6EAF8">슬래시 커맨드 등록</text>

  <!-- Codex Plugin 내부 박스 -->
  <rect x="228" y="200" width="180" height="70" rx="8" fill="url(#nodeGreen)" filter="url(#shadow)"/>
  <text x="318" y="230" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Codex Plugin</text>
  <text x="318" y="246" text-anchor="middle" font-size="9" fill="#D5F5E3">/codex:review, /codex:rescue</text>
  <text x="318" y="259" text-anchor="middle" font-size="9" fill="#D5F5E3">커맨드 → API 호출 변환</text>

  <!-- Review Gate (Stop Hook) - 내부 보라 박스 -->
  <rect x="430" y="145" width="195" height="80" rx="8" fill="url(#nodePurple)" filter="url(#shadow)" opacity="0.92"/>
  <text x="527" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Review Gate</text>
  <text x="527" y="184" text-anchor="middle" font-size="9" fill="#E8DAEF">(Stop Hook - 선택적)</text>
  <text x="527" y="198" text-anchor="middle" font-size="9" fill="#E8DAEF">Claude 응답마다</text>
  <text x="527" y="211" text-anchor="middle" font-size="9" fill="#E8DAEF">자동 리뷰 트리거</text>

  <!-- Plugin System → Codex Plugin 화살표 (내부) -->
  <line x1="318" y1="180" x2="318" y2="198" stroke="#27AE60" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Codex Plugin → Review Gate (내부 연결) -->
  <line x1="408" y1="235" x2="428" y2="200" stroke="#8E44AD" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>

  <!-- ─────────────────────────────────────────────────────────────── -->
  <!-- 사용자 노드 (왼쪽) -->
  <rect x="30" y="140" width="140" height="90" rx="10" fill="url(#nodeGray)" filter="url(#shadow)"/>
  <text x="100" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="white">사용자</text>
  <text x="100" y="195" text-anchor="middle" font-size="9" fill="#ECF0F1">/codex:review</text>
  <text x="100" y="208" text-anchor="middle" font-size="9" fill="#ECF0F1">/codex:rescue 등</text>
  <text x="100" y="221" text-anchor="middle" font-size="9" fill="#D0D3D4">슬래시 커맨드 입력</text>

  <!-- Codex App Server (오른쪽 중단) -->
  <rect x="680" y="130" width="170" height="85" rx="10" fill="url(#nodeGreen)" filter="url(#shadow)"/>
  <text x="765" y="163" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Codex App Server</text>
  <text x="765" y="179" text-anchor="middle" font-size="9" fill="#D5F5E3">로컬 실행</text>
  <text x="765" y="193" text-anchor="middle" font-size="9" fill="#D5F5E3">~/.codex/config.toml</text>
  <text x="765" y="206" text-anchor="middle" font-size="9" fill="#D5F5E3">.codex/config.toml</text>

  <!-- OpenAI API (오른쪽 하단) -->
  <rect x="695" y="260" width="145" height="75" rx="10" fill="url(#nodeOrange)" filter="url(#shadow)"/>
  <text x="767" y="290" text-anchor="middle" font-size="12" font-weight="bold" fill="white">OpenAI API</text>
  <text x="767" y="306" text-anchor="middle" font-size="9" fill="#FDEBD0">모델 추론</text>
  <text x="767" y="320" text-anchor="middle" font-size="9" fill="#FDEBD0">ChatGPT 구독 / API 키</text>

  <!-- ─────────────────────────────────────────────────────────────── -->
  <!-- 화살표들 -->

  <!-- 사용자 → Claude Code (Plugin System) -->
  <line x1="170" y1="185" x2="226" y2="148" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="155" y="153" width="66" height="28" rx="4" fill="white" opacity="0.88"/>
  <text x="188" y="165" text-anchor="middle" font-size="9" fill="#2C3E50">슬래시</text>
  <text x="188" y="176" text-anchor="middle" font-size="9" fill="#2C3E50">커맨드</text>

  <!-- Codex Plugin → Codex App Server -->
  <line x1="408" y1="248" x2="678" y2="185" stroke="#27AE60" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="510" y="240" width="66" height="28" rx="4" fill="white" opacity="0.88"/>
  <text x="543" y="252" text-anchor="middle" font-size="9" fill="#27AE60">작업</text>
  <text x="543" y="263" text-anchor="middle" font-size="9" fill="#27AE60">요청</text>

  <!-- Codex App Server → OpenAI API -->
  <line x1="765" y1="215" x2="765" y2="258" stroke="#D35400" stroke-width="2" marker-end="url(#arrowGray)"/>
  <rect x="773" y="231" width="52" height="28" rx="4" fill="white" opacity="0.88"/>
  <text x="799" y="243" text-anchor="middle" font-size="9" fill="#D35400">모델</text>
  <text x="799" y="254" text-anchor="middle" font-size="9" fill="#D35400">추론</text>

  <!-- Review Gate → Claude Code 피드백 (점선) -->
  <path d="M 527 225 Q 527 300 430 310 Q 330 318 318 295" stroke="#8E44AD" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrowPurple)"/>
  <rect x="355" y="308" width="80" height="24" rx="4" fill="white" opacity="0.88"/>
  <text x="395" y="322" text-anchor="middle" font-size="9" fill="#8E44AD">자동 리뷰 결과</text>

  <!-- ─────────────────────────────────────────────────────────────── -->
  <!-- 하단 설정 주석 영역 -->
  <rect x="30" y="365" width="840" height="70" rx="8" fill="#F4F6F7" stroke="#BDC3C7" stroke-width="1"/>
  <text x="50" y="385" font-size="11" font-weight="bold" fill="#2C3E50">설정 파일</text>
  <text x="50" y="402" font-size="10" fill="#555">전역:  ~/.codex/config.toml</text>
  <text x="50" y="418" font-size="10" fill="#555">프로젝트:  .codex/config.toml  (프로젝트 루트)</text>

  <text x="480" y="385" font-size="11" font-weight="bold" fill="#2C3E50">인증</text>
  <text x="480" y="402" font-size="10" fill="#555">ChatGPT Plus/Pro 구독  →  자동 인증</text>
  <text x="480" y="418" font-size="10" fill="#555">OpenAI API 키  →  OPENAI_API_KEY 환경변수</text>

  <!-- ─────────────────────────────────────────────────────────────── -->
  <!-- 범례 (Legend) -->
  <rect x="30" y="450" width="840" height="58" rx="8" fill="#EAF2F8" stroke="#AED6F1" stroke-width="1"/>
  <text x="50" y="468" font-size="11" font-weight="bold" fill="#2C3E50">범례</text>

  <!-- 실선 화살표 -->
  <line x1="108" y1="482" x2="138" y2="482" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="145" y="486" font-size="10" fill="#555">일반 데이터 흐름</text>

  <!-- 점선 화살표 -->
  <line x1="280" y1="482" x2="310" y2="482" stroke="#8E44AD" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowPurple)"/>
  <text x="317" y="486" font-size="10" fill="#555">선택적 피드백 (Stop Hook)</text>

  <!-- 색상 범례 -->
  <rect x="510" y="473" width="14" height="14" rx="3" fill="url(#nodeBlue)"/>
  <text x="529" y="484" font-size="10" fill="#555">Claude 계열</text>
  <rect x="620" y="473" width="14" height="14" rx="3" fill="url(#nodeGreen)"/>
  <text x="639" y="484" font-size="10" fill="#555">Codex 계열</text>
  <rect x="720" y="473" width="14" height="14" rx="3" fill="url(#nodePurple)"/>
  <text x="739" y="484" font-size="10" fill="#555">Review Gate</text>

  <!-- 점선 컨테이너 범례 -->
  <rect x="510" y="492" width="14" height="10" rx="2" fill="none" stroke="#2980B9" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="529" y="501" font-size="10" fill="#555">Claude Code 경계</text>
</svg>
