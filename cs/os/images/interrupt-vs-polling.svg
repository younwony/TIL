<svg viewBox="0 0 860 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="nodeBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB"/>
      <stop offset="100%" style="stop-color:#2980B9"/>
    </linearGradient>
    <linearGradient id="nodeGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71"/>
      <stop offset="100%" style="stop-color:#27AE60"/>
    </linearGradient>
    <linearGradient id="nodeRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C"/>
      <stop offset="100%" style="stop-color:#C0392B"/>
    </linearGradient>
    <linearGradient id="nodeOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22"/>
      <stop offset="100%" style="stop-color:#D35400"/>
    </linearGradient>
    <linearGradient id="nodePurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6"/>
      <stop offset="100%" style="stop-color:#8E44AD"/>
    </linearGradient>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7F8C8D"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#27AE60"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D35400"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#C0392B"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8E44AD"/>
    </marker>
  </defs>

  <!-- 전체 배경 -->
  <rect width="860" height="620" fill="#FAFAFA" rx="8"/>

  <!-- 메인 타이틀 -->
  <text x="430" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#2C3E50">인터럽트 방식 vs 폴링 방식</text>
  <text x="430" y="48" text-anchor="middle" font-size="11" fill="#7F8C8D">CPU와 I/O 장치 간 통신 방식 비교 (시간순)</text>
  <line x1="40" y1="57" x2="820" y2="57" stroke="#ECF0F1" stroke-width="1.5"/>

  <!-- ===== 왼쪽 패널: 폴링 방식 ===== -->
  <rect x="20" y="65" width="400" height="545" fill="white" rx="8" stroke="#ECF0F1" stroke-width="1.5"/>
  <rect x="20" y="65" width="400" height="36" fill="url(#nodeRed)" rx="8"/>
  <rect x="20" y="89" width="400" height="12" fill="#C0392B"/>
  <text x="220" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="white">폴링 방식 (Polling)</text>

  <!-- 참가자 헤더 -->
  <rect x="60" y="112" width="76" height="28" fill="url(#nodeBlue)" rx="5"/>
  <text x="98" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="white">CPU</text>
  <rect x="300" y="112" width="76" height="28" fill="url(#nodeGreen)" rx="5"/>
  <text x="338" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="white">I/O 장치</text>

  <!-- 생명선 -->
  <line x1="98" y1="140" x2="98" y2="548" stroke="#7F8C8D" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="338" y1="140" x2="338" y2="548" stroke="#7F8C8D" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- CPU 활성 구간 (빨강 - 낭비) -->
  <rect x="93" y="162" width="10" height="238" fill="#E74C3C" opacity="0.35" rx="2"/>

  <!-- 상태확인 1 -->
  <line x1="103" y1="170" x2="330" y2="170" stroke="#C0392B" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="133" y="157" width="110" height="15" fill="white"/>
  <text x="188" y="168" text-anchor="middle" font-size="10" fill="#C0392B" font-weight="bold">준비됐나? (상태 확인)</text>
  <line x1="332" y1="186" x2="105" y2="186" stroke="#7F8C8D" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>
  <rect x="143" y="173" width="92" height="15" fill="white"/>
  <text x="189" y="184" text-anchor="middle" font-size="10" fill="#7F8C8D">아직 준비 안 됨</text>

  <!-- 상태확인 2 -->
  <line x1="103" y1="208" x2="330" y2="208" stroke="#C0392B" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="133" y="195" width="110" height="15" fill="white"/>
  <text x="188" y="206" text-anchor="middle" font-size="10" fill="#C0392B" font-weight="bold">준비됐나? (상태 확인)</text>
  <line x1="332" y1="224" x2="105" y2="224" stroke="#7F8C8D" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>
  <rect x="143" y="211" width="92" height="15" fill="white"/>
  <text x="189" y="222" text-anchor="middle" font-size="10" fill="#7F8C8D">아직 준비 안 됨</text>

  <!-- 상태확인 3 -->
  <line x1="103" y1="246" x2="330" y2="246" stroke="#C0392B" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="133" y="233" width="110" height="15" fill="white"/>
  <text x="188" y="244" text-anchor="middle" font-size="10" fill="#C0392B" font-weight="bold">준비됐나? (상태 확인)</text>
  <line x1="332" y1="262" x2="105" y2="262" stroke="#7F8C8D" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>
  <rect x="143" y="249" width="92" height="15" fill="white"/>
  <text x="189" y="260" text-anchor="middle" font-size="10" fill="#7F8C8D">아직 준비 안 됨</text>

  <!-- CPU 낭비 강조 박스 -->
  <rect x="36" y="272" width="110" height="38" fill="#FADBD8" rx="4" stroke="#E74C3C" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="91" y="287" text-anchor="middle" font-size="10" fill="#C0392B" font-weight="bold">CPU 사이클 낭비!</text>
  <text x="91" y="302" text-anchor="middle" font-size="9" fill="#E74C3C">다른 작업 불가</text>

  <!-- 장치 처리 중 -->
  <rect x="310" y="272" width="76" height="38" fill="#EBF5FB" rx="4" stroke="#3498DB" stroke-width="1"/>
  <text x="348" y="287" text-anchor="middle" font-size="10" fill="#2980B9" font-weight="bold">장치 처리 중</text>
  <text x="348" y="302" text-anchor="middle" font-size="9" fill="#7F8C8D">(데이터 준비)</text>

  <!-- 상태확인 4 (성공) -->
  <line x1="103" y1="322" x2="330" y2="322" stroke="#C0392B" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="133" y="309" width="110" height="15" fill="white"/>
  <text x="188" y="320" text-anchor="middle" font-size="10" fill="#C0392B" font-weight="bold">준비됐나? (상태 확인)</text>

  <!-- 완료 응답 -->
  <line x1="332" y1="342" x2="105" y2="342" stroke="#27AE60" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="138" y="329" width="100" height="15" fill="white"/>
  <text x="188" y="340" text-anchor="middle" font-size="10" fill="#27AE60" font-weight="bold">데이터 준비 완료!</text>

  <!-- 데이터 처리 -->
  <rect x="62" y="354" width="72" height="26" fill="url(#nodeGreen)" rx="4"/>
  <text x="98" y="365" text-anchor="middle" font-size="10" fill="white" font-weight="bold">데이터 처리</text>
  <text x="98" y="376" text-anchor="middle" font-size="9" fill="white">완료</text>

  <!-- 폴링 요약 -->
  <rect x="28" y="394" width="376" height="54" fill="#FDEDEC" rx="5" stroke="#E74C3C" stroke-width="1"/>
  <text x="216" y="411" text-anchor="middle" font-size="11" font-weight="bold" fill="#C0392B">폴링 방식 특징</text>
  <text x="42" y="426" font-size="10" fill="#2C3E50">- CPU가 주기적으로 장치 상태를 직접 확인 (busy-waiting)</text>
  <text x="42" y="440" font-size="10" fill="#2C3E50">- 장치 준비 전까지 CPU 사이클 낭비 (비효율적)</text>

  <!-- ===== 오른쪽 패널: 인터럽트 방식 ===== -->
  <rect x="440" y="65" width="400" height="545" fill="white" rx="8" stroke="#ECF0F1" stroke-width="1.5"/>
  <rect x="440" y="65" width="400" height="36" fill="url(#nodeGreen)" rx="8"/>
  <rect x="440" y="89" width="400" height="12" fill="#27AE60"/>
  <text x="640" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="white">인터럽트 방식 (Interrupt)</text>

  <!-- 참가자 헤더 -->
  <rect x="478" y="112" width="76" height="28" fill="url(#nodeBlue)" rx="5"/>
  <text x="516" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="white">CPU</text>
  <rect x="718" y="112" width="76" height="28" fill="url(#nodeGreen)" rx="5"/>
  <text x="756" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="white">I/O 장치</text>

  <!-- 생명선 -->
  <line x1="516" y1="140" x2="516" y2="548" stroke="#7F8C8D" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="756" y1="140" x2="756" y2="548" stroke="#7F8C8D" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- CPU 다른 작업 수행 구간 (파랑) -->
  <rect x="511" y="162" width="10" height="116" fill="#3498DB" opacity="0.35" rx="2"/>

  <!-- 다른 작업 수행 1 -->
  <rect x="456" y="162" width="110" height="24" fill="#EBF5FB" rx="4" stroke="#3498DB" stroke-width="1"/>
  <text x="511" y="174" text-anchor="middle" font-size="10" fill="#2980B9" font-weight="bold">다른 작업 수행 중</text>
  <text x="511" y="183" text-anchor="middle" font-size="9" fill="#7F8C8D">Process A 실행</text>

  <!-- 장치 처리 중 (동시에) -->
  <rect x="718" y="162" width="76" height="24" fill="#EBF5FB" rx="4" stroke="#3498DB" stroke-width="1"/>
  <text x="756" y="174" text-anchor="middle" font-size="10" fill="#2980B9" font-weight="bold">장치 처리 중</text>

  <!-- 다른 작업 수행 2 -->
  <rect x="456" y="196" width="110" height="24" fill="#EBF5FB" rx="4" stroke="#3498DB" stroke-width="1"/>
  <text x="511" y="208" text-anchor="middle" font-size="10" fill="#2980B9" font-weight="bold">다른 작업 수행 중</text>
  <text x="511" y="217" text-anchor="middle" font-size="9" fill="#7F8C8D">Process B 실행</text>

  <!-- 장치 처리 계속 -->
  <rect x="718" y="196" width="76" height="24" fill="#EBF5FB" rx="4" stroke="#3498DB" stroke-width="1"/>
  <text x="756" y="208" text-anchor="middle" font-size="10" fill="#2980B9" font-weight="bold">데이터 준비 중</text>

  <!-- 다른 작업 수행 3 -->
  <rect x="456" y="230" width="110" height="24" fill="#EBF5FB" rx="4" stroke="#3498DB" stroke-width="1"/>
  <text x="511" y="242" text-anchor="middle" font-size="10" fill="#2980B9" font-weight="bold">다른 작업 수행 중</text>
  <text x="511" y="251" text-anchor="middle" font-size="9" fill="#7F8C8D">계속 실행...</text>

  <!-- 장치 준비 완료 -->
  <rect x="718" y="230" width="76" height="24" fill="#EAF7F0" rx="4" stroke="#27AE60" stroke-width="1"/>
  <text x="756" y="246" text-anchor="middle" font-size="10" fill="#27AE60" font-weight="bold">준비 완료!</text>

  <!-- 인터럽트 신호 (굵은 주황색) -->
  <line x1="749" y1="268" x2="523" y2="268" stroke="#D35400" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <rect x="566" y="255" width="118" height="15" fill="white"/>
  <text x="625" y="266" text-anchor="middle" font-size="10" fill="#D35400" font-weight="bold">인터럽트 신호 발생! (IRQ)</text>

  <!-- 현재 상태 저장 -->
  <rect x="456" y="280" width="110" height="22" fill="#F9EBEA" rx="4" stroke="#E74C3C" stroke-width="1"/>
  <text x="511" y="294" text-anchor="middle" font-size="9.5" fill="#C0392B" font-weight="bold">현재 상태 저장 (PC, 레지스터)</text>

  <!-- ISR 실행 -->
  <rect x="456" y="312" width="110" height="26" fill="url(#nodePurple)" rx="4"/>
  <text x="511" y="324" text-anchor="middle" font-size="10" fill="white" font-weight="bold">ISR 실행</text>
  <text x="511" y="334" text-anchor="middle" font-size="9" fill="white">(인터럽트 서비스 루틴)</text>

  <!-- CPU -> 장치 데이터 읽기 -->
  <line x1="522" y1="352" x2="749" y2="352" stroke="#8E44AD" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <rect x="560" y="339" width="88" height="15" fill="white"/>
  <text x="604" y="350" text-anchor="middle" font-size="10" fill="#8E44AD" font-weight="bold">데이터 읽기 요청</text>

  <!-- 장치 -> CPU 데이터 전송 -->
  <line x1="749" y1="370" x2="522" y2="370" stroke="#27AE60" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="560" y="357" width="95" height="15" fill="white"/>
  <text x="607" y="368" text-anchor="middle" font-size="10" fill="#27AE60" font-weight="bold">데이터 전송 완료!</text>

  <!-- ISR 종료, 상태 복원 -->
  <rect x="456" y="382" width="110" height="22" fill="#EAF7F0" rx="4" stroke="#27AE60" stroke-width="1"/>
  <text x="511" y="397" text-anchor="middle" font-size="9.5" fill="#27AE60" font-weight="bold">저장 상태 복원 후 재개</text>

  <!-- CPU 활성 구간 재개 (파랑) -->
  <rect x="511" y="414" width="10" height="24" fill="#3498DB" opacity="0.35" rx="2"/>

  <!-- 이전 작업 재개 -->
  <rect x="456" y="414" width="110" height="22" fill="#EBF5FB" rx="4" stroke="#3498DB" stroke-width="1"/>
  <text x="511" y="429" text-anchor="middle" font-size="10" fill="#2980B9" font-weight="bold">이전 작업 재개</text>

  <!-- 인터럽트 요약 -->
  <rect x="448" y="450" width="380" height="54" fill="#EAFAF1" rx="5" stroke="#27AE60" stroke-width="1"/>
  <text x="638" y="467" text-anchor="middle" font-size="11" font-weight="bold" fill="#27AE60">인터럽트 방식 특징</text>
  <text x="462" y="482" font-size="10" fill="#2C3E50">- 장치가 준비되면 CPU에 신호를 보냄 (event-driven)</text>
  <text x="462" y="496" font-size="10" fill="#2C3E50">- 대기 중에도 CPU가 다른 작업 수행 가능 (효율적)</text>

  <!-- 하단 범례 영역 -->
  <rect x="20" y="522" width="820" height="82" fill="#F8F9FA" rx="5"/>
  <text x="430" y="540" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C3E50">핵심 비교 요약</text>

  <rect x="40" y="550" width="12" height="12" fill="#E74C3C" rx="2"/>
  <text x="58" y="561" font-size="10" fill="#2C3E50">폴링: CPU 주도 / busy-waiting / 단순하나 비효율</text>

  <rect x="40" y="572" width="12" height="12" fill="#27AE60" rx="2"/>
  <text x="58" y="583" font-size="10" fill="#2C3E50">인터럽트: 장치 주도 / event-driven / CPU 효율 극대화</text>

  <rect x="450" y="550" width="12" height="12" fill="#9B59B6" rx="2"/>
  <text x="468" y="561" font-size="10" fill="#2C3E50">ISR (Interrupt Service Routine): 인터럽트 전용 처리 루틴</text>

  <rect x="450" y="572" width="12" height="12" fill="#3498DB" rx="2"/>
  <text x="468" y="583" font-size="10" fill="#2C3E50">파란 블록: CPU가 다른 유용한 작업을 수행하는 구간</text>
</svg>
