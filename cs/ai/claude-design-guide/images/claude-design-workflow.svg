<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 580" font-family="'Segoe UI', 'Apple SD Gothic Neo', sans-serif" font-size="13">
  <defs>
    <linearGradient id="stepGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F4E8DA"/>
    </linearGradient>
    <linearGradient id="iterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF7F2"/>
      <stop offset="100%" stop-color="#FFE5D5"/>
    </linearGradient>
    <linearGradient id="exportGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5436DA"/>
      <stop offset="100%" stop-color="#7E5BFF"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrowLoop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D97757"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="980" height="580" fill="#FAF9F5"/>

  <!-- Title -->
  <text x="490" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1F1F1F">Claude Design 사용자 워크플로우</text>
  <text x="490" y="52" text-anchor="middle" font-size="12" fill="#666">디자인 시스템 준비 → 프로젝트 생성 → 프롬프트 → 4가지 수정 수단 (반복) → 익스포트</text>

  <!-- Step 1: Design System -->
  <g filter="url(#shadow2)">
    <rect x="30" y="100" width="170" height="120" rx="10" fill="url(#stepGrad)" stroke="#D97757" stroke-width="1.5"/>
    <circle cx="55" cy="125" r="14" fill="#D97757"/>
    <text x="55" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">1</text>
    <text x="115" y="130" font-size="14" font-weight="700" fill="#1F1F1F">디자인 시스템</text>
    <text x="115" y="148" font-size="14" font-weight="700" fill="#1F1F1F">준비</text>
    <line x1="50" y1="160" x2="180" y2="160" stroke="#E5DCC8"/>
    <text x="115" y="178" text-anchor="middle" font-size="11" fill="#666">design.md (노트 필드)</text>
    <text x="115" y="194" text-anchor="middle" font-size="11" fill="#666">또는 Figma .fig 업로드</text>
    <text x="115" y="210" text-anchor="middle" font-size="11" fill="#666">또는 코드베이스 연동</text>
  </g>

  <!-- Step 2: Need Review -->
  <g filter="url(#shadow2)">
    <rect x="220" y="100" width="170" height="120" rx="10" fill="url(#stepGrad)" stroke="#D97757" stroke-width="1.5"/>
    <circle cx="245" cy="125" r="14" fill="#D97757"/>
    <text x="245" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">2</text>
    <text x="305" y="130" font-size="14" font-weight="700" fill="#1F1F1F">Need Review</text>
    <text x="305" y="148" font-size="14" font-weight="700" fill="#1F1F1F">+ Publish</text>
    <line x1="240" y1="160" x2="370" y2="160" stroke="#E5DCC8"/>
    <text x="305" y="178" text-anchor="middle" font-size="11" fill="#666">생성 약 5분</text>
    <text x="305" y="194" text-anchor="middle" font-size="11" fill="#666">N개 항목별</text>
    <text x="305" y="210" text-anchor="middle" font-size="11" fill="#666">Looks Good / Needs Work</text>
  </g>

  <!-- Step 3: Project -->
  <g filter="url(#shadow2)">
    <rect x="410" y="100" width="170" height="120" rx="10" fill="url(#stepGrad)" stroke="#D97757" stroke-width="1.5"/>
    <circle cx="435" cy="125" r="14" fill="#D97757"/>
    <text x="435" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">3</text>
    <text x="495" y="130" font-size="14" font-weight="700" fill="#1F1F1F">프로젝트 생성</text>
    <line x1="430" y1="160" x2="560" y2="160" stroke="#E5DCC8"/>
    <text x="495" y="178" text-anchor="middle" font-size="11" fill="#666">Prototype / Slidedeck</text>
    <text x="495" y="194" text-anchor="middle" font-size="11" fill="#666">/ Templates / Custom</text>
    <text x="495" y="210" text-anchor="middle" font-size="11" fill="#666">디자인 시스템 자동 적용</text>
  </g>

  <!-- Step 4: Prompt -->
  <g filter="url(#shadow2)">
    <rect x="600" y="100" width="170" height="120" rx="10" fill="url(#stepGrad)" stroke="#D97757" stroke-width="1.5"/>
    <circle cx="625" cy="125" r="14" fill="#D97757"/>
    <text x="625" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">4</text>
    <text x="685" y="130" font-size="14" font-weight="700" fill="#1F1F1F">프롬프트</text>
    <text x="685" y="148" font-size="14" font-weight="700" fill="#1F1F1F">+ 자료 입력</text>
    <line x1="620" y1="160" x2="750" y2="160" stroke="#E5DCC8"/>
    <text x="685" y="178" text-anchor="middle" font-size="11" fill="#666">목표 · 레이아웃</text>
    <text x="685" y="194" text-anchor="middle" font-size="11" fill="#666">콘텐츠 · 대상</text>
    <text x="685" y="210" text-anchor="middle" font-size="11" fill="#666">+ 외부 컴포넌트 코드(선택)</text>
  </g>

  <!-- Step 5: Result -->
  <g filter="url(#shadow2)">
    <rect x="790" y="100" width="160" height="120" rx="10" fill="url(#stepGrad)" stroke="#D97757" stroke-width="1.5"/>
    <circle cx="815" cy="125" r="14" fill="#D97757"/>
    <text x="815" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">5</text>
    <text x="870" y="130" font-size="14" font-weight="700" fill="#1F1F1F">결과 생성</text>
    <line x1="810" y1="160" x2="940" y2="160" stroke="#E5DCC8"/>
    <text x="870" y="178" text-anchor="middle" font-size="11" fill="#666">캔버스에 실시간</text>
    <text x="870" y="194" text-anchor="middle" font-size="11" fill="#666">Light/Dark 동시 생성</text>
    <text x="870" y="210" text-anchor="middle" font-size="11" fill="#666">키스크린 다수 한 번에</text>
  </g>

  <!-- Arrows between steps 1-5 -->
  <g stroke="#888" stroke-width="2" fill="none" marker-end="url(#arrow2)">
    <line x1="200" y1="160" x2="218" y2="160"/>
    <line x1="390" y1="160" x2="408" y2="160"/>
    <line x1="580" y1="160" x2="598" y2="160"/>
    <line x1="770" y1="160" x2="788" y2="160"/>
  </g>

  <!-- Step 6: Iterate (4 modification methods) -->
  <text x="490" y="265" text-anchor="middle" font-size="14" font-weight="700" fill="#444">⟳ 6단계 — 4가지 수정 수단 (반복)</text>

  <g filter="url(#shadow2)">
    <rect x="60" y="285" width="200" height="100" rx="10" fill="url(#iterGrad)" stroke="#D97757" stroke-width="1.5"/>
    <text x="160" y="312" text-anchor="middle" font-size="13" font-weight="700" fill="#1F1F1F">① 채팅 (Chat)</text>
    <line x1="80" y1="324" x2="240" y2="324" stroke="#E5DCC8"/>
    <text x="160" y="345" text-anchor="middle" font-size="11" fill="#666">광범위 변경 / 모호한 의도</text>
    <text x="160" y="362" text-anchor="middle" font-size="11" fill="#666">"전체 컬러 톤을 따뜻하게"</text>
    <text x="160" y="379" text-anchor="middle" font-size="10" fill="#999" font-style="italic">≈ 디자이너에게 메시지</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="280" y="285" width="200" height="100" rx="10" fill="url(#iterGrad)" stroke="#D97757" stroke-width="1.5"/>
    <text x="380" y="312" text-anchor="middle" font-size="13" font-weight="700" fill="#1F1F1F">② Tweaks (슬라이더)</text>
    <line x1="300" y1="324" x2="460" y2="324" stroke="#E5DCC8"/>
    <text x="380" y="345" text-anchor="middle" font-size="11" fill="#666">변형 탐색 / 미세조정</text>
    <text x="380" y="362" text-anchor="middle" font-size="11" fill="#666">컬러/지속시간/강도 슬라이더</text>
    <text x="380" y="379" text-anchor="middle" font-size="10" fill="#999" font-style="italic">★ Claude가 슬라이더를 디자인</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="500" y="285" width="200" height="100" rx="10" fill="url(#iterGrad)" stroke="#D97757" stroke-width="1.5"/>
    <text x="600" y="312" text-anchor="middle" font-size="13" font-weight="700" fill="#1F1F1F">③ Drawing (영역)</text>
    <line x1="520" y1="324" x2="680" y2="324" stroke="#E5DCC8"/>
    <text x="600" y="345" text-anchor="middle" font-size="11" fill="#666">영역 마킹 + 수정 요청</text>
    <text x="600" y="362" text-anchor="middle" font-size="11" fill="#666">유사 패턴 일괄 반영</text>
    <text x="600" y="379" text-anchor="middle" font-size="10" fill="#999" font-style="italic">≈ 포토샵 선택 영역</text>
  </g>

  <g filter="url(#shadow2)">
    <rect x="720" y="285" width="200" height="100" rx="10" fill="url(#iterGrad)" stroke="#D97757" stroke-width="1.5"/>
    <text x="820" y="312" text-anchor="middle" font-size="13" font-weight="700" fill="#1F1F1F">④ Edit (요소)</text>
    <line x1="740" y1="324" x2="900" y2="324" stroke="#E5DCC8"/>
    <text x="820" y="345" text-anchor="middle" font-size="11" fill="#666">픽셀/속성 단위 정확</text>
    <text x="820" y="362" text-anchor="middle" font-size="11" fill="#666">폰트/패딩/radius 직접 조정</text>
    <text x="820" y="379" text-anchor="middle" font-size="10" fill="#999" font-style="italic">≈ Figma 우측 속성 패널</text>
  </g>

  <!-- Loop arrow from step 6 back to step 5 -->
  <path d="M 870 285 Q 920 250 870 220" stroke="#D97757" stroke-width="2" fill="none" marker-end="url(#arrowLoop)" stroke-dasharray="5,3"/>
  <text x="935" y="252" font-size="10" fill="#D97757">반복</text>

  <!-- Step 7: Export / Handoff -->
  <g filter="url(#shadow2)">
    <rect x="60" y="430" width="860" height="90" rx="10" fill="url(#exportGrad2)"/>
    <circle cx="100" cy="475" r="18" fill="#FFFFFF" fill-opacity="0.3"/>
    <text x="100" y="481" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">7</text>
    <text x="155" y="465" font-size="15" font-weight="700" fill="#FFFFFF">익스포트 / Claude Code 핸드오프</text>
    <text x="155" y="490" font-size="12" fill="#E0DBFF">URL · .zip · Canva · PDF · PPTX · HTML · ★ Claude Code 핸드오프 번들 (단일 명령어로 코드 구현)</text>
    <text x="155" y="510" font-size="11" fill="#C7BCFF" font-style="italic">디자인 의도 · 디자인 시스템 · 자산을 패키지로 묶어 전달 — 별도 개발 스펙 작성 단계 불필요</text>
  </g>

  <!-- Arrow Step 6 → Step 7 -->
  <line x1="490" y1="385" x2="490" y2="428" stroke="#888" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Legend -->
  <g font-size="10" fill="#777">
    <rect x="60" y="540" width="20" height="3" fill="#D97757"/>
    <text x="88" y="544">단계 박스</text>
    <line x1="160" y1="541" x2="180" y2="541" stroke="#888" stroke-width="2" marker-end="url(#arrow2)"/>
    <text x="190" y="544">순서</text>
    <line x1="240" y1="541" x2="260" y2="541" stroke="#D97757" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowLoop)"/>
    <text x="270" y="544">반복 루프</text>
    <rect x="345" y="540" width="20" height="3" fill="#5436DA"/>
    <text x="373" y="544">최종 출력</text>
  </g>
</svg>
