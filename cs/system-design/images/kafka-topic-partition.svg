<svg xmlns="http://www.w3.org/2000/svg" width="700" height="400" viewBox="0 0 700 400" font-family="Arial, sans-serif">
  <defs>
    <!-- 파랑 그라디언트 -->
    <linearGradient id="blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3498DB"/>
      <stop offset="100%" stop-color="#2980B9"/>
    </linearGradient>
    <!-- 초록 그라디언트 -->
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#27AE60"/>
    </linearGradient>
    <!-- 주황 그라디언트 -->
    <linearGradient id="orange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E67E22"/>
      <stop offset="100%" stop-color="#D35400"/>
    </linearGradient>
    <!-- 보라 그라디언트 -->
    <linearGradient id="purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9B59B6"/>
      <stop offset="100%" stop-color="#8E44AD"/>
    </linearGradient>
    <!-- 화살표 마커 -->
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7F8C8D"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D35400"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="700" height="400" fill="#ECF0F1" rx="8"/>

  <!-- 타이틀 -->
  <text x="350" y="32" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C3E50">Topic: orders</text>

  <!-- ===== Producer 박스 ===== -->
  <rect x="20" y="55" width="110" height="40" rx="6" fill="url(#orange)"/>
  <text x="75" y="80" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Producer</text>

  <!-- Producer → 분배 화살표 -->
  <line x1="130" y1="75" x2="175" y2="75" stroke="#7F8C8D" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- 분배 원 -->
  <circle cx="192" cy="75" r="14" fill="url(#purple)" opacity="0.85"/>
  <text x="192" y="79" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">Hash</text>

  <!-- 분배 → P0 -->
  <line x1="206" y1="68" x2="230" y2="68" stroke="#7F8C8D" stroke-width="1.2"/>
  <line x1="230" y1="68" x2="230" y2="120" stroke="#7F8C8D" stroke-width="1.2" marker-end="url(#arrowGray)"/>
  <!-- 분배 → P1 -->
  <line x1="206" y1="75" x2="230" y2="75" stroke="#7F8C8D" stroke-width="1.2"/>
  <line x1="230" y1="75" x2="350" y2="75" stroke="#7F8C8D" stroke-width="1.2"/>
  <line x1="350" y1="75" x2="350" y2="120" stroke="#7F8C8D" stroke-width="1.2" marker-end="url(#arrowGray)"/>
  <!-- 분배 → P2 -->
  <line x1="206" y1="82" x2="230" y2="82" stroke="#7F8C8D" stroke-width="1.2"/>
  <line x1="230" y1="82" x2="470" y2="82" stroke="#7F8C8D" stroke-width="1.2"/>
  <line x1="470" y1="82" x2="470" y2="120" stroke="#7F8C8D" stroke-width="1.2" marker-end="url(#arrowGray)"/>

  <!-- ===== Topic 영역 ===== -->
  <rect x="145" y="110" width="530" height="230" rx="8" fill="none" stroke="#7F8C8D" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="410" y="130" text-anchor="middle" font-size="11" fill="#7F8C8D">Topic: orders</text>

  <!-- ===== Partition 0 (offset 0~5) ===== -->
  <text x="170" y="160" font-size="11" font-weight="bold" fill="#2C3E50">P0</text>
  <g transform="translate(195, 145)">
    <rect x="0" y="0" width="42" height="28" rx="5" fill="url(#blue)"/>
    <text x="21" y="18" text-anchor="middle" font-size="10" fill="#fff">0</text>
    <rect x="46" y="0" width="42" height="28" rx="5" fill="url(#blue)"/>
    <text x="67" y="18" text-anchor="middle" font-size="10" fill="#fff">1</text>
    <rect x="92" y="0" width="42" height="28" rx="5" fill="url(#blue)"/>
    <text x="113" y="18" text-anchor="middle" font-size="10" fill="#fff">2</text>
    <rect x="138" y="0" width="42" height="28" rx="5" fill="url(#blue)"/>
    <text x="159" y="18" text-anchor="middle" font-size="10" fill="#fff">3</text>
    <rect x="184" y="0" width="42" height="28" rx="5" fill="url(#blue)"/>
    <text x="205" y="18" text-anchor="middle" font-size="10" fill="#fff">4</text>
    <rect x="230" y="0" width="42" height="28" rx="5" fill="url(#blue)"/>
    <text x="251" y="18" text-anchor="middle" font-size="10" fill="#fff">5</text>
    <!-- 화살표 (최신 offset 방향) -->
    <polygon points="280,14 290,8 290,20" fill="#7F8C8D" opacity="0.6"/>
  </g>
  <text x="500" y="168" font-size="9" fill="#7F8C8D">offset →</text>

  <!-- ===== Partition 1 (offset 0~4) ===== -->
  <text x="170" y="220" font-size="11" font-weight="bold" fill="#2C3E50">P1</text>
  <g transform="translate(195, 205)">
    <rect x="0" y="0" width="42" height="28" rx="5" fill="url(#green)"/>
    <text x="21" y="18" text-anchor="middle" font-size="10" fill="#fff">0</text>
    <rect x="46" y="0" width="42" height="28" rx="5" fill="url(#green)"/>
    <text x="67" y="18" text-anchor="middle" font-size="10" fill="#fff">1</text>
    <rect x="92" y="0" width="42" height="28" rx="5" fill="url(#green)"/>
    <text x="113" y="18" text-anchor="middle" font-size="10" fill="#fff">2</text>
    <rect x="138" y="0" width="42" height="28" rx="5" fill="url(#green)"/>
    <text x="159" y="18" text-anchor="middle" font-size="10" fill="#fff">3</text>
    <rect x="184" y="0" width="42" height="28" rx="5" fill="url(#green)"/>
    <text x="205" y="18" text-anchor="middle" font-size="10" fill="#fff">4</text>
    <polygon points="234,14 244,8 244,20" fill="#7F8C8D" opacity="0.6"/>
  </g>

  <!-- ===== Partition 2 (offset 0~3) ===== -->
  <text x="170" y="280" font-size="11" font-weight="bold" fill="#2C3E50">P2</text>
  <g transform="translate(195, 265)">
    <rect x="0" y="0" width="42" height="28" rx="5" fill="url(#purple)"/>
    <text x="21" y="18" text-anchor="middle" font-size="10" fill="#fff">0</text>
    <rect x="46" y="0" width="42" height="28" rx="5" fill="url(#purple)"/>
    <text x="67" y="18" text-anchor="middle" font-size="10" fill="#fff">1</text>
    <rect x="92" y="0" width="42" height="28" rx="5" fill="url(#purple)"/>
    <text x="113" y="18" text-anchor="middle" font-size="10" fill="#fff">2</text>
    <rect x="138" y="0" width="42" height="28" rx="5" fill="url(#purple)"/>
    <text x="159" y="18" text-anchor="middle" font-size="10" fill="#fff">3</text>
    <polygon points="188,14 198,8 198,20" fill="#7F8C8D" opacity="0.6"/>
  </g>

  <!-- ===== 하단 레이블 ===== -->
  <rect x="200" y="358" width="300" height="30" rx="6" fill="#2C3E50" opacity="0.9"/>
  <text x="350" y="378" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Key-based Partitioning</text>

  <!-- 설명 텍스트 -->
  <text x="350" y="350" text-anchor="middle" font-size="9" fill="#7F8C8D">같은 Key를 가진 메시지는 항상 같은 Partition으로 전송</text>
</svg>