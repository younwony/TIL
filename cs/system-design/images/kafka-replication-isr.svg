<svg xmlns="http://www.w3.org/2000/svg" width="750" height="420" viewBox="0 0 750 420" font-family="Arial, sans-serif">
  <defs>
    <!-- 파랑 그라디언트 (Leader) -->
    <linearGradient id="blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3498DB"/>
      <stop offset="100%" stop-color="#2980B9"/>
    </linearGradient>
    <!-- 초록 그라디언트 (Follower) -->
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#27AE60"/>
    </linearGradient>
    <!-- 주황 그라디언트 (Producer) -->
    <linearGradient id="orange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E67E22"/>
      <stop offset="100%" stop-color="#D35400"/>
    </linearGradient>
    <!-- 빨강 그라디언트 (Consumer) -->
    <linearGradient id="red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E74C3C"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
    <!-- 보라 그라디언트 -->
    <linearGradient id="purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9B59B6"/>
      <stop offset="100%" stop-color="#8E44AD"/>
    </linearGradient>
    <!-- Broker 배경 (연파랑) -->
    <linearGradient id="brokerBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EBF5FB"/>
      <stop offset="100%" stop-color="#D6EAF8"/>
    </linearGradient>
    <!-- Broker 배경 (연초록) -->
    <linearGradient id="brokerBgGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EAFAF1"/>
      <stop offset="100%" stop-color="#D5F5E3"/>
    </linearGradient>
    <!-- 화살표 마커들 -->
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7F8C8D"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D35400"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C0392B"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27AE60"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="750" height="420" fill="#ECF0F1" rx="8"/>

  <!-- 타이틀 -->
  <text x="375" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C3E50">Leader-Follower Replication &amp; ISR</text>
  <text x="375" y="48" text-anchor="middle" font-size="10" fill="#7F8C8D">Topic-A, Partition 0 (Replication Factor = 3)</text>

  <!-- ===== 간선 (노드보다 먼저 그리기) ===== -->

  <!-- Producer → Leader (Broker 0) -->
  <line x1="110" y1="160" x2="168" y2="160" stroke="#D35400" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="140" y="152" text-anchor="middle" font-size="9" fill="#D35400">write</text>

  <!-- Leader → Consumer -->
  <line x1="110" y1="290" x2="168" y2="210" stroke="#C0392B" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="125" y="240" text-anchor="middle" font-size="9" fill="#C0392B">read</text>

  <!-- Leader → Follower 1 (복제 점선) -->
  <line x1="350" y1="185" x2="395" y2="185" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <text x="372" y="178" text-anchor="middle" font-size="9" fill="#27AE60">replicate</text>

  <!-- Leader → Follower 2 (복제 점선) -->
  <line x1="350" y1="200" x2="395" y2="270" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <text x="358" y="245" text-anchor="middle" font-size="9" fill="#27AE60">replicate</text>

  <!-- ===== Producer 박스 ===== -->
  <rect x="20" y="140" width="90" height="40" rx="6" fill="url(#orange)"/>
  <text x="65" y="165" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Producer</text>

  <!-- ===== Consumer 박스 ===== -->
  <rect x="20" y="270" width="90" height="40" rx="6" fill="url(#red)"/>
  <text x="65" y="295" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Consumer</text>

  <!-- ===== Broker 0 (Leader) ===== -->
  <rect x="180" y="80" width="170" height="160" rx="8" fill="url(#brokerBg)" stroke="#2980B9" stroke-width="2"/>
  <text x="265" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C3E50">Broker 0</text>

  <!-- Leader 파티션 박스 -->
  <rect x="200" y="115" width="130" height="50" rx="6" fill="url(#blue)"/>
  <text x="265" y="138" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Partition 0</text>
  <text x="265" y="155" text-anchor="middle" font-size="10" fill="#fff">LEADER</text>

  <!-- Leader 뱃지 -->
  <rect x="200" y="175" width="130" height="22" rx="5" fill="#2C3E50" opacity="0.8"/>
  <text x="265" y="190" text-anchor="middle" font-size="9" fill="#fff">offset: 0, 1, 2, 3, 4</text>

  <!-- ===== Broker 1 (Follower) ===== -->
  <rect x="405" y="80" width="170" height="145" rx="8" fill="url(#brokerBgGreen)" stroke="#27AE60" stroke-width="2"/>
  <text x="490" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C3E50">Broker 1</text>

  <!-- Follower 1 파티션 박스 -->
  <rect x="425" y="115" width="130" height="50" rx="6" fill="url(#green)"/>
  <text x="490" y="138" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Partition 0</text>
  <text x="490" y="155" text-anchor="middle" font-size="10" fill="#fff">FOLLOWER</text>

  <!-- Follower 1 offset -->
  <rect x="425" y="175" width="130" height="22" rx="5" fill="#2C3E50" opacity="0.8"/>
  <text x="490" y="190" text-anchor="middle" font-size="9" fill="#fff">offset: 0, 1, 2, 3, 4</text>

  <!-- ===== Broker 2 (Follower) ===== -->
  <rect x="405" y="240" width="170" height="145" rx="8" fill="url(#brokerBgGreen)" stroke="#27AE60" stroke-width="2"/>
  <text x="490" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C3E50">Broker 2</text>

  <!-- Follower 2 파티션 박스 -->
  <rect x="425" y="275" width="130" height="50" rx="6" fill="url(#green)"/>
  <text x="490" y="298" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Partition 0</text>
  <text x="490" y="315" text-anchor="middle" font-size="10" fill="#fff">FOLLOWER</text>

  <!-- Follower 2 offset -->
  <rect x="425" y="335" width="130" height="22" rx="5" fill="#2C3E50" opacity="0.8"/>
  <text x="490" y="350" text-anchor="middle" font-size="9" fill="#fff">offset: 0, 1, 2, 3, 4</text>

  <!-- ===== ISR 표시 ===== -->
  <rect x="610" y="105" width="120" height="60" rx="8" fill="url(#purple)" opacity="0.9"/>
  <text x="670" y="128" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">ISR</text>
  <text x="670" y="148" text-anchor="middle" font-size="12" fill="#fff">{ 0, 1, 2 }</text>

  <!-- ISR → Broker 연결 (점선) -->
  <line x1="610" y1="135" x2="575" y2="135" stroke="#8E44AD" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="610" y1="145" x2="575" y2="300" stroke="#8E44AD" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ===== 하단 레이블 ===== -->
  <rect x="130" y="385" width="490" height="28" rx="6" fill="#2C3E50" opacity="0.9"/>
  <text x="375" y="404" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">acks=all: 모든 ISR 복제 완료 후 응답</text>
</svg>